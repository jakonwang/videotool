<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TikStar Profit Capture</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="pcp-app">
    <header class="pcp-header">
      <div>
        <h1>TikTok 利润回传插件</h1>
        <p>一键抓取 -> 预览确认 -> 回传利润中心</p>
      </div>
      <span id="connectBadge" class="pcp-badge pcp-badge-idle">未连接</span>
    </header>

    <section class="pcp-card">
      <h2>连接设置</h2>
      <div class="pcp-grid pcp-grid-config">
        <label class="pcp-field">
          <span>API Base</span>
          <input id="apiBaseInput" type="text" placeholder="例如：https://your-domain.com" />
        </label>
        <label class="pcp-field">
          <span>插件 Token</span>
          <input id="tokenInput" type="password" placeholder="在利润中心插件接入中生成" />
        </label>
      </div>
      <div class="pcp-actions">
        <button id="saveConfigBtn" class="btn btn-default">保存配置</button>
        <button id="connectBtn" class="btn btn-primary">连接并拉取配置</button>
      </div>
      <div id="statusBar" class="pcp-status"></div>
    </section>

    <section class="pcp-card">
      <div class="pcp-row-between">
        <h2>抓取与预览</h2>
        <div class="pcp-actions">
          <button id="captureBtn" class="btn btn-primary">抓取当前页面</button>
          <button id="addRowBtn" class="btn btn-default">新增空行</button>
          <button id="clearRowsBtn" class="btn btn-default">清空</button>
        </div>
      </div>
      <div class="pcp-batch-panel">
        <label class="pcp-field">
          <span>批量日期（支持换行 / 逗号，区间示例：2026-04-01~2026-04-07）</span>
          <textarea id="batchDatesInput" class="pcp-textarea" placeholder="2026-04-18&#10;2026-04-19"></textarea>
        </label>
        <div class="pcp-actions pcp-actions-compact">
          <button id="expandByDatesBtn" class="btn btn-default">按日期复制全部行</button>
          <button id="clearBatchDatesBtn" class="btn btn-default">清空日期</button>
        </div>
      </div>
      <div id="summaryBar" class="pcp-summary"></div>
      <div class="pcp-table-wrap">
        <table class="pcp-table">
          <thead>
            <tr>
              <th>#</th>
              <th>日期</th>
              <th>店铺</th>
              <th>广告户</th>
              <th>渠道</th>
              <th>广告费</th>
              <th>GMV</th>
              <th>SKU orders</th>
              <th>来源</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="rowsBody"></tbody>
        </table>
      </div>
      <div class="pcp-submit-row">
        <button id="submitBtn" class="btn btn-primary btn-lg">回传到利润中心</button>
      </div>
    </section>

    <section class="pcp-card">
      <h2>回传结果</h2>
      <div id="resultBox" class="pcp-result">暂无提交记录</div>
    </section>

    <section class="pcp-card">
      <div class="pcp-row-between">
        <h2>素材优化（本地）</h2>
        <div class="pcp-actions pcp-actions-compact">
          <button id="creativeScanBtn" class="btn btn-primary">识别并打标</button>
          <button id="creativeApplyBtn" class="btn btn-default">应用到页面</button>
          <button id="creativeFilterExcludeBtn" class="btn btn-default">仅看垃圾素材</button>
          <button id="creativeCopyExcludeBtn" class="btn btn-default">复制待排除视频ID</button>
          <button id="creativeClearOverrideBtn" class="btn btn-default">清空本页覆盖</button>
        </div>
      </div>
      <div id="creativeSummaryBar" class="pcp-summary"></div>
      <div class="pcp-table-wrap pcp-creative-table-wrap">
        <table class="pcp-table pcp-creative-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Video ID</th>
              <th>素材标题</th>
              <th>自动标签</th>
              <th>手动标签</th>
              <th>三段评分</th>
              <th>问题位置</th>
              <th>是否继续</th>
              <th>排除清单</th>
              <th>一句话结论</th>
            </tr>
          </thead>
          <tbody id="creativeRowsBody"></tbody>
        </table>
      </div>
    </section>

    <section class="pcp-card">
      <div class="pcp-row-between">
        <h2>GMV Max 动态投放助手</h2>
        <div class="pcp-actions pcp-actions-compact">
          <button id="assistantSyncBtn" class="btn btn-primary">同步到后端并生成建议</button>
          <button id="assistantCopyExcludeBtn" class="btn btn-default">复制后端排除ID</button>
        </div>
      </div>
      <div class="pcp-assistant-grid">
        <label class="pcp-field">
          <span>店铺</span>
          <select id="assistantStoreSelect"></select>
        </label>
        <label class="pcp-field">
          <span>目标ROI（可选）</span>
          <input id="assistantTargetRoiInput" type="number" step="0.01" placeholder="如 6.5" />
        </label>
        <label class="pcp-field">
          <span>当前预算（可选）</span>
          <input id="assistantBudgetInput" type="number" step="0.01" placeholder="如 200" />
        </label>
      </div>
      <div id="assistantSummaryBar" class="pcp-summary"></div>
      <div id="assistantResultBox" class="pcp-result">正在加载投放助手...</div>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
