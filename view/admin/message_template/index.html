{extend name="admin/common/layout" /}

{block name="title"}话术{/block}
{block name="page_title"}{/block}
{block name="breadcrumb"}{/block}
{block name="page_actions"}{/block}

{block name="style"}
<style>
    .content-header { display: none; }
    .tp-mt-wrap { padding: 24px; background: #f4f6f8; min-height: calc(100vh - 0px); }
    .admin-mt-card { background: #fff; padding: 24px; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.03); }
    .admin-mt-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 12px; }
    .admin-mt-breadcrumb { font-size: 13px; color: #909399; margin-bottom: 6px; }
    .admin-mt-title { font-size: 20px; font-weight: 700; color: #111827; }
    .admin-mt-hint { margin: 0 0 16px; color: #6b7280; font-size: 12px; line-height: 1.5; }
    .body-preview { max-width: 360px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; color: #4b5563; }
</style>
{/block}

{block name="content"}
<div id="msgTplApp" class="tp-mt-wrap"></div>
{/block}

{block name="script"}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.min.css">
<script src="/static/i18n/i18n.js?v=20260407_sidebar_menu1"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.38/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.full.min.js"></script>
<script>
  {literal}
  const { createApp, reactive, ref, computed, onMounted } = Vue;
  const { ElMessage, ElMessageBox } = ElementPlus;
  const i18n = window.AppI18n;
  const lang = i18n ? i18n.getLang('zh') : 'zh';
  const tt = (k, vars) => (i18n ? i18n.t(k, vars || null, lang) : k);
  const apiH = { 'Accept': 'application/json', 'X-Requested-With': 'XMLHttpRequest' };

  function parseJson(res, text) {
    try { return JSON.parse(text); } catch (e) { throw new Error(tt('page.styleSearch.errNonJson', { status: res.status })); }
  }

  createApp({
    setup() {
      const loading = ref(false);
      const items = ref([]);
      const dlg = ref(false);
      const saving = ref(false);
      const form = reactive({ id: 0, name: '', template_key: '', lang: 'zh', body: '', sort_order: 0, status: 1 });

      async function fetchList() {
        loading.value = true;
        try {
          const res = await fetch('/admin.php/message_template/listJson?page=1&page_size=200', { credentials: 'same-origin', headers: apiH });
          const json = parseJson(res, await res.text());
          if (!json || json.code !== 0) throw new Error((json && json.msg) || tt('common.loadingFailed'));
          items.value = (json.data && json.data.items) ? json.data.items : [];
        } catch (e) {
          ElMessage.error(e.message || tt('common.loadingFailed'));
        } finally {
          loading.value = false;
        }
      }

      function openAdd() {
        form.id = 0;
        form.name = '';
        form.template_key = '';
        form.lang = 'zh';
        form.body = '';
        form.sort_order = 0;
        form.status = 1;
        dlg.value = true;
      }

      function openEdit(row) {
        form.id = row.id;
        form.name = row.name || '';
        form.template_key = row.template_key || '';
        form.lang = row.lang || 'zh';
        form.body = row.body || '';
        form.sort_order = row.sort_order != null ? Number(row.sort_order) : 0;
        form.status = row.status != null ? Number(row.status) : 1;
        dlg.value = true;
      }

      async function saveForm() {
        saving.value = true;
        try {
          const res = await fetch('/admin.php/message_template/save', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { ...apiH, 'Content-Type': 'application/json; charset=UTF-8' },
            body: JSON.stringify(form),
          });
          const json = parseJson(res, await res.text());
          if (json && json.code === 401) { ElMessage.error(tt('common.sessionExpired')); return; }
          if (!json || json.code !== 0) { ElMessage.error((json && json.msg) || tt('common.loadingFailed')); return; }
          ElMessage.success(json.msg || tt('common.saved'));
          dlg.value = false;
          fetchList();
        } catch (e) {
          ElMessage.error(e.message || tt('common.loadingFailed'));
        } finally {
          saving.value = false;
        }
      }

      async function delRow(row) {
        try {
          await ElMessageBox.confirm(tt('page.messageTemplate.deleteConfirm'), tt('page.influencer.deleteDialogTitle'), { type: 'warning' });
        } catch { return; }
        try {
          const res = await fetch('/admin.php/message_template/delete', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { ...apiH, 'Content-Type': 'application/json; charset=UTF-8' },
            body: JSON.stringify({ id: row.id }),
          });
          const json = parseJson(res, await res.text());
          if (!json || json.code !== 0) { ElMessage.error((json && json.msg) || tt('common.loadingFailed')); return; }
          ElMessage.success(tt('common.deleted'));
          fetchList();
        } catch (e) {
          ElMessage.error(e.message || tt('common.loadingFailed'));
        }
      }

      const rows = computed(() => items.value || []);
      onMounted(() => fetchList());

      return { loading, rows, dlg, saving, form, tt, lang, fetchList, openAdd, openEdit, saveForm, delRow };
    },
    template: `
      <div class="admin-mt-card">
        <div class="admin-mt-header">
          <div>
            <div class="admin-mt-breadcrumb">{{ tt('page.messageTemplate.breadcrumb') }}</div>
            <div class="admin-mt-title">{{ tt('page.messageTemplate.title') }}</div>
          </div>
          <el-button type="primary" @click="openAdd">{{ tt('page.messageTemplate.add') }}</el-button>
        </div>
        <div class="admin-mt-hint">{{ tt('page.messageTemplate.hint') }}</div>
        <el-table :data="rows" v-loading="loading" stripe>
          <el-table-column prop="name" :label="tt('page.messageTemplate.colName')" min-width="140" />
          <el-table-column prop="template_key" :label="tt('page.messageTemplate.colKey')" min-width="120" />
          <el-table-column prop="lang" :label="tt('page.messageTemplate.colLang')" width="90" />
          <el-table-column :label="tt('page.messageTemplate.colBody')" min-width="220">
            <template #default="{ row }"><div class="body-preview" :title="row.body">{{ row.body || '—' }}</div></template>
          </el-table-column>
          <el-table-column prop="sort_order" :label="tt('page.messageTemplate.colSort')" width="90" />
          <el-table-column :label="tt('page.messageTemplate.colStatus')" width="100">
            <template #default="{ row }">
              <el-tag size="small" :type="Number(row.status)===1 ? 'success' : 'info'">{{ Number(row.status)===1 ? tt('common.statusEnabled') : tt('common.statusDisabled') }}</el-tag>
            </template>
          </el-table-column>
          <el-table-column prop="updated_at" :label="tt('page.messageTemplate.colUpdated')" min-width="160" />
          <el-table-column :label="tt('page.influencer.colActions')" width="140" fixed="right">
            <template #default="{ row }">
              <el-button link type="primary" size="small" @click="openEdit(row)">{{ tt('common.edit') }}</el-button>
              <el-button link type="danger" size="small" @click="delRow(row)">{{ tt('common.delete') }}</el-button>
            </template>
          </el-table-column>
        </el-table>

        <el-dialog v-model="dlg" :title="form.id ? tt('page.messageTemplate.editTitle') : tt('page.messageTemplate.add')" width="640px" destroy-on-close>
          <el-form label-width="88px">
            <el-form-item :label="tt('page.messageTemplate.colName')">
              <el-input v-model="form.name" :placeholder="tt('page.messageTemplate.phName')" />
            </el-form-item>
            <el-form-item :label="tt('page.messageTemplate.colKey')">
              <el-input v-model="form.template_key" :placeholder="tt('page.messageTemplate.phKey')" />
            </el-form-item>
            <el-form-item :label="tt('page.messageTemplate.colLang')">
              <el-select v-model="form.lang" style="width:140px;">
                <el-option label="中文" value="zh" />
                <el-option label="English" value="en" />
                <el-option label="Tiếng Việt" value="vi" />
              </el-select>
            </el-form-item>
            <el-form-item :label="tt('page.messageTemplate.colSort')">
              <el-input-number v-model="form.sort_order" :min="0" :step="1" style="width:140px;" />
            </el-form-item>
            <el-form-item :label="tt('page.messageTemplate.colStatus')">
              <el-select v-model="form.status" style="width:140px;">
                <el-option :label="tt('common.statusEnabled')" :value="1" />
                <el-option :label="tt('common.statusDisabled')" :value="0" />
              </el-select>
            </el-form-item>
            <el-form-item :label="tt('page.messageTemplate.colBody')">
              <el-input v-model="form.body" type="textarea" :rows="10" :placeholder="tt('page.messageTemplate.phBody')" />
            </el-form-item>
          </el-form>
          <template #footer>
            <el-button @click="dlg=false">{{ tt('common.cancel') }}</el-button>
            <el-button type="primary" :loading="saving" @click="saveForm">{{ tt('common.save') }}</el-button>
          </template>
        </el-dialog>
      </div>
    `
  }).use(ElementPlus).mount('#msgTplApp');
  {/literal}
</script>
{/block}
