{extend name="admin/common/layout" /}

{block name="title"}视频{/block}
{block name="page_title"}视频管理{/block}
{block name="style"}
<style>
  /* 采用你提供的模板风格（全局样式，仅作用于该页） */
  .page-container {
    padding: 24px;
    background-color: #f3f4f6;
    min-height: calc(100vh - 0px);
  }
  .modern-card {
    background: #ffffff;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
  }

  /* 顶部操作区（更紧凑：16~20px 间距） */
  .header-actions { margin-bottom: 16px; }
  .breadcrumb {
    font-size: 14px;
    color: #6b7280;
    margin-bottom: 12px;
    background: transparent !important;
    padding: 0 !important;
    line-height: 1.2;
  }
  .action-buttons { display: flex; gap: 12px; align-items: center; }
  .btn-primary { border-radius: 8px; padding: 0 24px; font-weight: 500; }
  .btn-danger { border-radius: 8px; border-color: #fca5a5; color: #ef4444; }

  /* 筛选区 */
  .filter-section {
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid #f3f4f6;
  }
  .custom-form {
    display: flex;
    flex-wrap: nowrap; /* 强制同一行 */
    gap: 12px;
    align-items: center;
  }
  .custom-form .el-form-item { margin-bottom: 0 !important; margin-right: 0 !important; }
  .custom-form .el-form-item { flex: 0 0 auto; }
  .filter-buttons { margin-left: auto; display: flex; gap: 12px; align-items: center; }

  @media (max-width: 1200px) {
    /* 屏幕窄时允许横向滚动，避免按钮掉行 */
    .custom-form { overflow-x: auto; padding-bottom: 4px; }
  }

  /* 表格：图片与文字层级 */
  .cover-image {
    width: 48px;
    height: 48px;
    border-radius: 6px;
    border: 1px solid #e5e7eb;
    overflow: hidden;
  }
  .image-placeholder {
    width: 100%;
    height: 100%;
    background: #f3f4f6;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #9ca3af;
    font-size: 14px;
  }
  .title-column {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
  }
  .main-title {
    font-size: 14px;
    font-weight: 600;
    color: #111827;
  }
  .sub-id {
    font-size: 12px;
    color: #6b7280;
  }
  .custom-tag { border-radius: 6px; border: none; font-weight: 500; }
  .action-link { font-weight: 600; }

  /* 底部分页 */
  .footer-pagination {
    margin-top: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* 上传弹窗：嵌入原 /video/batchUpload */
  .upload-iframe {
    width: 100%;
    height: 72vh;
    border: 0;
    border-radius: 10px;
    background: #fff;
  }
  .upload-dialog .el-dialog__body { padding: 0 !important; }

  /* 移动端：操作按钮/表格/弹窗更易用 */
  .admin-table-scroll { width: 100%; overflow-x: auto; }
  .admin-table-scroll .el-table { min-width: 980px; }
  @media (max-width: 768px) {
    .page-container { padding: 12px; }
    .modern-card { padding: 16px; }
    .breadcrumb { margin-bottom: 10px; }
    .action-buttons { flex-wrap: wrap; gap: 10px; }
    .action-buttons .el-button { flex: 1 1 auto; }
    .filter-buttons { margin-left: 0; }

    .upload-dialog .el-dialog { width: calc(100vw - 24px) !important; margin: 10px auto 0 !important; }
    .upload-iframe { height: 78vh; border-radius: 10px; }
  }
</style>
{/block}
{block name="page_actions"}{/block}

{block name="content"}
<div class="tp-ep-wrap" id="videoApp"></div>
{/block}

{block name="script"}
<!-- Vue3 + ElementPlus（CDN） -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.min.css">
<script src="/static/i18n/i18n.js?v=20260407_sidebar_menu1"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.38/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.full.min.js"></script>
<script>
  // 下拉选项：由服务端注入，避免额外接口
  // 下拉选项：由服务端注入，避免额外接口（用 push 方式避免 @last 语法残留）
  const PLATFORM_OPTIONS = [];
  {volist name="platforms" id="p"}
  PLATFORM_OPTIONS.push({ id: {$p.id}, label: "{:addslashes((string)$p.name)}" });
  {/volist}

  const DEVICE_OPTIONS = [];
  {volist name="devices" id="d"}
  DEVICE_OPTIONS.push({ id: {$d.id}, label: "{:addslashes((string)$d.device_name)}" });
  {/volist}

  const PRODUCT_OPTIONS = [];
  {volist name="products" id="pr"}
  PRODUCT_OPTIONS.push({ id: {$pr.id}, label: "{:addslashes((string)$pr.name)}" });
  {/volist}

  {literal}
  const { createApp, reactive, ref, onMounted, computed } = Vue;
  const { ElMessage, ElMessageBox } = ElementPlus;
  const i18n = window.AppI18n;
  const lang = i18n ? i18n.getLang('zh') : 'zh';
  const tt = (k, vars) => (i18n ? i18n.t(k, vars || null, lang) : k);

  function toSort(order) {
    if (order === 'ascending') return 'asc';
    if (order === 'descending') return 'desc';
    return 'desc';
  }

  createApp({
    setup() {
      const loading = ref(false);
      const tableData = ref([]);
      const total = ref(0);
      const page = ref(1);
      const pageSize = ref(10);
      const sortProp = ref('created_at');
      const sortOrder = ref('desc');

      const filters = reactive({
        platform_ids: [],
        device_ids: [],
        product_ids: [],
        is_downloaded: [],
        keyword: '',
      });

      const selection = ref([]);
      const selectedCount = computed(() => selection.value.length);
      const batchDeleteEnabled = computed(() => selectedCount.value > 0);
      const tableRef = ref();

      const uploadVisible = ref(false);
      const uploadIframeSrc = ref('/admin.php/video/batchUpload');
      const uploadFrame = ref(null);

      async function fetchList() {
        loading.value = true;
        try {
          const params = new URLSearchParams();
          params.set('page', String(page.value));
          params.set('page_size', String(pageSize.value));
          params.set('sort_prop', sortProp.value || 'created_at');
          params.set('sort_order', sortOrder.value || 'desc');
          if (filters.keyword) params.set('keyword', filters.keyword);
          (filters.platform_ids || []).forEach(v => params.append('platform_ids[]', String(v)));
          (filters.device_ids || []).forEach(v => params.append('device_ids[]', String(v)));
          (filters.product_ids || []).forEach(v => params.append('product_ids[]', String(v)));
          (filters.is_downloaded || []).forEach(v => params.append('is_downloaded[]', String(v)));

          const res = await fetch('/admin.php/video/listJson?' + params.toString(), { credentials: 'same-origin' });
          const json = await res.json();
          if (!json || json.code !== 0) throw new Error((json && json.msg) || '加载失败');
          tableData.value = (json.data && json.data.items) ? json.data.items : [];
          total.value = (json.data && json.data.total) ? json.data.total : 0;
        } catch (e) {
          ElMessage.error(e && e.message ? e.message : tt('common.loadingFailed'));
        } finally {
          loading.value = false;
        }
      }

      function onSortChange({ prop, order }) {
        if (!prop) return;
        sortProp.value = prop;
        sortOrder.value = toSort(order);
        page.value = 1;
        fetchList();
      }

      function onSearch() {
        page.value = 1;
        fetchList();
      }

      function onReset() {
        filters.platform_ids = [];
        filters.device_ids = [];
        filters.product_ids = [];
        filters.is_downloaded = [];
        filters.keyword = '';
        page.value = 1;
        fetchList();
      }

      function onSelectionChange(val) {
        selection.value = Array.isArray(val) ? val : [];
      }

      function invertSelection() {
        const t = tableRef.value;
        if (!t) return;
        const selectedIds = new Set(selection.value.map(r => r.id));
        (tableData.value || []).forEach((row) => {
          t.toggleRowSelection(row, !selectedIds.has(row.id));
        });
      }

      function goEdit(row) {
        window.location.href = '/admin.php/video/edit/' + row.id;
      }

      async function doDelete(row) {
        await ElMessageBox.confirm('确定删除该视频？', '提示', { type: 'warning' });
        const resp = await fetch('/admin.php/video/delete/' + row.id, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
          body: '',
          credentials: 'same-origin',
        });
        const json = await resp.json();
        if (json && json.code === 0) {
          ElMessage.success(json.msg || '删除成功');
          fetchList();
        } else {
          ElMessage.error((json && json.msg) || '删除失败');
        }
      }

      async function doBatchDelete() {
        if (!batchDeleteEnabled.value) return;
        await ElMessageBox.confirm(`确定删除选中的 ${selectedCount.value} 条视频？`, '提示', { type: 'warning' });
        const ids = selection.value.map(r => r.id);
        const body = new URLSearchParams();
        ids.forEach(id => body.append('ids[]', String(id)));
        const resp = await fetch('/admin.php/video/batchDelete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
          body: body.toString(),
          credentials: 'same-origin',
        });
        const json = await resp.json();
        if (json && json.code === 0) {
          ElMessage.success(json.msg || '批量删除成功');
          selection.value = [];
          fetchList();
        } else {
          ElMessage.error((json && json.msg) || '批量删除失败');
        }
      }

      async function copyText(text) {
        const t = String(text || '');
        if (!t) return;
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(t);
          } else {
            const tmp = document.createElement('input');
            tmp.value = t;
            document.body.appendChild(tmp);
            tmp.select();
            document.execCommand('copy');
            document.body.removeChild(tmp);
          }
          ElMessage.success('已复制');
        } catch (e) {
          ElMessage.error('复制失败');
        }
      }

      function openUpload() {
        // cache-bust，避免弹窗内页面缓存旧状态
        uploadIframeSrc.value = '/admin.php/video/batchUpload?_t=' + Date.now();
        uploadVisible.value = true;
      }

      function onUploadIframeLoad() {
        try {
          const frameEl = uploadFrame.value;
          if (!frameEl || !frameEl.contentDocument) return;
          const doc = frameEl.contentDocument;

          // 隐藏后台壳：侧栏/顶栏/页脚/面包屑，只保留上传表单主体
          const hideSelectors = [
            '.main-sidebar',
            '.main-header',
            '.main-footer',
            '.content-header',
            '.brand-link',
            '.toast-container',
          ];
          hideSelectors.forEach((sel) => {
            doc.querySelectorAll(sel).forEach((el) => {
              el.style.display = 'none';
            });
          });

          // 归零布局偏移（AdminLTE 默认 content-wrapper 有 margin-left）
          const cw = doc.querySelector('.content-wrapper');
          if (cw) {
            cw.style.marginLeft = '0';
            cw.style.padding = '0';
            cw.style.background = 'transparent';
          }
          const container = doc.querySelector('.content-wrapper .container-fluid');
          if (container) {
            container.style.paddingLeft = '0';
            container.style.paddingRight = '0';
          }

          // 页面背景与滚动优化
          doc.documentElement.style.background = 'transparent';
          doc.body.style.background = 'transparent';
          doc.body.style.overflowX = 'hidden';

          // 让卡片更贴合弹窗宽度
          doc.querySelectorAll('.card').forEach((el) => {
            el.style.borderRadius = '12px';
            el.style.boxShadow = 'none';
          });
        } catch (e) {
          // 同源失败或结构变化时静默
        }
      }

      function onUploadDialogClose() {
        // 上传完成后用户通常会关闭弹窗，这里直接刷新列表即可
        page.value = 1;
        fetchList();
      }

      onMounted(() => {
        fetchList();
      });

      return {
        loading, tableData, total, page, pageSize,
        filters, selection, selectedCount, batchDeleteEnabled,
        PLATFORM_OPTIONS, DEVICE_OPTIONS, PRODUCT_OPTIONS,
        uploadVisible, uploadIframeSrc, uploadFrame, onUploadIframeLoad, onUploadDialogClose,
        tableRef, fetchList, onSortChange, onSearch, onReset, onSelectionChange, invertSelection,
        goEdit, doDelete, doBatchDelete, copyText, openUpload, tt,
      };
    },
    template: `
      <div class="page-container">
        <div class="modern-card">
          <div class="header-actions">
            <div class="breadcrumb">${lang==='en'?'Home / Library / Videos':'首页 / 素材 / 视频管理'}</div>
            <div class="action-buttons">
              <el-button type="primary" class="btn-primary" @click="openUpload">${lang==='en'?'Upload':'上传'}</el-button>
              <el-button type="danger" plain class="btn-danger" :disabled="!batchDeleteEnabled" @click="doBatchDelete">${lang==='en'?'Batch delete':'批量删除'}</el-button>
              <span v-if="selectedCount" style="font-size:12px; color:#6b7280; margin-left:6px;">已选择 {{selectedCount}} 条</span>
            </div>
          </div>

          <div class="filter-section">
            <el-form :inline="true" class="custom-form" @submit.prevent>
              <el-form-item>
                <el-select v-model="filters.platform_ids" multiple clearable collapse-tags collapse-tags-tooltip :placeholder="lang==='en'?'Platform':'平台'" style="width: 140px;">
                  <el-option v-for="o in PLATFORM_OPTIONS" :key="o.id" :label="o.label" :value="o.id" />
                </el-select>
              </el-form-item>
              <el-form-item>
                <el-select v-model="filters.device_ids" multiple clearable collapse-tags collapse-tags-tooltip :placeholder="lang==='en'?'Device':'设备'" style="width: 140px;">
                  <el-option v-for="o in DEVICE_OPTIONS" :key="o.id" :label="o.label" :value="o.id" />
                </el-select>
              </el-form-item>
              <el-form-item>
                <el-select v-model="filters.product_ids" multiple clearable collapse-tags collapse-tags-tooltip :placeholder="lang==='en'?'Product':'商品'" style="width: 140px;">
                  <el-option v-for="o in PRODUCT_OPTIONS" :key="o.id" :label="o.label" :value="o.id" />
                </el-select>
              </el-form-item>
              <el-form-item>
                <el-select v-model="filters.is_downloaded" multiple clearable collapse-tags :placeholder="lang==='en'?'Download status':'下载状态'" style="width: 140px;">
                  <el-option :label="lang==='en'?'Not downloaded':'未下载'" :value="0" />
                  <el-option :label="lang==='en'?'Downloaded':'已下载'" :value="1" />
                </el-select>
              </el-form-item>
              <el-form-item class="search-input-item">
                <el-input v-model="filters.keyword" :placeholder="lang==='en'?'Search title or URL':'搜索标题或视频链接'" style="width: 240px;" @keyup.enter="onSearch" />
              </el-form-item>
              <el-form-item class="filter-buttons">
                <el-button type="primary" plain @click="onSearch">{{ tt('common.filter') }}</el-button>
                <el-button @click="onReset">{{ tt('common.reset') }}</el-button>
              </el-form-item>
            </el-form>
          </div>

          <div class="admin-table-scroll">
            <el-table
              :data="tableData"
              style="width: 100%"
              stripe
              v-loading="loading"
              ref="tableRef"
              row-key="id"
              :default-sort="{ prop: 'created_at', order: 'descending' }"
              @selection-change="onSelectionChange"
              @sort-change="onSortChange"
              :header-cell-style="{ backgroundColor: '#f9fafb', color: '#6b7280', height: '54px', fontSize: '14px', fontWeight: '600', borderBottom: '1px solid #e5e7eb' }"
              :cell-style="{ padding: '10px 0', borderBottom: '1px solid #f3f4f6' }"
            >
              <el-table-column type="selection" width="55" />

            <el-table-column :label="lang==='en'?'Cover':'封面'" width="100">
              <template #default="scope">
                <el-image class="cover-image" :src="scope.row.cover_url || scope.row.video_url || '/static/default-cover.svg'" fit="cover">
                  <template #error>
                    <div class="image-placeholder">暂无</div>
                  </template>
                </el-image>
              </template>
            </el-table-column>

            <el-table-column :label="lang==='en'?'Title / ID':'标题 / ID'" min-width="200">
              <template #default="scope">
                <div class="title-column">
                  <span class="main-title">{{ scope.row.title || '—' }}</span>
                  <span class="sub-id">ID {{ scope.row.id }}</span>
                </div>
              </template>
            </el-table-column>

            <el-table-column prop="created_at" :label="lang==='en'?'Time':'时间'" sortable="custom" min-width="180" />

            <el-table-column :label="lang==='en'?'Platform':'平台'" width="120">
              <template #default="scope">
                <el-tag type="info" effect="light" class="custom-tag">
                  {{ (scope.row.platform && scope.row.platform.name) || '—' }}
                </el-tag>
              </template>
            </el-table-column>

            <el-table-column :label="lang==='en'?'Status':'状态'" width="120">
              <template #default="scope">
                <el-tag v-if="scope.row.is_downloaded === 1" type="success" effect="light" class="custom-tag">{{ lang==='en'?'Downloaded':'已下载' }}</el-tag>
                <el-tag v-else type="warning" effect="light" class="custom-tag">{{ lang==='en'?'Not downloaded':'未下载' }}</el-tag>
              </template>
            </el-table-column>

            <el-table-column :label="lang==='en'?'Actions':'操作'" width="100" fixed="right">
              <template #default="scope">
                <el-dropdown trigger="click">
                  <el-button type="primary" link class="action-link">{{ lang==='en'?'Actions':'操作' }}</el-button>
                  <template #dropdown>
                    <el-dropdown-menu>
                      <el-dropdown-item @click="copyText(scope.row.video_url)">{{ lang==='en'?'Copy URL':'复制链接' }}</el-dropdown-item>
                      <el-dropdown-item @click="goEdit(scope.row)">{{ tt('common.edit') }}</el-dropdown-item>
                      <el-dropdown-item divided @click="doDelete(scope.row)">{{ tt('common.delete') }}</el-dropdown-item>
                    </el-dropdown-menu>
                  </template>
                </el-dropdown>
              </template>
            </el-table-column>

            <template #empty>
              <div style="padding: 28px 0; text-align:center; color:#6b7280;">{{ lang==='en'?'No videos':'暂无视频数据' }}</div>
            </template>
            </el-table>
          </div>

          <div class="footer-pagination">
            <el-button @click="invertSelection" :disabled="!tableData.length">反选</el-button>
            <el-pagination
              background
              layout="total, prev, pager, next, sizes"
              :total="total"
              :page-size="pageSize"
              :current-page="page"
              :page-sizes="[10,20,50,100]"
              @update:current-page="(p)=>{page=p; fetchList();}"
              @update:page-size="(s)=>{pageSize=s; page=1; fetchList();}"
            />
          </div>

          <el-dialog
            class="upload-dialog"
            v-model="uploadVisible"
            :title="lang==='en'?'Upload':'上传视频'"
            width="920px"
            :destroy-on-close="true"
            @closed="onUploadDialogClose"
          >
            <iframe class="upload-iframe" ref="uploadFrame" :src="uploadIframeSrc" @load="onUploadIframeLoad"></iframe>
          </el-dialog>
        </div>
      </div>
    `
  }).use(ElementPlus).mount('#videoApp');
  {/literal}
</script>
{/block}
