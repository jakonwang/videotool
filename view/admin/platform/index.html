{extend name="admin/common/layout" /}

{block name="title"}平台{/block}
{block name="page_title"}{/block}
{block name="breadcrumb"}{/block}
{block name="page_actions"}{/block}

{block name="style"}
<style>
    .content-header { display: none; }
    /* High-Density Modern（仅该页生效，风格与商品/达人链统一�?*/
    .tp-ep-wrap {
        padding: 24px;
        background: #f4f6f8;
        min-height: calc(100vh - 0px);
    }
    .admin-plat-card {
        background: #ffffff;
        padding: 24px;
        border-radius: 10px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.03);
    }
    .admin-plat-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
    }
    .admin-plat-breadcrumb {
        font-size: 13px;
        color: #909399;
        line-height: 18px;
        margin-bottom: 6px;
    }
    .admin-plat-title {
        font-size: 20px;
        font-weight: 700;
        color: #111827;
        line-height: 28px;
    }
    .admin-plat-actions .el-button { border-radius: 6px; }
    .admin-plat-filters {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: nowrap;
        overflow-x: hidden;
        padding-bottom: 0;
        margin-bottom: 12px;
    }
    @media (max-width: 1200px) {
        .admin-plat-filters { overflow-x: auto; padding-bottom: 4px; }
    }
    .admin-plat-filter-actions {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 0 0 auto;
        margin-left: auto;
    }
    .name-cell {
        font-weight: 500;
        color: #303133;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .code-cell {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 12px;
        color: #374151;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        padding: 2px 8px;
        display: inline-flex;
        align-items: center;
        line-height: 18px;
    }
    .link-cell {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 320px;
        max-width: 560px;
    }
    .link-text {
        flex: 1 1 auto;
        min-width: 0;
        color: #4b5563;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-size: 13px;
    }
    .admin-plat-card .el-table__inner-wrapper::before { height: 0; }
    .admin-plat-footer {
        display: flex;
        justify-content: flex-end;
        margin-top: 20px;
    }
</style>
{/block}

{block name="content"}
<div class="tp-ep-wrap" id="platformApp"></div>
{/block}

{block name="script"}
<!-- Vue3 + ElementPlus（CDN�?-->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.min.css">
<script src="/static/i18n/i18n.js?v=20260408_ops3"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.38/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.full.min.js"></script>
<script>
  {literal}
  const { createApp, reactive, ref, computed, onMounted } = Vue;
  const { ElMessage, ElMessageBox } = ElementPlus;
  const i18n = window.AppI18n;
  const lang = i18n ? i18n.getLang('zh') : 'zh';
  const tt = (k, vars) => (i18n ? i18n.t(k, vars || null, lang) : k);

  const headerCellStyle = {
    backgroundColor: '#F9FAFB',
    color: '#4B5563',
    fontWeight: '600',
    height: '48px',
    borderBottom: '1px solid #E5E7EB',
  };

  const cellStyle = {
    padding: '12px 0',
  };

  function toSort(order) {
    if (order === 'ascending') return 'asc';
    if (order === 'descending') return 'desc';
    return '';
  }

  createApp({
    setup() {
      const loading = ref(false);
      const items = ref([]);
      const total = ref(0);
      const page = ref(1);
      const pageSize = ref(10);
      const sortProp = ref('id');
      const sortOrder = ref('desc');

      const query = reactive({
        keyword: '',
        status: '',
      });

      async function fetchList() {
        loading.value = true;
        try {
          const params = new URLSearchParams();
          params.set('page', String(page.value));
          params.set('page_size', String(pageSize.value));
          if (query.keyword) params.set('keyword', query.keyword);
          if (query.status !== '' && query.status !== null) params.set('status', String(query.status));
          if (sortProp.value) params.set('sort_prop', sortProp.value);
          if (sortOrder.value) params.set('sort_order', sortOrder.value);

          const res = await fetch('/admin.php/platform/list?' + params.toString(), { credentials: 'same-origin' });
          const json = await res.json();
          if (!json || json.code !== 0) throw new Error((json && json.msg) || tt('common.loadingFailed'));
          items.value = (json.data && json.data.items) ? json.data.items : [];
          total.value = (json.data && json.data.total) ? json.data.total : 0;
        } catch (e) {
          ElMessage.error(e && e.message ? e.message : tt('common.loadingFailed'));
        } finally {
          loading.value = false;
        }
      }

      function onSearch() {
        page.value = 1;
        fetchList();
      }

      function onReset() {
        query.keyword = '';
        query.status = '';
        page.value = 1;
        fetchList();
      }

      function onSortChange({ prop, order }) {
        if (!prop) return;
        sortProp.value = prop;
        sortOrder.value = toSort(order) || 'desc';
        page.value = 1;
        fetchList();
      }

      function goAdd() {
        window.location.href = '/admin.php/platform/add';
      }

      function goEdit(row) {
        window.location.href = '/admin.php/platform/edit/' + row.id;
      }

      async function copyText(text) {
        const t = String(text || '');
        if (!t) return;
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(t);
          } else {
            const tmp = document.createElement('input');
            tmp.value = t;
            document.body.appendChild(tmp);
            tmp.select();
            document.execCommand('copy');
            document.body.removeChild(tmp);
          }
          ElMessage.success('已复制链�?);
        } catch (e) {
          ElMessage.error(lang === 'en' ? 'Copy failed' : '复制失败');
        }
      }

      function openLink(row) {
        const url = row && row.link ? String(row.link) : '';
        if (!url) return;
        window.open(url, '_blank', 'noopener');
      }

      async function doDelete(row) {
        await ElMessageBox.confirm(`确定要删除平台�?{row.name || ''}」吗？删除后关联的设备与视频将一并移除。`, '删除确认', { type: 'warning' });
        const resp = await fetch('/admin.php/platform/delete/' + row.id, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
          body: '',
          credentials: 'same-origin',
        });
        const json = await resp.json();
        if (json && json.code === 0) {
          ElMessage.success(json.msg || '删除成功');
          const maxPage = Math.max(1, Math.ceil(Math.max(0, total.value - 1) / pageSize.value));
          page.value = Math.min(page.value, maxPage);
          fetchList();
        } else {
          ElMessage.error((json && json.msg) || '删除失败');
        }
      }

      const rows = computed(() => items.value || []);

      onMounted(() => fetchList());

      return {
        loading,
        query,
        rows,
        total,
        page,
        pageSize,
        headerCellStyle,
        cellStyle,
        tt,
        onSearch,
        onReset,
        onSortChange,
        goAdd,
        goEdit,
        copyText,
        openLink,
        doDelete,
        fetchList,
      };
    },
    template: `
      <div class="admin-plat-card">
        <div class="admin-plat-header">
          <div>
            <div class="admin-plat-breadcrumb">${tt('page.platform.breadcrumb')}</div>
            <div class="admin-plat-title">${tt('page.platform.title')}</div>
          </div>
          <div class="admin-plat-actions">
            <el-button size="default" type="primary" style="border-radius:6px" @click="goAdd">${tt('page.platform.add')}</el-button>
          </div>
        </div>

        <div class="admin-plat-filters">
          <el-input
            v-model="query.keyword"
            size="default"
            clearable
            :placeholder="tt('page.platform.searchNameCode')"
            style="width:260px; flex:0 0 auto;"
            @keyup.enter="onSearch"
          />
          <el-select v-model="query.status" size="default" clearable :placeholder="tt('common.statusAll')" style="width:140px; flex:0 0 auto;">
            <el-option :label="tt('common.statusEnabled')" value="1" />
            <el-option :label="tt('common.statusDisabled')" value="0" />
          </el-select>

          <div class="admin-plat-filter-actions">
            <el-button size="default" type="primary" @click="onSearch">{{ tt('common.filter') }}</el-button>
            <el-button size="default" @click="onReset">{{ tt('common.reset') }}</el-button>
          </div>
        </div>

        <el-table
          :data="rows"
          stripe
          row-key="id"
          v-loading="loading"
          :header-cell-style="headerCellStyle"
          :cell-style="cellStyle"
          @sort-change="onSortChange"
        >
          <el-table-column prop="id" label="ID" width="80" sortable="custom" />
          <el-table-column :label="lang==='en'?'Platform name':'平台名称'" min-width="160" sortable="custom" prop="name">
            <template #default="{ row }">
              <div class="name-cell" :title="row.name">{{ row.name || '�? }}</div>
            </template>
          </el-table-column>
          <el-table-column :label="lang==='en'?'Code':'平台代码'" width="160" sortable="custom" prop="code">
            <template #default="{ row }">
              <span class="code-cell">{{ row.code || '�? }}</span>
            </template>
          </el-table-column>
          <el-table-column :label="lang==='en'?'Icon':'图标'" width="120">
            <template #default="{ row }">
              <span v-if="row.icon" v-html="row.icon"></span>
              <span v-else class="text-muted">�?/span>
            </template>
          </el-table-column>
          <el-table-column :label="lang==='en'?'Link':'访问链接'" min-width="360">
            <template #default="{ row }">
              <div class="link-cell">
                <div class="link-text" :title="row.link">{{ row.link || '�? }}</div>
                <el-button size="default" link type="primary" @click="copyText(row.link)">{{ tt('common.copy') }}</el-button>
                <el-button size="default" link type="primary" @click="openLink(row)">{{ tt('common.open') }}</el-button>
              </div>
            </template>
          </el-table-column>
          <el-table-column :label="lang==='en'?'Status':'状�?" width="120" sortable="custom" prop="status">
            <template #default="{ row }">
              <el-tag size="default" effect="light" :type="String(row.status) === '1' ? 'success' : 'info'">
                {{ String(row.status) === '1' ? tt('common.statusEnabled') : tt('common.statusDisabled') }}
              </el-tag>
            </template>
          </el-table-column>
          <el-table-column prop="created_at" :label="lang==='en'?'Created':'创建时间'" min-width="180" sortable="custom" />
          <el-table-column :label="lang==='en'?'Actions':'操作'" width="160" fixed="right">
            <template #default="{ row }">
              <el-button size="default" link type="primary" @click="goEdit(row)">{{ tt('common.edit') }}</el-button>
              <el-button size="default" link type="danger" @click="doDelete(row)">{{ tt('common.delete') }}</el-button>
            </template>
          </el-table-column>

          <template #empty>
            <div style="padding: 28px 0; text-align:center; color:#6b7280;">{{ tt('page.platform.empty') }}</div>
          </template>
        </el-table>

        <div class="admin-plat-footer">
          <el-pagination
            v-model:current-page="page"
            v-model:page-size="pageSize"
            size="default"
            background
            layout="total, prev, pager, next"
            :total="total"
            @update:current-page="(p)=>{ page=p; fetchList(); }"
            @update:page-size="(s)=>{ pageSize=s; page=1; fetchList(); }"
          />
        </div>
      </div>
    `
  }).use(ElementPlus).mount('#platformApp');
  {/literal}
</script>
{/block}
