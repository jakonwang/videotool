{extend name="admin/common/layout" /}

{block name="title"}达人链{/block}
{block name="page_title"}{/block}
{block name="breadcrumb"}{/block}
{block name="page_actions"}{/block}

{block name="style"}
<style>
    .content-header { display: none; }

    /* High-Density Modern（仅该页生效，风格与商品页统一�?*/
    .tp-ep-wrap {
        padding: 24px;
        background: #f4f6f8;
        min-height: calc(100vh - 0px);
    }
    .admin-dist-card {
        background: #ffffff;
        padding: 24px;
        border-radius: 10px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.03);
    }
    .admin-dist-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
    }
    .admin-dist-breadcrumb {
        font-size: 13px;
        color: #909399;
        line-height: 18px;
        margin-bottom: 6px;
    }
    .admin-dist-title {
        font-size: 20px;
        font-weight: 700;
        color: #111827;
        line-height: 28px;
    }
    .admin-dist-actions .el-button { border-radius: 6px; }

    .admin-dist-filters {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: nowrap;
        overflow-x: hidden;
        padding-bottom: 0;
        margin-bottom: 10px;
    }
    @media (max-width: 1200px) {
        .admin-dist-filters { overflow-x: auto; padding-bottom: 4px; }
    }
    .admin-dist-filter-actions {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 0 0 auto;
        margin-left: auto;
    }
    .admin-dist-hint {
        margin: 6px 0 12px;
        color: #6b7280;
        font-size: 12px;
        line-height: 18px;
    }
    .link-cell {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 320px;
        max-width: 560px;
    }
    .link-text {
        flex: 1 1 auto;
        min-width: 0;
        color: #4b5563;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-size: 13px;
    }
    .admin-dist-card .el-table__inner-wrapper::before { height: 0; }
    .admin-dist-footer {
        display: flex;
        justify-content: flex-end;
        margin-top: 20px;
    }
</style>
{/block}

{block name="content"}
<script>
  // 下拉选项：由服务端注入（启用的商品），避免额外接�?  const PRODUCT_OPTIONS = [];
  {volist name="products" id="p"}
  PRODUCT_OPTIONS.push({ id: {$p.id}, label: "{:addslashes((string)$p.name)}" });
  {/volist}
</script>
<div class="tp-ep-wrap" id="distributeApp"></div>
{/block}

{block name="script"}
<!-- Vue3 + ElementPlus（CDN�?-->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.min.css">
<script src="/static/i18n/i18n.js?v=20260408_ops2"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.38/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.full.min.js"></script>
<script>
  {literal}
  const { createApp, reactive, ref, computed, onMounted } = Vue;
  const { ElMessage, ElMessageBox } = ElementPlus;
  const i18n = window.AppI18n;
  const lang = i18n ? i18n.getLang('zh') : 'zh';
  const tt = (k, vars) => (i18n ? i18n.t(k, vars || null, lang) : k);

  const headerCellStyle = {
    backgroundColor: '#F9FAFB',
    color: '#4B5563',
    fontWeight: '600',
    height: '48px',
    borderBottom: '1px solid #E5E7EB',
  };

  const cellStyle = {
    padding: '12px 0',
  };

  createApp({
    setup() {
      const loading = ref(false);
      const items = ref([]);
      const total = ref(0);
      const page = ref(1);
      const pageSize = ref(10);

      const query = reactive({
        product_id: 0,
      });

      const productOptions = computed(() => (Array.isArray(PRODUCT_OPTIONS) ? PRODUCT_OPTIONS : []));

      async function fetchList() {
        loading.value = true;
        try {
          const params = new URLSearchParams();
          params.set('page', String(page.value));
          params.set('page_size', String(pageSize.value));
          if (query.product_id && Number(query.product_id) > 0) {
            params.set('product_id', String(query.product_id));
          }

          const res = await fetch('/admin.php/distribute/list?' + params.toString(), { credentials: 'same-origin' });
          const json = await res.json();
          if (!json || json.code !== 0) throw new Error((json && json.msg) || tt('common.loadingFailed'));
          items.value = (json.data && json.data.items) ? json.data.items : [];
          total.value = (json.data && json.data.total) ? json.data.total : 0;
        } catch (e) {
          ElMessage.error(e && e.message ? e.message : tt('common.loadingFailed'));
        } finally {
          loading.value = false;
        }
      }

      function onSearch() {
        page.value = 1;
        fetchList();
      }

      function onReset() {
        query.product_id = 0;
        page.value = 1;
        fetchList();
      }

      function goAdd() {
        window.location.href = '/admin.php/distribute/add';
      }

      async function copyText(text) {
        const t = String(text || '');
        if (!t) return;
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(t);
          } else {
            const tmp = document.createElement('input');
            tmp.value = t;
            document.body.appendChild(tmp);
            tmp.select();
            document.execCommand('copy');
            document.body.removeChild(tmp);
          }
          ElMessage.success(tt('common.copyDone'));
        } catch (e) {
          ElMessage.error(tt('common.copyFail'));
        }
      }

      function openLink(row) {
        const url = row && row.link ? String(row.link) : '';
        if (!url) return;
        window.open(url, '_blank', 'noopener');
      }

      async function doToggle(row) {
        const id = row && row.id ? row.id : 0;
        if (!id) return;
        const resp = await fetch('/admin.php/distribute/toggle/' + id, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
          body: '',
          credentials: 'same-origin',
        });
        const json = await resp.json();
        if (json && json.code === 0) {
          ElMessage.success(json.msg || tt('common.updated'));
          fetchList();
        } else {
          ElMessage.error((json && json.msg) || tt('page.distribute.opFail'));
        }
      }

      async function doDelete(row) {
        const id = row && row.id ? row.id : 0;
        if (!id) return;
        try {
          await ElMessageBox.confirm(tt('page.distribute.deleteConfirm'), tt('page.distribute.deleteTitle'), {
            type: 'warning',
            confirmButtonText: tt('common.delete'),
            cancelButtonText: tt('common.cancel'),
          });
        } catch {
          return;
        }
        const resp = await fetch('/admin.php/distribute/delete/' + id, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
          body: '',
          credentials: 'same-origin',
        });
        const json = await resp.json();
        if (json && json.code === 0) {
          ElMessage.success(json.msg || tt('common.deleted'));
          const maxPage = Math.max(1, Math.ceil(Math.max(0, total.value - 1) / pageSize.value));
          page.value = Math.min(page.value, maxPage);
          fetchList();
        } else {
          ElMessage.error((json && json.msg) || tt('page.distribute.deleteFail'));
        }
      }

      const rows = computed(() => items.value || []);

      onMounted(() => {
        fetchList();
      });

      return {
        loading,
        query,
        rows,
        total,
        page,
        pageSize,
        productOptions,
        headerCellStyle,
        cellStyle,
        tt,
        onSearch,
        onReset,
        goAdd,
        copyText,
        openLink,
        doToggle,
        doDelete,
        fetchList,
      };
    },
    template: `
      <div class="admin-dist-card">
        <div class="admin-dist-header">
          <div>
            <div class="admin-dist-breadcrumb">{{ tt('page.distribute.breadcrumb') }}</div>
            <div class="admin-dist-title">{{ tt('page.distribute.title') }}</div>
          </div>
          <div class="admin-dist-actions">
            <el-button size="default" type="primary" style="border-radius:6px" @click="goAdd">{{ tt('page.distribute.add') }}</el-button>
          </div>
        </div>

        <div class="admin-dist-filters">
          <el-select v-model="query.product_id" size="default" clearable :placeholder="tt('page.distribute.allProducts')" style="width: 260px; flex:0 0 auto;">
            <el-option :label="tt('page.distribute.allProducts')" :value="0" />
            <el-option v-for="o in productOptions" :key="o.id" :label="o.label" :value="o.id" />
          </el-select>

          <div class="admin-dist-filter-actions">
            <el-button size="default" type="primary" @click="onSearch">{{ tt('common.filter') }}</el-button>
            <el-button size="default" @click="onReset">{{ tt('common.reset') }}</el-button>
          </div>
        </div>

        <div class="admin-dist-hint">
          {{ tt('page.distribute.hint') }}
        </div>

        <el-table
          :data="rows"
          stripe
          row-key="id"
          v-loading="loading"
          :header-cell-style="headerCellStyle"
          :cell-style="cellStyle"
        >
          <el-table-column prop="id" label="ID" width="80" />
          <el-table-column :label="tt('page.distribute.colProduct')" min-width="160">
            <template #default="{ row }">
              <div style="font-weight:500; color:#303133;">
                {{ (row.product && row.product.name) ? row.product.name : tt('page.styleSearch.emDash') }}
              </div>
            </template>
          </el-table-column>
          <el-table-column :label="tt('page.distribute.colCreator')" min-width="140">
            <template #default="{ row }">
              <span v-if="row.influencer && row.influencer.tiktok_id" style="color:#303133; font-weight:500;">
                {{ row.influencer.tiktok_id }}
                <span v-if="row.influencer.nickname" style="color:#6b7280; font-weight:400;"> · {{ row.influencer.nickname }}</span>
              </span>
              <span v-else style="color:#9ca3af;">{{ tt('page.styleSearch.emDash') }}</span>
            </template>
          </el-table-column>
          <el-table-column :label="tt('page.distribute.colNote')" min-width="160">
            <template #default="{ row }">
              <span style="color:#4b5563;">{{ row.label || tt('page.styleSearch.emDash') }}</span>
            </template>
          </el-table-column>
          <el-table-column :label="tt('page.distribute.colLink')" min-width="360">
            <template #default="{ row }">
              <div class="link-cell">
                <div class="link-text" :title="row.link">{{ row.link || tt('page.styleSearch.emDash') }}</div>
                <el-button size="default" link type="primary" @click="copyText(row.link)">{{ tt('common.copy') }}</el-button>
                <el-button size="default" link type="primary" @click="openLink(row)">{{ tt('common.open') }}</el-button>
              </div>
            </template>
          </el-table-column>
          <el-table-column :label="tt('page.distribute.colStatus')" width="120">
            <template #default="{ row }">
              <el-tag size="default" effect="light" :type="String(row.status) === '1' ? 'success' : 'info'">
                {{ String(row.status) === '1' ? tt('common.statusEnabled') : tt('common.statusDisabled') }}
              </el-tag>
            </template>
          </el-table-column>
          <el-table-column prop="created_at" :label="tt('page.distribute.colCreated')" min-width="180" />
          <el-table-column :label="tt('page.distribute.colActions')" width="180" fixed="right">
            <template #default="{ row }">
              <el-button size="default" link type="primary" @click="doToggle(row)">{{ tt('page.distribute.toggle') }}</el-button>
              <el-button size="default" link type="danger" @click="doDelete(row)">{{ tt('common.delete') }}</el-button>
            </template>
          </el-table-column>

          <template #empty>
            <div style="padding: 28px 0; text-align:center; color:#6b7280;">{{ tt('page.distribute.empty') }}</div>
          </template>
        </el-table>

        <div class="admin-dist-footer">
          <el-pagination
            v-model:current-page="page"
            v-model:page-size="pageSize"
            size="default"
            background
            layout="total, prev, pager, next"
            :total="total"
            @update:current-page="(p)=>{ page=p; fetchList(); }"
            @update:page-size="(s)=>{ pageSize=s; page=1; fetchList(); }"
          />
        </div>
      </div>
    `
  }).use(ElementPlus).mount('#distributeApp');
  {/literal}
</script>
{/block}
