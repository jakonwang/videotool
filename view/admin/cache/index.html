{block name="style"}
<style>
    .content-header { display: none; }
    /* High-Density Modern（仅该页生效�?*/

        padding: 24px;

        display: flex;
        align-items: flex-start;

        margin-bottom: 0;
    }
    .admin-cache-breadcrumb {
        font-size: 13px;

        line-height: 18px;

    }
    .admin-cache-title {
        font-size: 20px;

    .admin-cache-actions {

    .admin-cache-alert {

    .code-chip {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;

        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;

    }

    .admin-cache-stats {
        display: grid;

        background: #ffffff;

{block name="content"}
<div class="tp-ep-wrap" id="cacheApp"></div>
{/block}

{block name="script"}
<!-- Vue3 + ElementPlus（CDN�?-->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.min.css">
<script src="/static/i18n/i18n.js?v=20260408_ops3"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.38/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js"></script>
<script>
  {literal}
  const { createApp, ref, reactive, computed, onMounted } = Vue;
  const { ElMessage, ElMessageBox } = ElementPlus;
  const { Refresh, Delete, Search, CopyDocument, Document, Coin, TrendCharts, Folder } = ElementPlusIconsVue;
  const i18n = window.AppI18n;
  const lang = i18n ? i18n.getLang('zh') : 'zh';
  const tt = (k, vars) => (i18n ? i18n.t(k, vars || null, lang) : k);

  const headerCellStyle = {
    backgroundColor: '#F9FAFB',
    color: '#4B5563',
    fontWeight: '600',
    height: '48px',
    borderBottom: '1px solid #E5E7EB'
  };

  const cellStyle = { padding: '12px 0' };

  createApp({
    setup() {
      const loading = ref(false);
      const keyword = ref('');
      const rows = ref([]);
      const total = ref(0);
      const page = ref(1);
      const pageSize = ref(10);

      const stats = reactive({
        total_files: 0,
        total_size_human: '0 B',
        expire_seconds: null,
        root: '-',
      });
      const isEnabled = ref(true);

      const expireText = computed(() => {
        if (!stats.expire_seconds) return '无限�?;
        const h = Math.round((Number(stats.expire_seconds) / 3600) * 10) / 10;
        return `${h} h`;
      });

      async function fetchList() {
        loading.value = true;
        try {
          const params = new URLSearchParams();
          params.set('page', String(page.value));
          params.set('page_size', String(pageSize.value));
          if (keyword.value.trim()) params.set('keyword', keyword.value.trim());

          const res = await fetch('/admin.php/cache/list?' + params.toString(), { credentials: 'same-origin' });
          const json = await res.json();
          if (!json || json.code !== 0) throw new Error((json && json.msg) || tt('common.loadingFailed'));

          rows.value = (json.data && json.data.items) ? json.data.items : [];
          total.value = (json.data && json.data.total) ? json.data.total : 0;

          const s = (json.data && json.data.stats) ? json.data.stats : null;
          if (s) {
            stats.total_files = s.total_files ?? 0;
            stats.total_size_human = s.total_size_human ?? '0 B';
            stats.expire_seconds = s.expire_seconds ?? null;
            stats.root = s.root ?? '-';
          }
          isEnabled.value = !!(json.data && json.data.is_enabled);
        } catch (e) {
          ElMessage.error(e && e.message ? e.message : tt('common.loadingFailed'));
        } finally {
          loading.value = false;
        }
      }

      function onSearch() {
        page.value = 1;
        fetchList();
      }

      function onRefresh() {
        fetchList();
      }

      async function onClear() {
        await ElMessageBox.confirm(
          lang === 'en' ? 'Clear all cache? This action cannot be undone.' : '确认清空所有缓存？该操作无法恢复！',
          lang === 'en' ? 'Confirm' : '清空缓存',
          {
          type: 'warning',
          confirmButtonText: tt('common.ok'),
          cancelButtonText: tt('common.cancel'),
        });
        const resp = await fetch('/admin.php/cache/clear', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
          body: '',
          credentials: 'same-origin',
        });
        const json = await resp.json();
        if (json && json.code === 0) {
          ElMessage.success(json.msg || (lang === 'en' ? 'Cache cleared' : '已清空缓�?));
          page.value = 1;
          fetchList();
        } else {
          ElMessage.error((json && json.msg) || (lang === 'en' ? 'Clear failed' : '清空失败'));
        }
      }

      async function onDelete(row) {
        const hash = row && row.hash ? String(row.hash) : '';
        if (!hash) return;
        await ElMessageBox.confirm(
          lang === 'en' ? 'Delete this cache file?' : '确认删除该缓存文件？',
          lang === 'en' ? 'Confirm' : '删除确认',
          {
          type: 'warning',
          confirmButtonText: tt('common.delete'),
          cancelButtonText: tt('common.cancel'),
        });
        const resp = await fetch('/admin.php/cache/delete/' + hash, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
          body: '',
          credentials: 'same-origin',
        });
        const json = await resp.json();
        if (json && json.code === 0) {
          ElMessage.success(json.msg || (lang === 'en' ? 'Deleted' : '删除成功'));
          const maxPage = Math.max(1, Math.ceil(Math.max(0, total.value - 1) / pageSize.value));
          page.value = Math.min(page.value, maxPage);
          fetchList();
        } else {
          ElMessage.error((json && json.msg) || (lang === 'en' ? 'Delete failed' : '删除失败'));
        }
      }

      async function copyText(text) {
        const t = String(text || '');
        if (!t) return;
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(t);
          } else {
            const tmp = document.createElement('input');
            tmp.value = t;
            document.body.appendChild(tmp);
            tmp.select();
            document.execCommand('copy');
            document.body.removeChild(tmp);
          }
          ElMessage.success(tt('influencer.copied'));
        } catch (e) {
          ElMessage.error(lang === 'en' ? 'Copy failed' : '复制失败');
        }
      }

      const cacheDirText = computed(() => stats.root || '-');

      onMounted(() => fetchList());

      return {
        loading,
        keyword,
        rows,
        total,
        page,
        pageSize,
        stats,
        isEnabled,
        expireText,
        cacheDirText,
        headerCellStyle,
        cellStyle,
        Refresh,
        Delete,
        Search,
        CopyDocument,
        Document,
        Coin,
        TrendCharts,
        Folder,
        tt,
        onSearch,
        onRefresh,
        onClear,
        onDelete,
        copyText,
        fetchList,
      };
    },
    template: `
      <div class="admin-cache-card">
        <div class="admin-cache-header">
          <div>
            <div class="admin-cache-breadcrumb">${tt('page.cache.breadcrumb')}</div>
            <div class="admin-cache-title">${tt('page.cache.title')}</div>
          </div>
          <div class="admin-cache-actions">
            <el-button size="default" :icon="Refresh" @click="onRefresh">{{ tt('common.refresh') }}</el-button>
            <el-button size="default" type="danger" :icon="Delete" @click="onClear">${tt('page.cache.clear')}</el-button>
          </div>
        </div>

        <el-alert v-if="!isEnabled" class="admin-cache-alert" type="warning" show-icon :closable="false">
          <template #title>
            下载缓存尚未启用，请�?<span class="code-chip">config/download_cache.php</span> 或环境变量中开�?<span class="code-chip">download_cache.enabled</span>�?          </template>
        </el-alert>
        <el-alert v-else class="admin-cache-alert" type="warning" show-icon :closable="false">
          <template #title>
            缓存用于加速下载与断点续传；可�?<span class="code-chip">config/download_cache.php</span> 调整策略�?          </template>
        </el-alert>

        <div class="admin-cache-stats">
          <div class="stat-card">
            <div class="stat-left">
              <div class="stat-value">{{ stats.total_files }}</div>
              <div class="stat-label">缓存文件�?/div>
            </div>
            <div class="stat-icon stat-icon--blue"><el-icon><Document/></el-icon></div>
          </div>
          <div class="stat-card">
            <div class="stat-left">
              <div class="stat-value">{{ stats.total_size_human }}</div>
              <div class="stat-label">占用空间</div>
            </div>
            <div class="stat-icon stat-icon--green"><el-icon><Coin/></el-icon></div>
          </div>
          <div class="stat-card">
            <div class="stat-left">
              <div class="stat-value">{{ expireText }}</div>
              <div class="stat-label">缓存有效�?/div>
            </div>
            <div class="stat-icon stat-icon--amber"><el-icon><TrendCharts/></el-icon></div>
          </div>
          <div class="stat-card">
            <div class="stat-left" style="width:100%;">
              <div class="stat-value stat-value--path">
                <el-tooltip :content="cacheDirText" placement="top" :show-after="200">
                  <span class="path-ellipsis">{{ cacheDirText }}</span>
                </el-tooltip>
                <el-button size="default" link type="primary" :icon="CopyDocument" @click="copyText(cacheDirText)" aria-label="复制缓存目录" />
              </div>
              <div class="stat-label">缓存目录</div>
            </div>
            <div class="stat-icon stat-icon--slate"><el-icon><Folder/></el-icon></div>
          </div>
        </div>

        <div class="admin-cache-search">
          <el-input
            v-model="keyword"
            size="default"
            clearable
            class="search-input"
            :prefix-icon="Search"
            :placeholder="tt('page.cache.search')"
            @keyup.enter="onSearch"
          />
        </div>

        <el-table
          :data="rows"
          row-key="hash"
          v-loading="loading"
          :header-cell-style="headerCellStyle"
          :cell-style="cellStyle"
        >
          <el-table-column prop="file_name" :label="lang==='en'?'File':'文件�?" min-width="220" />
          <el-table-column prop="source_url" :label="lang==='en'?'Source URL':'来源 URL'" min-width="320" show-overflow-tooltip />
          <el-table-column prop="size_human" :label="lang==='en'?'Size':'文件大小'" width="120" />
          <el-table-column prop="cached_at_text" :label="lang==='en'?'Cached at':'缓存时间'" width="180" />
          <el-table-column :label="lang==='en'?'Actions':'操作'" width="120" fixed="right">
            <template #default="{ row }">
              <el-button size="default" link type="danger" @click="onDelete(row)">{{ tt('common.delete') }}</el-button>
            </template>
          </el-table-column>
        </el-table>

        <div style="display:flex; justify-content:flex-end; margin-top:20px;">
          <el-pagination
            v-model:current-page="page"
            v-model:page-size="pageSize"
            size="default"
            background
            layout="total, prev, pager, next"
            :total="total"
            @update:current-page="(p)=>{ page=p; fetchList(); }"
            @update:page-size="(s)=>{ pageSize=s; page=1; fetchList(); }"
          />
        </div>
      </div>
    `
  }).use(ElementPlus).mount('#cacheApp');
  {/literal}
</script>
{/block}


</script>
{/block}
