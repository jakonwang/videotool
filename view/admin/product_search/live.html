{extend name="admin/common/layout" /}

{block name="title"}直播选款分析{/block}
{block name="page_title"}<span>直播选款分析</span>{/block}
{block name="breadcrumb"}<span>商机寻款 / 直播选款分析</span>{/block}

{block name="style"}
<style>
  .live-style-layout { display: flex; flex-direction: column; gap: 16px; }
  .live-style-layout .el-tabs__item { font-weight: 600; }
  .live-style-toolbar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 16px; }
  .live-style-toolbar--no-margin { margin-bottom: 0; }
  .live-style-toolbar .el-input,
  .live-style-toolbar .el-select,
  .live-style-toolbar .el-date-editor { width: 220px; max-width: 100%; }
  .live-style-toolbar--compact .el-input,
  .live-style-toolbar--compact .el-select,
  .live-style-toolbar--compact .el-date-editor { width: 200px; }
  .live-style-summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .live-style-summary-card {
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 14px 16px;
    background: #fff;
    min-height: 108px;
    box-shadow: 0 4px 12px rgba(15,23,42,0.04);
  }
  .live-style-summary-card .label { color: #64748b; font-size: 12px; margin-bottom: 8px; font-weight: 600; }
  .live-style-summary-card .value { color: #0f172a; font-size: 24px; font-weight: 700; line-height: 1.15; }
  .live-style-summary-card .value.live-style-money { font-size: 22px; font-weight: 700; letter-spacing: 0.01em; }
  .live-style-summary-card .value.live-style-money-cny { color: #0f766e; font-size: 22px; font-weight: 700; letter-spacing: 0.01em; }
  .live-style-summary-card .value.live-style-value-text { font-size: 16px; line-height: 1.35; font-weight: 600; }
  .live-style-summary-card .sub { color: #64748b; font-size: 12px; margin-top: 8px; }
  .live-style-ranking-toolbar {
    padding: 12px;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    background: #f8fafc;
    margin-bottom: 12px;
  }
  .live-style-tier-tag { font-weight: 600; }
  .live-style-image-box { width: 68px; height: 68px; border-radius: 8px; overflow: hidden; border: 1px solid #e5e7eb; background: #f8fafc; }
  .live-style-image-box .el-image { width: 100%; height: 100%; display: block; cursor: zoom-in; }
  .live-style-muted { color: #64748b; font-size: 12px; }
  .live-style-file-inline { display: inline-flex; align-items: center; gap: 8px; }
  .live-style-section-title { margin: 8px 0 10px; color: #475569; font-size: 13px; font-weight: 700; }
  .live-style-inline-help { display: inline-flex; align-items: center; gap: 8px; }
  .live-style-inline-help .el-button { padding: 0; }
  .live-style-detail-media-bar {
    display: grid;
    grid-template-columns: minmax(220px, 280px) minmax(280px, 1fr) auto auto;
    gap: 12px;
    align-items: center;
    margin-bottom: 16px;
  }
  .live-style-detail-table .el-table__cell { padding-top: 10px; padding-bottom: 10px; }
  .live-style-detail-catalog { margin-top: 16px; }
  .live-style-table-wrap {
    width: 100%;
    overflow: hidden;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    background: #fff;
  }
  .live-style-table-wrap .el-table { width: 100%; }
  .live-style-table-wrap .el-table th.el-table__cell { background: #f8fafc; }
  .live-style-ranking-table .cell { white-space: nowrap; }
  @media (max-width: 768px) {
    .live-style-toolbar .el-input,
    .live-style-toolbar .el-select,
    .live-style-toolbar .el-date-editor { width: 100%; }
    .live-style-summary-grid { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    .live-style-summary-card .value { font-size: 20px; }
    .live-style-detail-media-bar { grid-template-columns: 1fr; }
  }
</style>
{/block}

{block name="content"}
<div id="liveStyleAnalysisApp" class="admin-page-container"></div>
{/block}
