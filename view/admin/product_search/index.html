{extend name="admin/common/layout" /}

{block name="title"}寻款{/block}
{block name="page_title"}{/block}
{block name="breadcrumb"}{/block}
{block name="page_actions"}{/block}

{block name="style"}
<style>
    .content-header { display: none; }
    .admin-modern-card .el-table__inner-wrapper::before { height: 0; }
    .hint-box { font-size: 13px; color: #4b5563; line-height: 1.6; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px 14px; margin-bottom: 14px; }
    .hint-box code { font-size: 12px; }
    .style-img-cell { display: flex; align-items: center; min-height: 68px; }
    .style-img-fallback { font-size: 12px; color: #6b7280; word-break: break-all; line-height: 1.45; max-width: 200px; }
    .import-log-viewer { background: #0f172a; color: #e2e8f0; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 12px; line-height: 1.55; max-height: 240px; overflow-y: auto; padding: 10px 12px; border-radius: 8px; border: 1px solid #334155; }
    .import-log-viewer .log-line { white-space: pre-wrap; word-break: break-word; margin-bottom: 4px; }
</style>
{/block}

{block name="content"}
<div id="productSearchApp" class="admin-page-container"></div>
{/block}

{block name="script"}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.min.css">
<script src="/static/i18n/i18n.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.38/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.full.min.js"></script>
<script>
  {literal}
  const { createApp, reactive, ref, computed, onMounted, onUnmounted } = Vue;
  const { ElMessage, ElMessageBox } = ElementPlus;
  const i18n = window.AppI18n;
  const lang = i18n ? i18n.getLang('zh') : 'zh';

  const apiFetchHeaders = {
    'Accept': 'application/json, text/javascript, */*;q=0.01',
    'X-Requested-With': 'XMLHttpRequest',
  };

  function parseJsonBody(res, text) {
    try { return JSON.parse(text); } catch (e) {
      throw new Error('非 JSON 响应 HTTP ' + res.status);
    }
  }

  async function postForm(url, body) {
    const res = await fetch(url, {
      method: 'POST',
      headers: { ...apiFetchHeaders, 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
      body: typeof body === 'string' ? body : new URLSearchParams(body).toString(),
      credentials: 'same-origin',
    });
    const j = parseJsonBody(res, await res.text());
    if (j && j.code === 401) throw new Error('未登录或会话过期');
    return j;
  }

  createApp({
    setup() {
      const loading = ref(false);
      const items = ref([]);
      const total = ref(0);
      const page = ref(1);
      const pageSize = ref(10);
      const query = reactive({ keyword: '' });
      const pythonOk = ref(false);
      const pythonDiag = ref('');
      const importing = ref(false);
      const fileList = ref([]);
      const tableRef = ref(null);
      const selectedRows = ref([]);
      const batchDeleting = ref(false);
      const aliyunEnabled = ref(false);
      const aliyunPending = ref(0);
      const syncingAliyun = ref(false);
      const visionEnabled = ref(false);
      const visionDescribeOnImport = ref(false);
      const visionDescCount = ref(0);
      const googlePsEnabled = ref(false);
      const volcArkEnabled = ref(false);
      const importDialogVisible = ref(false);
      const importTaskId = ref(0);
      const importPercent = ref(0);
      const importStatusText = ref('');
      const importLogs = ref([]);
      const importDone = ref(false);
      const importTickLoading = ref(false);
      let importPollTimer = null;

      function stopImportPolling() {
        if (importPollTimer) {
          clearInterval(importPollTimer);
          importPollTimer = null;
        }
      }

      async function pollImportTick() {
        if (!importTaskId.value || importDone.value) return;
        if (importTickLoading.value) return;
        importTickLoading.value = true;
        try {
          const res = await fetch('/admin.php/product_search/importTaskTick', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { ...apiFetchHeaders, 'Content-Type': 'application/json; charset=UTF-8' },
            body: JSON.stringify({ task_id: importTaskId.value }),
          });
          const text = await res.text();
          let json = null;
          try {
            json = JSON.parse(text);
          } catch (e) {
            ElMessage.error('进度接口返回非 JSON（HTTP ' + res.status + '）');
            stopImportPolling();
            return;
          }
          if (json && json.code === 401) {
            ElMessage.error('未登录或会话过期');
            stopImportPolling();
            return;
          }
          if (!json || json.code !== 0) {
            ElMessage.error((json && json.msg) || '推进任务失败');
            stopImportPolling();
            return;
          }
          const d = json.data || {};
          importPercent.value = d.percent != null ? Number(d.percent) : 0;
          importStatusText.value = (d.status || '') + ' · 已处理 ' + (d.processed_rows != null ? d.processed_rows : 0) + '/' + (d.total_rows != null ? d.total_rows : '?');
          importLogs.value = Array.isArray(d.logs) ? d.logs.slice(-80) : [];
          if (d.done) {
            importDone.value = true;
            stopImportPolling();
            const msg =
              '导入结束：新增 ' +
              (d.inserted != null ? d.inserted : 0) +
              '，更新 ' +
              (d.updated != null ? d.updated : 0) +
              '，失败 ' +
              (d.failed != null ? d.failed : 0) +
              (d.error_message ? '。' + d.error_message : '');
            if (d.status === 'failed') {
              ElMessage.error(msg);
            } else {
              ElMessage.success(msg);
            }
            const input = document.getElementById('csvFileInput');
            if (input) input.value = '';
            fetchList();
          }
        } catch (e) {
          ElMessage.error(e.message || '轮询失败');
          stopImportPolling();
        } finally {
          importTickLoading.value = false;
        }
      }

      function startImportPolling() {
        stopImportPolling();
        importDone.value = false;
        pollImportTick();
        importPollTimer = setInterval(pollImportTick, 2000);
      }

      async function fetchList() {
        loading.value = true;
        try {
          const p = new URLSearchParams();
          p.set('page', String(page.value));
          p.set('page_size', String(pageSize.value));
          if (query.keyword) p.set('keyword', query.keyword);
          const res = await fetch('/admin.php/product_search/list?' + p.toString(), {
            credentials: 'same-origin',
            headers: { ...apiFetchHeaders },
          });
          const json = parseJsonBody(res, await res.text());
          if (!json || json.code !== 0) throw new Error(json && json.msg ? json.msg : '加载失败');
          items.value = (json.data && json.data.items) ? json.data.items : [];
          total.value = (json.data && json.data.total) ? json.data.total : 0;
          pythonOk.value = !!(json.data && json.data.python_ok);
          pythonDiag.value = (json.data && json.data.python_diag) ? String(json.data.python_diag) : '';
          aliyunEnabled.value = !!(json.data && json.data.aliyun_is_enabled);
          aliyunPending.value = (json.data && json.data.aliyun_is_pending != null) ? Number(json.data.aliyun_is_pending) : 0;
          visionEnabled.value = !!(json.data && json.data.vision_openai_enabled);
          visionDescribeOnImport.value = !!(json.data && json.data.vision_describe_on_import);
          visionDescCount.value = (json.data && json.data.vision_items_with_desc != null) ? Number(json.data.vision_items_with_desc) : 0;
          googlePsEnabled.value = !!(json.data && json.data.google_ps_enabled);
          volcArkEnabled.value = !!(json.data && json.data.volc_ark_enabled);
        } catch (e) {
          ElMessage.error(e.message || '加载失败');
        } finally {
          loading.value = false;
        }
      }

      async function doImport() {
        const input = document.getElementById('csvFileInput');
        if (!input || !input.files || !input.files[0]) {
          ElMessage.warning('请选择 CSV 或 Excel 文件');
          return;
        }
        importing.value = true;
        try {
          const fd = new FormData();
          fd.append('file', input.files[0]);
          const res = await fetch('/admin.php/product_search/importCsv', {
            method: 'POST',
            body: fd,
            credentials: 'same-origin',
            headers: { ...apiFetchHeaders },
          });
          const text = await res.text();
          let json = null;
          try {
            json = JSON.parse(text);
          } catch (parseErr) {
            if (res.status === 413) {
              ElMessage.error(
                '上传体积超过服务器限制（HTTP 413，多为 Nginx）。请在站点 Nginx 的 server 或 location 中设置 client_max_body_size（例如 256m;）并重载 Nginx；同时在 php.ini 将 upload_max_filesize、post_max_size 调到不小于文件大小（如 256M），重启 PHP-FPM / Apache。Excel 含大图时可先压缩或拆成多个文件。'
              );
              return;
            }
            if (res.status === 502) {
              ElMessage.error(
                '网关超时（HTTP 502）：多为导入耗时过长或内存不足，PHP-FPM 被 Nginx 断开。请调大 Nginx fastcgi_read_timeout / fastcgi_send_timeout（如 600s）、PHP max_execution_time 与 memory_limit；PHP-FPM 的 request_terminate_timeout 须大于上述时间。大表请拆成多个 Excel 分批导入（每批几十行）。'
              );
              console.error('importCsv raw:', text);
              return;
            }
            const snippet = (text || '').replace(/\s+/g, ' ').trim().slice(0, 280);
            ElMessage.error(
              '服务器返回非 JSON（HTTP ' + res.status + '）。若为 PHP 报错请查看 runtime/log；另请确认已 composer install、已建表 product_style_items。' +
              (snippet ? ' 片段：' + snippet : '')
            );
            console.error('importCsv raw:', text);
            return;
          }
          if (json && json.code === 401) {
            ElMessage.error('未登录或会话过期');
            return;
          }
          if (json && json.code === 0) {
            const d = json.data || {};
            if (d.mode === 'async' && d.task_id != null) {
              importTaskId.value = Number(d.task_id);
              importPercent.value = 0;
              importLogs.value = [];
              importStatusText.value = '排队中…';
              importDialogVisible.value = true;
              startImportPolling();
              return;
            }
            let msg = (json.msg || '完成') +
              ' 新增' + (d.imported != null ? d.imported : 0) +
              ' 条，更新' + (d.updated != null ? d.updated : 0) +
              ' 条，失败' + (d.failed || 0) + ' 条';
            if (d.vision && d.vision.described_rows != null && d.vision.described_rows > 0) {
              msg += '；AI 描述生成 ' + d.vision.described_rows + ' 行';
            }
            if (d.aliyun && d.aliyun.sync_batch) {
              const s = d.aliyun.sync_batch;
              msg += '；阿里云已传' + (s.ok || 0) + ' 失败' + (s.fail || 0);
              if (d.aliyun.pending > 0) msg += '，队列剩余 ' + d.aliyun.pending + '（可点「同步阿里云」）';
            }
            if (d.google_ps && d.google_ps.enabled) {
              msg += '；Google 索引成功 ' + (d.google_ps.synced_rows || 0) + ' 行';
              if (d.google_ps.failed_rows > 0) msg += '，失败 ' + d.google_ps.failed_rows + '（见控制台 errors）';
            }
            ElMessage.success(msg);
            if (d.errors && d.errors.length) console.warn(d.errors);
            input.value = '';
            fetchList();
          } else {
            ElMessage.error((json && json.msg) || ('导入失败 HTTP ' + res.status));
          }
        } catch (e) {
          ElMessage.error(e.message || '导入失败');
        } finally {
          importing.value = false;
        }
      }

      function closeImportDialog() {
        stopImportPolling();
        importDialogVisible.value = false;
      }

      async function doDelete(row) {
        try {
          const j = await postForm('/admin.php/product_search/delete/' + row.id, {});
          if (j && j.code === 0) {
            ElMessage.success('已删除');
            fetchList();
          } else {
            ElMessage.error((j && j.msg) || '失败');
          }
        } catch (e) {
          ElMessage.error(e.message || '失败');
        }
      }

      function onSelectionChange(rows) {
        selectedRows.value = rows || [];
      }

      async function doBatchDelete() {
        const rows = selectedRows.value;
        if (!rows.length) {
          ElMessage.warning('请先勾选要删除的行');
          return;
        }
        try {
          await ElMessageBox.confirm(
            '确定删除选中的 ' + rows.length + ' 条索引？删除后不可恢复。',
            '批量删除',
            { confirmButtonText: '删除', cancelButtonText: '取消', type: 'warning' }
          );
        } catch {
          return;
        }
        batchDeleting.value = true;
        try {
          const ids = rows.map((r) => r.id);
          const res = await fetch('/admin.php/product_search/batchDelete', {
            method: 'POST',
            headers: { ...apiFetchHeaders, 'Content-Type': 'application/json; charset=UTF-8' },
            body: JSON.stringify({ ids }),
            credentials: 'same-origin',
          });
          const text = await res.text();
          let json;
          try {
            json = JSON.parse(text);
          } catch {
            ElMessage.error('批量删除响应异常 HTTP ' + res.status);
            return;
          }
          if (json.code === 401) {
            ElMessage.error('未登录或会话过期');
            return;
          }
          if (json.code !== 0) {
            ElMessage.error(json.msg || '批量删除失败');
            return;
          }
          ElMessage.success((json.msg || '完成') + '（' + (json.data && json.data.deleted != null ? json.data.deleted : ids.length) + ' 条）');
          selectedRows.value = [];
          tableRef.value && typeof tableRef.value.clearSelection === 'function' && tableRef.value.clearSelection();
          fetchList();
        } catch (e) {
          ElMessage.error(e.message || '批量删除失败');
        } finally {
          batchDeleting.value = false;
        }
      }

      function openH5() {
        window.open('/index.php/searchByImage', '_blank', 'noopener');
      }

      /** 可直链预览的图片地址（http(s)、站内 /、data:image） */
      function imageDisplayUrl(ref) {
        const s = String(ref || '').trim();
        if (!s) return '';
        if (/^https?:\/\//i.test(s)) return s;
        if (s.startsWith('//')) return (window.location && window.location.protocol ? window.location.protocol : 'https:') + s;
        if (s.startsWith('/')) return s;
        if (/^data:image\//i.test(s)) return s;
        return '';
      }
      function isImagePreviewable(ref) {
        return imageDisplayUrl(ref) !== '';
      }

      const editVisible = ref(false);
      const editSaving = ref(false);
      const editImageInputKey = ref(0);
      const editForm = reactive({ id: 0, product_code: '', hot_type: '', image_ref: '' });

      function openEdit(row) {
        editForm.id = row.id;
        editForm.product_code = row.product_code || '';
        editForm.hot_type = row.hot_type || '';
        editForm.image_ref = row.image_ref || '';
        editImageInputKey.value++;
        editVisible.value = true;
      }

      async function saveEdit() {
        if (!String(editForm.product_code || '').trim()) {
          ElMessage.warning('请填写产品编号');
          return;
        }
        editSaving.value = true;
        try {
          const input = document.getElementById('editImageInput');
          const fd = new FormData();
          fd.append('product_code', String(editForm.product_code).trim());
          fd.append('hot_type', String(editForm.hot_type || '').trim());
          fd.append('image_ref', String(editForm.image_ref || '').trim());
          if (input && input.files && input.files[0]) {
            fd.append('image', input.files[0]);
          }
          const res = await fetch('/admin.php/product_search/update/' + editForm.id, {
            method: 'POST',
            body: fd,
            credentials: 'same-origin',
            headers: { ...apiFetchHeaders },
          });
          const text = await res.text();
          let json;
          try {
            json = JSON.parse(text);
          } catch {
            ElMessage.error('保存失败（非 JSON）HTTP ' + res.status);
            return;
          }
          if (json.code === 401) {
            ElMessage.error('未登录或会话过期');
            return;
          }
          if (json.code !== 0) {
            ElMessage.error(json.msg || '保存失败');
            return;
          }
          ElMessage.success('已保存');
          editVisible.value = false;
          fetchList();
        } catch (e) {
          ElMessage.error(e.message || '保存失败');
        } finally {
          editSaving.value = false;
        }
      }

      async function doSyncAliyun() {
        syncingAliyun.value = true;
        try {
          const fd = new URLSearchParams();
          fd.set('max', '400');
          fd.set('seconds', '240');
          const res = await fetch('/admin.php/product_search/syncAliyunQueue', {
            method: 'POST',
            body: fd.toString(),
            credentials: 'same-origin',
            headers: { ...apiFetchHeaders, 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
          });
          const j = parseJsonBody(res, await res.text());
          if (j && j.code === 401) throw new Error('未登录或会话过期');
          if (!j || j.code !== 0) throw new Error((j && j.msg) || '同步失败');
          const s = (j.data && j.data.sync) ? j.data.sync : {};
          aliyunPending.value = (j.data && j.data.pending != null) ? Number(j.data.pending) : 0;
          ElMessage.success('同步批次：成功 ' + (s.ok || 0) + '，失败 ' + (s.fail || 0) + '，剩余队列 ' + aliyunPending.value);
        } catch (e) {
          ElMessage.error(e.message || '同步失败');
        } finally {
          syncingAliyun.value = false;
        }
      }

      onMounted(() => { fetchList(); });
      onUnmounted(() => { stopImportPolling(); });

      return {
        loading, items, total, page, pageSize, query, pythonOk, pythonDiag, importing,
        importDialogVisible, importTaskId, importPercent, importStatusText, importLogs, importDone, importTickLoading,
        closeImportDialog,
        tableRef, selectedRows, batchDeleting, aliyunEnabled, aliyunPending, syncingAliyun, doSyncAliyun,
        visionEnabled, visionDescribeOnImport, visionDescCount, googlePsEnabled, volcArkEnabled,
        editVisible, editSaving, editImageInputKey, editForm,
        fetchList, doImport, doDelete, doBatchDelete, onSelectionChange, openEdit, saveEdit, openH5, lang,
        imageDisplayUrl, isImagePreviewable,
      };
    },
    template: `
      <div class="admin-modern-card">
        <div class="admin-header-actions">
          <div class="admin-breadcrumb">素材 / 寻款</div>
          <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
            <div style="font-size:18px;font-weight:600;color:#111827;">图片搜款式 · 索引管理</div>
            <div class="admin-action-buttons">
              <el-button type="default" @click="openH5">{{ lang==='en' ? 'Open H5' : '打开拍照寻款页' }}</el-button>
              <a class="btn btn-outline-secondary btn-sm" href="/admin.php/product_search/sampleCsv" style="border-radius:8px;">{{ lang==='en' ? 'Sample CSV' : '下载示例 CSV' }}</a>
            </div>
          </div>
        </div>

        <div class="hint-box">
          <div v-if="!pythonOk" style="color:#b45309;margin-bottom:8px;">
            <strong>Python 特征环境未就绪：</strong>服务器需安装 Python3，并在项目根执行
            <code>pip install -r tools/product_style_search/requirements.txt</code>，
            首次运行会下载 MobileNet 权重。Web 进程（如 Apache）的 PATH 常与 CMD 不同；请在 <code>config/product_search.php</code> 的 <code>python_bin</code> 或环境变量 <code>PRODUCT_SEARCH_PYTHON</code> 填写 <strong>python.exe 绝对路径</strong>（Windows）或 <code>which python3</code> 路径（Linux）。
            <div v-if="pythonDiag" style="margin-top:8px;font-size:12px;color:#92400e;word-break:break-all;background:#fffbeb;padding:8px;border-radius:6px;border:1px solid #fde68a;">诊断：{{ pythonDiag }}</div>
          </div>
          <div>支持 <strong>CSV / TXT / Excel（.xlsx、.xls）</strong>，均为<strong>异步导入</strong>（上传后立即返回 <code>task_id</code>，每约 2 秒推进一行，避免网关 502）。表头需能识别「编号/产品编号」与「图片」列（可选「爆款类型」）。CSV 中图片可为链接、站内路径或 Base64；<strong>Excel 可将图片插入「图片」列对应单元格</strong>（嵌入图，无需链接）。若上传报 <strong>HTTP 413</strong>，需在 Nginx 调大 <code>client_max_body_size</code>，并在 PHP 调大 <code>upload_max_filesize</code>、<code>post_max_size</code>。Excel 每步会加载工作簿，超大表请拆文件或改 CSV。异步 tick 依赖 PHP-FPM，请保证 <code>request_terminate_timeout</code> 足够大（见文档）。</div>
          <div v-if="googlePsEnabled" style="margin-top:8px;color:#7c3aed;">已启用 <strong>Google Product Search</strong>：拍照寻款<strong>优先</strong>走 Google；导入会写入 GCS 并注册参考图（索引有延迟）。密钥须放在 public 外，见 <strong>设置</strong>。</div>
          <div v-if="volcArkEnabled" style="margin-top:8px;color:#b45309;">已启用 <strong>火山方舟豆包视觉</strong>：未开 Google 时拍照寻款走国内方舟 API（需在 <strong>设置</strong> 填 Endpoint 与 API Key）。</div>
          <div v-if="volcArkEnabled || visionEnabled" style="margin-top:8px;color:#0f766e;">
            <span v-if="volcArkEnabled"><strong>方舟豆包</strong> 可用于导入时生成 <code>ai_description</code>（优先于 OpenAI）。</span>
            <span v-if="visionEnabled"><strong>OpenAI</strong> 可作识图备选或仅 OpenAI 时生成描述。</span>
            库内已有 AI 描述 <strong>{{ visionDescCount }}</strong> 条。
            <span v-if="visionDescribeOnImport">已在设置中开启「导入时生成描述」。</span>
            <span v-else>若需导入自动写描述，请在 <strong>设置</strong> 勾选「导入时生成视觉描述」。</span>
          </div>
          <div v-if="aliyunEnabled" style="margin-top:8px;color:#1e40af;">已启用 <strong>阿里云图像搜索</strong>（未配 Google/OpenAI 时使用）：导入会入队同步；队列剩余 <strong>{{ aliyunPending }}</strong> 条可点「同步阿里云」。</div>
          <div v-if="!googlePsEnabled && !visionEnabled && !volcArkEnabled && !aliyunEnabled" style="margin-top:8px;color:#64748b;">请在 <strong>系统 → 设置</strong> 启用 <strong>Google</strong> / <strong>火山方舟</strong> / <strong>OpenAI</strong> / <strong>阿里云图搜</strong> 至少一项；新环境需执行 <code>database/run_migration_openai_vision_columns.php</code>（Linux 用正斜杠路径）。</div>
        </div>

        <div class="admin-filter-section">
          <div class="admin-custom-form">
            <el-input v-model="query.keyword" clearable size="default" placeholder="产品编号" style="width:220px;" @keyup.enter="fetchList" />
            <div class="admin-filter-buttons">
              <el-button type="primary" @click="()=>{page=1;fetchList();}">筛选</el-button>
              <input id="csvFileInput" type="file" accept=".csv,.txt,.xlsx,.xls,.xlsm" style="max-width:240px;" />
              <el-button type="success" :loading="importing" @click="doImport">导入</el-button>
              <el-button type="primary" plain :loading="syncingAliyun" :disabled="!aliyunEnabled" @click="doSyncAliyun">同步阿里云</el-button>
              <el-button type="danger" plain :disabled="!selectedRows.length" :loading="batchDeleting" @click="doBatchDelete">批量删除</el-button>
            </div>
          </div>
        </div>

        <el-table ref="tableRef" :data="items" stripe v-loading="loading" row-key="id" @selection-change="onSelectionChange">
          <el-table-column type="selection" width="48" reserve-selection />
          <el-table-column prop="id" label="ID" width="70" />
          <el-table-column prop="product_code" label="产品编号" min-width="120" />
          <el-table-column label="参考图" min-width="120" width="120">
            <template #default="{ row }">
              <div class="style-img-cell">
                <el-image
                  v-if="isImagePreviewable(row.image_ref)"
                  :src="imageDisplayUrl(row.image_ref)"
                  :preview-src-list="[imageDisplayUrl(row.image_ref)]"
                  fit="cover"
                  lazy
                  preview-teleported
                  style="width:64px;height:64px;border-radius:8px;border:1px solid #e5e7eb;cursor:zoom-in;"
                >
                  <template #error>
                    <div class="style-img-fallback" style="max-width:100px;">加载失败</div>
                  </template>
                </el-image>
                <div v-else class="style-img-fallback" :title="row.image_ref">{{ row.image_ref }}</div>
              </div>
            </template>
          </el-table-column>
          <el-table-column prop="hot_type" label="爆款类型" width="120" />
          <el-table-column label="AI特征" min-width="160" show-overflow-tooltip>
            <template #default="{ row }">
              <span style="font-size:12px;color:#374151;">{{ row.ai_description_short || '—' }}</span>
            </template>
          </el-table-column>
          <el-table-column label="向量" width="80">
            <template #default="{ row }">
              <el-tag size="small" :type="row.has_embedding ? 'success' : 'danger'">{{ row.has_embedding ? '已建' : '无' }}</el-tag>
            </template>
          </el-table-column>
          <el-table-column prop="created_at" label="导入时间" width="170" />
          <el-table-column label="操作" width="130" fixed="right">
            <template #default="{ row }">
              <el-button link type="primary" @click="openEdit(row)">编辑</el-button>
              <el-button link type="danger" @click="doDelete(row)">删除</el-button>
            </template>
          </el-table-column>
        </el-table>

        <el-dialog v-model="importDialogVisible" title="导入进度" width="560px" destroy-on-close align-center @closed="closeImportDialog">
          <div style="margin-bottom:12px;font-size:13px;color:#475569;">任务 {{ importTaskId }} · {{ importStatusText }}</div>
          <el-progress :percentage="importPercent" :status="importDone ? 'success' : undefined" />
          <div style="margin-top:14px;font-size:12px;color:#64748b;margin-bottom:6px;">日志</div>
          <div class="import-log-viewer">
            <div v-for="(log, idx) in importLogs" :key="idx" class="log-line">[{{ log.t || '—' }}] {{ log.m || '' }}</div>
            <div v-if="!importLogs.length" class="log-line" style="color:#94a3b8;">等待处理…</div>
          </div>
          <template #footer>
            <el-button @click="closeImportDialog" :disabled="importTickLoading && !importDone">关闭</el-button>
          </template>
        </el-dialog>

        <el-dialog v-model="editVisible" title="编辑索引" width="520px" destroy-on-close align-center>
          <el-form label-width="96px" @submit.prevent>
            <el-form-item label="产品编号">
              <el-input v-model="editForm.product_code" maxlength="128" placeholder="必填" />
            </el-form-item>
            <el-form-item label="爆款类型">
              <el-input v-model="editForm.hot_type" maxlength="200" placeholder="可选" />
            </el-form-item>
            <el-form-item label="参考图">
              <el-input v-model="editForm.image_ref" type="textarea" :rows="3" placeholder="http(s) 链接或 /uploads/... 站内路径" />
              <div style="margin-top:8px;font-size:12px;color:#6b7280;line-height:1.5;">
                修改此处并保存会重新下载/读取图片并<strong>重算向量</strong>。不改图片时请勿清空原文本。
              </div>
              <div style="margin-top:10px;font-size:13px;color:#374151;">或上传新图覆盖：</div>
              <input :key="editImageInputKey" id="editImageInput" type="file" accept=".jpg,.jpeg,.png,.gif,.webp,image/jpeg,image/png" style="margin-top:6px;max-width:100%;font-size:13px;" />
            </el-form-item>
          </el-form>
          <template #footer>
            <el-button @click="editVisible = false">取消</el-button>
            <el-button type="primary" :loading="editSaving" @click="saveEdit">保存</el-button>
          </template>
        </el-dialog>

        <div class="admin-footer-pagination" style="margin-top:16px;">
          <span style="color:#6b7280;font-size:13px;">共 {{ total }} 条</span>
          <el-pagination v-model:current-page="page" v-model:page-size="pageSize" background layout="prev, pager, next"
            :total="total" @update:current-page="(p)=>{page=p;fetchList();}" @update:page-size="(s)=>{pageSize=s;page=1;fetchList();}" />
        </div>
      </div>
    `
  }).use(ElementPlus).mount('#productSearchApp');
  {/literal}
</script>
{/block}
