{block name="script"}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.min.css">
<script src="/static/i18n/i18n.js?v=20260426_style_toolbar_grouped"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.38/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.full.min.js"></script>
<script>
  {literal}
  const { createApp, reactive, ref, computed, onMounted, onUnmounted } = Vue;
  const { ElMessage, ElMessageBox } = ElementPlus;
  const i18n = window.AppI18n;
  const lang = i18n ? i18n.getLang('zh') : 'zh';
  const tt = (k, vars) => (i18n ? i18n.t(k, vars || null, lang) : k);

  const apiFetchHeaders = {
    'Accept': 'application/json, text/javascript, */*;q=0.01',
    'X-Requested-With': 'XMLHttpRequest',
  };

  function parseJsonBody(res, text) {
    try { return JSON.parse(text); } catch (e) {
      throw new Error(tt('page.styleSearch.errNonJson', { status: res.status }));
    }
  }

  async function postForm(url, body) {
    const res = await fetch(url, {
      method: 'POST',
      headers: { ...apiFetchHeaders, 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
      body: typeof body === 'string' ? body : new URLSearchParams(body).toString(),
      credentials: 'same-origin',
    });
    const j = parseJsonBody(res, await res.text());
    if (j && j.code === 401) throw new Error(tt('common.sessionExpired'));
    return j;
  }

  createApp({
    setup() {
      const loading = ref(false);
      const items = ref([]);
      const total = ref(0);
      const page = ref(1);
      const pageSize = ref(15);
      const query = reactive({
        keyword: '',
        category: '',
        price_min: null,
        price_max: null,
        moq_min: null,
      });
      const categoryOptions = ref([]);
      const advancedVisible = ref(false);
      const helpDialogVisible = ref(false);
      const currentRole = ref('super_admin');
      const isAdminView = computed(() => currentRole.value !== 'viewer');
      const pythonOk = ref(false);
      const pythonDiag = ref('');
      const importing = ref(false);
      const selectedIds = ref([]);
      const selectedRows = computed(() => {
        const idSet = new Set(selectedIds.value.map((v) => Number(v)));
        return items.value.filter((row) => idSet.has(Number(row.id)));
      });
      const allCurrentSelected = computed(() => {
        if (!items.value.length) return false;
        const idSet = new Set(selectedIds.value.map((v) => Number(v)));
        return items.value.every((row) => idSet.has(Number(row.id)));
      });
      const imageSearchInputRef = ref(null);
      const imageSearching = ref(false);
      const imageDragOver = ref(false);
      const batchDeleting = ref(false);
      const visionDescribeOnImport = ref(false);
      const visionDescCount = ref(0);
      const volcArkEnabled = ref(false);
      const visionAnyProviderReady = ref(true);
      const importDialogVisible = ref(false);
      const importFileName = ref('');
      const importTaskId = ref(0);
      const importPercent = ref(0);
      const importStatusText = ref('');
      const importLogs = ref([]);
      const importDone = ref(false);
      const importPollError = ref('');
      const detailVisible = ref(false);
      const detailRow = ref(null);
      const aiDialogVisible = ref(false);
      const aiDialogRow = ref(null);
      const DEFAULT_PROFIT_TARGET_MARGIN = 20;
      const profitPosterLoading = ref(false);
      const profitSimForm = reactive({
        logistics_cost_per_kg: 2.5,
        commission_rate: 7,
        return_rate: 5,
        sell_price: null,
      });
      const profitRows = computed(() => computeProfitRows(detailRow.value, profitSimForm));
      let importPollTimer = null;

      function stopImportPolling() {
        if (importPollTimer) {
          clearTimeout(importPollTimer);
          importPollTimer = null;
        }
      }

      async function pollImportTickOnce() {
        if (!importTaskId.value || importDone.value) return;
        importPollError.value = '';
        try {
          const fd = new URLSearchParams();
          fd.set('task_id', String(importTaskId.value));
          const res = await fetch('/admin.php/product_search/importTaskTick', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { ...apiFetchHeaders, 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
            body: fd.toString(),
          });
          const text = await res.text();
          let json = null;
          try {
            json = JSON.parse(text);
          } catch (e) {
            const errMsg = tt('page.styleSearch.nonJsonProgress', { status: res.status });
            importPollError.value = errMsg + (text ? ' ' + String(text).replace(/\s+/g, ' ').slice(0, 200) : '');
            ElMessage.error(errMsg);
            stopImportPolling();
            return;
          }
          if (json && json.code === 401) {
            importPollError.value = tt('common.sessionExpired');
            ElMessage.error(tt('common.sessionExpired'));
            stopImportPolling();
            return;
          }
          if (!json || json.code !== 0) {
            const m = (json && json.msg) || tt('page.styleSearch.taskPushFail');
            importPollError.value = m;
            ElMessage.error(m);
            stopImportPolling();
            return;
          }
          const d = json.data || {};
          importPercent.value = d.percent != null ? Number(d.percent) : 0;
          importStatusText.value = tt('page.styleSearch.tickLine', {
            status: d.status || '',
            processed: d.processed_rows != null ? d.processed_rows : 0,
            total: d.total_rows != null ? d.total_rows : '?',
          });
          importLogs.value = Array.isArray(d.logs) ? d.logs.slice(-80) : [];
          if (d.done) {
            importDone.value = true;
            stopImportPolling();
            const msg = tt('page.styleSearch.importSummary', {
              inserted: d.inserted != null ? d.inserted : 0,
              updated: d.updated != null ? d.updated : 0,
              failed: d.failed != null ? d.failed : 0,
              err: d.error_message ? '。' + d.error_message : '',
            });
            if (d.status === 'failed') {
              ElMessage.error(msg);
            } else {
              ElMessage.success(msg);
            }
            const input = document.getElementById('csvFileInput');
            if (input) input.value = '';
            fetchList();
            return;
          }
        } catch (e) {
          const m = e.message || tt('page.styleSearch.pollFail');
          importPollError.value = m;
          ElMessage.error(m);
          stopImportPolling();
        }
      }

      function startImportPolling() {
        stopImportPolling();
        importDone.value = false;
        importPollError.value = '';
        const loop = async () => {
          if (!importDialogVisible.value || !importTaskId.value || importDone.value) return;
          await pollImportTickOnce();
          if (!importDone.value && importDialogVisible.value && importTaskId.value) {
            importPollTimer = setTimeout(loop, 2000);
          }
        };
        loop();
      }

      function toNumberOrNull(v) {
        if (v === '' || v === null || v === undefined) return null;
        const n = Number(v);
        return Number.isFinite(n) ? n : null;
      }

      function formatPrice(v) {
        const n = Number(v);
        if (!Number.isFinite(n)) return String(v || '');
        return n.toFixed(2);
      }

      function parsePriceLevels(raw) {
        if (!raw) return {};
        try {
          const parsed = typeof raw === 'object' ? raw : JSON.parse(String(raw));
          if (parsed && typeof parsed === 'object') return parsed;
        } catch (_) {}
        return {};
      }

      function buildLevelBadges(raw) {
        const levels = parsePriceLevels(raw);
        const fixed = ['level1', 'level2', 'level3'];
        const typeMap = { level1: 'success', level2: 'warning', level3: 'danger' };
        const badges = [];
        fixed.forEach((key) => {
          if (levels[key] === undefined || levels[key] === null || levels[key] === '') return;
          badges.push({ key, type: typeMap[key], text: key.toUpperCase() + ': ' + formatPrice(levels[key]) });
        });
        Object.keys(levels).forEach((key) => {
          if (fixed.includes(key)) return;
          const v = levels[key];
          if (v === undefined || v === null || v === '') return;
          badges.push({ key, type: 'info', text: key + ': ' + formatPrice(v) });
        });
        return badges;
      }

      function normalizeRow(row) {
        const safe = row || {};
        return { ...safe, level_badges: buildLevelBadges(safe.price_levels_json || '') };
      }

      async function fetchList() {
        loading.value = true;
        try {
          const p = new URLSearchParams();
          p.set('page', String(page.value));
          p.set('page_size', String(pageSize.value));
          if (String(query.keyword || '').trim()) p.set('keyword', String(query.keyword || '').trim());
          if (String(query.category || '').trim()) p.set('category', String(query.category || '').trim());
          const priceMin = toNumberOrNull(query.price_min);
          const priceMax = toNumberOrNull(query.price_max);
          const moqMin = toNumberOrNull(query.moq_min);
          if (priceMin !== null) p.set('price_min', String(priceMin));
          if (priceMax !== null) p.set('price_max', String(priceMax));
          if (moqMin !== null && moqMin > 0) p.set('moq_min', String(Math.floor(moqMin)));
          const res = await fetch('/admin.php/product_search/list?' + p.toString(), {
            credentials: 'same-origin',
            headers: { ...apiFetchHeaders },
          });
          const json = parseJsonBody(res, await res.text());
          if (!json || json.code !== 0) throw new Error(json && json.msg ? json.msg : tt('page.styleSearch.loadFail'));
          const list = (json.data && json.data.items) ? json.data.items : [];
          items.value = Array.isArray(list) ? list.map(normalizeRow) : [];
          total.value = (json.data && json.data.total) ? json.data.total : 0;
          categoryOptions.value = Array.isArray(json.data && json.data.category_options) ? json.data.category_options : [];
          currentRole.value = String((json.data && json.data.current_role) || 'super_admin');
          pythonOk.value = !!(json.data && json.data.python_ok);
          pythonDiag.value = (json.data && json.data.python_diag) ? String(json.data.python_diag) : '';
          visionDescribeOnImport.value = !!(json.data && json.data.vision_describe_on_import);
          visionDescCount.value = (json.data && json.data.vision_items_with_desc != null) ? Number(json.data.vision_items_with_desc) : 0;
          volcArkEnabled.value = !!(json.data && json.data.volc_ark_enabled);
          visionAnyProviderReady.value = json.data && json.data.vision_any_provider_ready != null
            ? !!json.data.vision_any_provider_ready
            : true;
          const pageIdSet = new Set(items.value.map((row) => Number(row.id)));
          selectedIds.value = selectedIds.value.filter((id) => pageIdSet.has(Number(id)));
        } catch (e) {
          ElMessage.error(e.message || tt('page.styleSearch.loadFail'));
        } finally {
          loading.value = false;
        }
      }

      function triggerSearch() {
        page.value = 1;
        fetchList();
      }

      function resetFilters() {
        query.keyword = '';
        query.category = '';
        query.price_min = null;
        query.price_max = null;
        query.moq_min = null;
        page.value = 1;
        fetchList();
      }

      function toggleAdvanced() {
        advancedVisible.value = !advancedVisible.value;
      }

      async function doImport() {
        const input = document.getElementById('csvFileInput');
        if (!input || !input.files || !input.files[0]) {
          ElMessage.warning(tt('page.styleSearch.pickFile'));
          return;
        }
        importing.value = true;
        try {
          const fd = new FormData();
          fd.append('file', input.files[0]);

      function imageDisplayUrl(ref) {
        const s = String(ref || '').trim();
        if (!s) return '';
        if (/^https?:\/\//i.test(s)) return s;
        if (s.startsWith('//')) return (window.location && window.location.protocol ? window.location.protocol : 'https:') + s;

      function toFinite(v, fallback = 0) {
        const n = Number(v);
        return Number.isFinite(n) ? n : fallback;
      }

      function normalizePercent(v, min, max) {
        const n = toFinite(v, min);
        if (n < min) return min;
        if (n > max) return max;
        return n;
      }

      function levelPriceRows(row) {
        const out = [];
        const parsed = parsePriceLevels((row && row.price_levels_json) || '');
        ['level1', 'level2', 'level3'].forEach((key) => {
          if (parsed[key] === undefined || parsed[key] === null || parsed[key] === '') return;
          out.push({
            key,
            level: key.toUpperCase(),
            wholesale_price: Math.max(0, toFinite(parsed[key], 0)),
          });
        });
        if (out.length === 0) {
          out.push({
            key: 'level1',
            level: 'LEVEL1',
            wholesale_price: Math.max(0, toFinite(row && row.wholesale_price, 0)),
          });
        }
        return out.slice(0, 3);
      }

      function computeProfitRows(row, form) {
        if (!row) return [];
        const logistics = Math.max(0, toFinite(form.logistics_cost_per_kg, 0));
        const commission = normalizePercent(form.commission_rate, 0, 95) / 100;
        const returnRate = normalizePercent(form.return_rate, 0, 90) / 100;
        const targetMargin = DEFAULT_PROFIT_TARGET_MARGIN / 100;
        const denominator = (1 - commission) * (1 - returnRate);
        const suggestedDenominator = (1 - targetMargin) * denominator;
        const sellPriceRaw = toFinite(form.sell_price, 0);
        const hasSellOverride = sellPriceRaw > 0;
        return levelPriceRows(row).map((it) => {
          const wholesale = Math.max(0, toFinite(it.wholesale_price, 0));
          const totalCost = wholesale + logistics;
          const suggestedSell = suggestedDenominator > 0 ? (totalCost / suggestedDenominator) : totalCost;
          const usedSell = hasSellOverride ? sellPriceRaw : suggestedSell;
          const netRevenue = usedSell * denominator;
          const grossProfit = netRevenue - totalCost;
          const grossMargin = netRevenue > 0 ? (grossProfit / netRevenue) * 100 : 0;
          return {
            key: it.key,
            level: it.level,
            wholesale_price: wholesale,
            total_cost: totalCost,
            suggested_sell_price: suggestedSell,
            used_sell_price: usedSell,
            gross_profit: grossProfit,
            gross_margin: grossMargin,
          };
        });
      }

      function drawContain(ctx, img, x, y, w, h) {
        const iw = Number(img.width || 0);
        const ih = Number(img.height || 0);
        if (iw <= 0 || ih <= 0) return;
        const scale = Math.min(w / iw, h / ih);
        const dw = iw * scale;
        const dh = ih * scale;
        const dx = x + (w - dw) / 2;
        const dy = y + (h - dh) / 2;
        ctx.drawImage(img, dx, dy, dw, dh);
      }

            ctx.fillText(formatCurrency(r.suggested_sell_price), tableX + 390, y + 53);
            ctx.fillText(formatPercent(r.gross_margin), tableX + 760, y + 53);
          });

          ctx.fillStyle = '#334155';
          ctx.font = '22px sans-serif';
          ctx.fillText(tt('page.styleSearch.profitPosterHint'), 60, 1560);

          const url = canvas.toDataURL('image/png');
          const a = document.createElement('a');
          const code = String(row.product_code || 'style');
          a.href = url;
          a.download = code + '_profit_quote.png';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          ElMessage.success(tt('page.styleSearch.profitPosterReady'));
        } catch (e) {
          ElMessage.error(e.message || tt('page.styleSearch.fail'));
        } finally {
          profitPosterLoading.value = false;
        }
      }

      async function buildSharePoster() {
        if (!shareSourceRow.value) {
          ElMessage.warning(tt('common.noData'));
          return;
        }
        if (!window.QRCode || typeof window.QRCode.toDataURL !== 'function') {
          ElMessage.error(tt('page.styleSearch.qrLibMissing'));
          return;
        }
        shareLoading.value = true;
        try {
          const tokenData = await requestCatalogToken(shareForm.price_level, shareForm.expire_days);
          const catalogUrl = window.location.origin + String(tokenData.url || '');
          const qrDataUrl = await window.QRCode.toDataURL(catalogUrl, {
            width: 320,
            margin: 1,
            color: { dark: '#0f172a', light: '#ffffff' },
          });

          const row = shareSourceRow.value;
          const imageUrl = imageDisplayUrl(row.image_ref) || String(row.image_ref || '');
          const [img, qr] = await Promise.all([loadImage(imageUrl), loadImage(qrDataUrl)]);
          const canvas = document.createElement('canvas');
          canvas.width = 1080;
          canvas.height = 1600;
          const ctx = canvas.getContext('2d');
          if (!ctx) throw new Error(tt('page.styleSearch.fail'));

          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = '#0f172a';
          ctx.font = 'bold 52px sans-serif';
          ctx.fillText(tt('page.styleSearch.posterTitle'), 70, 96);
          ctx.strokeStyle = '#e2e8f0';
          ctx.lineWidth = 2;
          ctx.strokeRect(60, 140, 960, 920);
          drawContain(ctx, img, 70, 150, 940, 900);

          ctx.fillStyle = '#0f172a';
          ctx.font = 'bold 42px sans-serif';
          ctx.fillText(String(row.product_code || '-'), 70, 1128);

          const priceValue = Number(row.wholesale_price || 0);
          ctx.fillStyle = '#334155';
          ctx.font = '36px sans-serif';
          ctx.fillText(tt('page.styleSearch.posterPrice', { price: priceValue.toFixed(2).replace(/\\.00$/, '') }), 70, 1184);
          ctx.fillText(tt('page.styleSearch.posterMinOrder', { qty: Number(row.min_order_qty || 1) }), 70, 1230);

          ctx.fillStyle = '#f8fafc';
          ctx.fillRect(660, 1090, 330, 330);
          ctx.strokeStyle = '#e2e8f0';
          ctx.strokeRect(660, 1090, 330, 330);
          drawContain(ctx, qr, 675, 1105, 300, 300);

          ctx.fillStyle = '#334155';
          ctx.font = '24px sans-serif';
          ctx.fillText(tt('page.styleSearch.posterScanHint'), 690, 1450);

          sharePosterDataUrl.value = canvas.toDataURL('image/png');
          ElMessage.success(tt('page.styleSearch.posterReady'));
        } catch (e) {
          ElMessage.error(e.message || tt('page.styleSearch.fail'));
        } finally {
          shareLoading.value = false;
        }
      }

        if (!sharePosterDataUrl.value) {

        }

        document.body.appendChild(a);

      }

        return n.toFixed(2);
      }

      function formatQty(v) {

        return String(Math.floor(n));

                {{ tt('page.styleSearch.priceLevelsJsonHint') }}
              </div>
            </el-form-item>
            <el-form-item :label="tt('page.styleSearch.labelRefImage')">
              <el-input v-model="editForm.image_ref" type="textarea" :rows="3" :placeholder="tt('page.styleSearch.phImageRef')" />
              <div style="margin-top:8px;font-size:12px;color:#6b7280;line-height:1.5;">
                {{ tt('page.styleSearch.editRefHint') }}
              </div>
              <div style="margin-top:10px;font-size:13px;color:#374151;">{{ tt('page.styleSearch.editUploadNew') }}</div>
              <input :key="editImageInputKey" id="editImageInput" type="file" accept=".jpg,.jpeg,.png,.gif,.webp,image/jpeg,image/png" style="margin-top:6px;max-width:100%;font-size:13px;" />
            </el-form-item>
          </el-form>
          <template #footer>
            <el-button @click="editVisible = false">{{ tt('common.cancel') }}</el-button>
            <el-button type="primary" :loading="editSaving" @click="saveEdit">{{ tt('common.save') }}</el-button>
          </template>
        </el-dialog>

        <el-dialog v-model="tokenDialogVisible" :title="tt('page.styleSearch.tokenDialogTitle')" width="560px" destroy-on-close align-center>
          <el-form label-width="132px" @submit.prevent>
            <el-form-item :label="tt('page.styleSearch.tokenPriceLevel')">
              <el-input v-model="tokenForm.price_level" :placeholder="tt('page.styleSearch.tokenPriceLevelPh')" />
            </el-form-item>
            <el-form-item :label="tt('page.styleSearch.tokenExpireDays')">
              <el-input-number v-model="tokenForm.expire_days" :min="1" :max="3650" :step="1" style="width:100%;" />
            </el-form-item>
            <el-form-item :label="tt('page.styleSearch.customerCatalogLink')">
              <el-input v-model="tokenForm.url" readonly :placeholder="tt('page.styleSearch.generateTokenFirst')" />
            </el-form-item>
            <el-form-item :label="tt('page.styleSearch.expireAt')">
              <el-input v-model="tokenForm.expire_at_text" readonly />
            </el-form-item>
          </el-form>
          <template #footer>
            <el-button @click="tokenDialogVisible = false">{{ tt('common.cancel') }}</el-button>
            <el-button :loading="tokenLoading" @click="generateTokenLink">{{ tt('page.styleSearch.generateToken') }}</el-button>
            <el-button type="primary" @click="copyTokenLink">{{ tt('common.copy') }}</el-button>
          </template>
        </el-dialog>

        <el-dialog v-model="shareDialogVisible" :title="tt('page.styleSearch.sharePoster')" width="680px" destroy-on-close align-center>
          <el-form label-width="132px" @submit.prevent>
            <el-form-item :label="tt('page.styleSearch.tokenPriceLevel')">
              <el-input v-model="shareForm.price_level" :placeholder="tt('page.styleSearch.tokenPriceLevelPh')" />
            </el-form-item>
            <el-form-item :label="tt('page.styleSearch.tokenExpireDays')">
              <el-input-number v-model="shareForm.expire_days" :min="1" :max="3650" :step="1" style="width:100%;" />
            </el-form-item>
          </el-form>
          <div style="margin:8px 0 14px;">
            <el-button type="primary" :loading="shareLoading" @click="buildSharePoster">{{ tt('page.styleSearch.buildPoster') }}</el-button>
            <el-button @click="downloadSharePoster">{{ tt('page.styleSearch.downloadPoster') }}</el-button>
          </div>
          <div style="min-height:240px;display:flex;align-items:center;justify-content:center;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:10px;">
            <img v-if="sharePosterDataUrl" :src="sharePosterDataUrl" style="max-width:100%;max-height:60vh;border-radius:8px;" />
            <span v-else style="font-size:13px;color:#6b7280;">{{ tt('page.styleSearch.buildPosterFirst') }}</span>
          </div>
          <template #footer>
            <el-button @click="shareDialogVisible = false">{{ tt('page.styleSearch.close') }}</el-button>
          </template>
        </el-dialog>

        <div class="admin-footer-pagination" style="margin-top:16px;">
          <span style="color:#6b7280;font-size:13px;">{{ tt('page.styleSearch.totalRows', { total: total }) }}</span>
          <el-pagination v-model:current-page="page" v-model:page-size="pageSize" background layout="prev, pager, next"
            :total="total" @update:current-page="(p)=>{page=p;fetchList();}" @update:page-size="(s)=>{pageSize=s;page=1;fetchList();}" />
        </div>
      </div>
    `
  }).use(ElementPlus).mount('#productSearchApp');
  {/literal}
</script>
{/block}
