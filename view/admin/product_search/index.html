{extend name="admin/common/layout" /}

{block name="title"}寻款{/block}
{block name="page_title"}{/block}
{block name="breadcrumb"}{/block}
{block name="page_actions"}{/block}

{block name="style"}
<style>
    .content-header { display: none; }
    .admin-modern-card .el-table__inner-wrapper::before { height: 0; }
    .hint-box { font-size: 13px; color: #4b5563; line-height: 1.6; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px 14px; margin-bottom: 14px; }
    .hint-box code { font-size: 12px; }
    .style-img-cell { display: flex; align-items: center; min-height: 68px; }
    .style-img-fallback { font-size: 12px; color: #6b7280; word-break: break-all; line-height: 1.45; max-width: 200px; }
    .import-log-viewer { background: #0f172a; color: #e2e8f0; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 12px; line-height: 1.55; max-height: 240px; overflow-y: auto; padding: 10px 12px; border-radius: 8px; border: 1px solid #334155; }
    .import-log-viewer .log-line { white-space: pre-wrap; word-break: break-word; margin-bottom: 4px; }
</style>
{/block}

{block name="content"}
<div id="productSearchApp" class="admin-page-container"></div>
{/block}

{block name="script"}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.min.css">
<script src="/static/i18n/i18n.js?v=20260406_product1"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.38/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.full.min.js"></script>
<script>
  {literal}
  const { createApp, reactive, ref, computed, onMounted, onUnmounted } = Vue;
  const { ElMessage, ElMessageBox } = ElementPlus;
  const i18n = window.AppI18n;
  const lang = i18n ? i18n.getLang('zh') : 'zh';
  const tt = (k, vars) => (i18n ? i18n.t(k, vars || null, lang) : k);

  const apiFetchHeaders = {
    'Accept': 'application/json, text/javascript, */*;q=0.01',
    'X-Requested-With': 'XMLHttpRequest',
  };

  function parseJsonBody(res, text) {
    try { return JSON.parse(text); } catch (e) {
      throw new Error(tt('page.styleSearch.errNonJson', { status: res.status }));
    }
  }

  async function postForm(url, body) {
    const res = await fetch(url, {
      method: 'POST',
      headers: { ...apiFetchHeaders, 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
      body: typeof body === 'string' ? body : new URLSearchParams(body).toString(),
      credentials: 'same-origin',
    });
    const j = parseJsonBody(res, await res.text());
    if (j && j.code === 401) throw new Error(tt('common.sessionExpired'));
    return j;
  }

  createApp({
    setup() {
      const loading = ref(false);
      const items = ref([]);
      const total = ref(0);
      const page = ref(1);
      const pageSize = ref(10);
      const query = reactive({ keyword: '' });
      const pythonOk = ref(false);
      const pythonDiag = ref('');
      const importing = ref(false);
      const fileList = ref([]);
      const tableRef = ref(null);
      const selectedRows = ref([]);
      const batchDeleting = ref(false);
      const visionDescribeOnImport = ref(false);
      const visionDescCount = ref(0);
      const volcArkEnabled = ref(false);
      const visionAnyProviderReady = ref(true);
      const importDialogVisible = ref(false);
      const importTaskId = ref(0);
      const importPercent = ref(0);
      const importStatusText = ref('');
      const importLogs = ref([]);
      const importDone = ref(false);
      const importPollError = ref('');
      let importPollTimer = null;

      function stopImportPolling() {
        if (importPollTimer) {
          clearTimeout(importPollTimer);
          importPollTimer = null;
        }
      }

      async function pollImportTickOnce() {
        if (!importTaskId.value || importDone.value) return;
        importPollError.value = '';
        try {
          const fd = new URLSearchParams();
          fd.set('task_id', String(importTaskId.value));
          const res = await fetch('/admin.php/product_search/importTaskTick', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { ...apiFetchHeaders, 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
            body: fd.toString(),
          });
          const text = await res.text();
          let json = null;
          try {
            json = JSON.parse(text);
          } catch (e) {
            const errMsg = tt('page.styleSearch.nonJsonProgress', { status: res.status });
            importPollError.value = errMsg + (text ? ' ' + String(text).replace(/\s+/g, ' ').slice(0, 200) : '');
            ElMessage.error(errMsg);
            stopImportPolling();
            return;
          }
          if (json && json.code === 401) {
            importPollError.value = tt('common.sessionExpired');
            ElMessage.error(tt('common.sessionExpired'));
            stopImportPolling();
            return;
          }
          if (!json || json.code !== 0) {
            const m = (json && json.msg) || tt('page.styleSearch.taskPushFail');
            importPollError.value = m;
            ElMessage.error(m);
            stopImportPolling();
            return;
          }
          const d = json.data || {};
          importPercent.value = d.percent != null ? Number(d.percent) : 0;
          importStatusText.value = tt('page.styleSearch.tickLine', {
            status: d.status || '',
            processed: d.processed_rows != null ? d.processed_rows : 0,
            total: d.total_rows != null ? d.total_rows : '?',
          });
          importLogs.value = Array.isArray(d.logs) ? d.logs.slice(-80) : [];
          if (d.done) {
            importDone.value = true;
            stopImportPolling();
            const msg = tt('page.styleSearch.importSummary', {
              inserted: d.inserted != null ? d.inserted : 0,
              updated: d.updated != null ? d.updated : 0,
              failed: d.failed != null ? d.failed : 0,
              err: d.error_message ? '�? + d.error_message : '',
            });
            if (d.status === 'failed') {
              ElMessage.error(msg);
            } else {
              ElMessage.success(msg);
            }
            const input = document.getElementById('csvFileInput');
            if (input) input.value = '';
            fetchList();
            return;
          }
        } catch (e) {
          const m = e.message || tt('page.styleSearch.pollFail');
          importPollError.value = m;
          ElMessage.error(m);
          stopImportPolling();
        }
      }

      function startImportPolling() {
        stopImportPolling();
        importDone.value = false;
        importPollError.value = '';
        const loop = async () => {
          if (!importDialogVisible.value || !importTaskId.value || importDone.value) return;
          await pollImportTickOnce();
          if (!importDone.value && importDialogVisible.value && importTaskId.value) {
            importPollTimer = setTimeout(loop, 2000);
          }
        };
        loop();
      }

      async function fetchList() {
        loading.value = true;
        try {
          const p = new URLSearchParams();
          p.set('page', String(page.value));
          p.set('page_size', String(pageSize.value));
          if (query.keyword) p.set('keyword', query.keyword);
          const res = await fetch('/admin.php/product_search/list?' + p.toString(), {
            credentials: 'same-origin',
            headers: { ...apiFetchHeaders },
          });
          const json = parseJsonBody(res, await res.text());
          if (!json || json.code !== 0) throw new Error(json && json.msg ? json.msg : tt('page.styleSearch.loadFail'));
          items.value = (json.data && json.data.items) ? json.data.items : [];
          total.value = (json.data && json.data.total) ? json.data.total : 0;
          pythonOk.value = !!(json.data && json.data.python_ok);
          pythonDiag.value = (json.data && json.data.python_diag) ? String(json.data.python_diag) : '';
          visionDescribeOnImport.value = !!(json.data && json.data.vision_describe_on_import);
          visionDescCount.value = (json.data && json.data.vision_items_with_desc != null) ? Number(json.data.vision_items_with_desc) : 0;
          volcArkEnabled.value = !!(json.data && json.data.volc_ark_enabled);
          visionAnyProviderReady.value = json.data && json.data.vision_any_provider_ready != null
            ? !!json.data.vision_any_provider_ready
            : true;
        } catch (e) {
          ElMessage.error(e.message || tt('page.styleSearch.loadFail'));
        } finally {
          loading.value = false;
        }
      }

      async function doImport() {
        const input = document.getElementById('csvFileInput');
        if (!input || !input.files || !input.files[0]) {
          ElMessage.warning(tt('page.styleSearch.pickFile'));
          return;
        }
        importing.value = true;
        try {
          const fd = new FormData();
          fd.append('file', input.files[0]);
          const res = await fetch('/admin.php/product_search/importCsv', {
            method: 'POST',
            body: fd,
            credentials: 'same-origin',
            headers: { ...apiFetchHeaders },
          });
          const text = await res.text();
          let json = null;
          try {
            json = JSON.parse(text);
          } catch (parseErr) {
            if (res.status === 413) {
              ElMessage.error(tt('page.styleSearch.errHttp413'));
              return;
            }
            if (res.status === 502) {
              ElMessage.error(tt('page.styleSearch.errHttp502'));
              console.error('importCsv raw:', text);
              return;
            }
            const snippet = (text || '').replace(/\s+/g, ' ').trim().slice(0, 280);
            ElMessage.error(
              tt('page.styleSearch.errNonJson', { status: res.status }) + (snippet ? tt('page.styleSearch.errSnippet') + snippet : '')
            );
            console.error('importCsv raw:', text);
            return;
          }
          if (json && json.code === 401) {
            ElMessage.error(tt('common.sessionExpired'));
            return;
          }
          if (json && json.code === 0) {
            const d = json.data || {};
            if (d.mode === 'async' && d.task_id != null) {
              importTaskId.value = Number(d.task_id);
              importPercent.value = 0;
              importLogs.value = [];
              importStatusText.value = tt('page.styleSearch.connectingTask');
              importDialogVisible.value = true;
              startImportPolling();
              return;
            }
            let msg = tt('page.styleSearch.syncResult', {
              imported: d.imported != null ? d.imported : 0,
              updated: d.updated != null ? d.updated : 0,
              failed: d.failed || 0,
            });
            if (json.msg) msg = json.msg + ' ' + msg;
            if (d.vision && d.vision.described_rows != null && d.vision.described_rows > 0) {
              msg += tt('page.styleSearch.syncVision', { n: d.vision.described_rows });
            }
            ElMessage.success(msg);
            if (d.errors && d.errors.length) console.warn(d.errors);
            input.value = '';
            fetchList();
          } else {
            ElMessage.error((json && json.msg) || tt('page.styleSearch.importFailHttp', { status: res.status }));
          }
        } catch (e) {
          ElMessage.error(e.message || tt('page.styleSearch.importFail'));
        } finally {
          importing.value = false;
        }
      }

      function closeImportDialog() {
        stopImportPolling();
        importPollError.value = '';
        importDialogVisible.value = false;
      }

      async function doDelete(row) {
        try {
          const j = await postForm('/admin.php/product_search/delete/' + row.id, {});
          if (j && j.code === 0) {
            ElMessage.success(tt('common.deleted'));
            fetchList();
          } else {
            ElMessage.error((j && j.msg) || tt('page.styleSearch.fail'));
          }
        } catch (e) {
          ElMessage.error(e.message || tt('page.styleSearch.fail'));
        }
      }

      function onSelectionChange(rows) {
        selectedRows.value = rows || [];
      }

      async function doBatchDelete() {
        const rows = selectedRows.value;
        if (!rows.length) {
          ElMessage.warning(tt('page.styleSearch.warnSelectRows'));
          return;
        }
        try {
          await ElMessageBox.confirm(
            tt('page.styleSearch.batchDeleteConfirm', { n: rows.length }),
            tt('page.styleSearch.batchDeleteTitle'),
            { confirmButtonText: tt('common.delete'), cancelButtonText: tt('common.cancel'), type: 'warning' }
          );
        } catch {
          return;
        }
        batchDeleting.value = true;
        try {
          const ids = rows.map((r) => r.id);
          const res = await fetch('/admin.php/product_search/batchDelete', {
            method: 'POST',
            headers: { ...apiFetchHeaders, 'Content-Type': 'application/json; charset=UTF-8' },
            body: JSON.stringify({ ids }),
            credentials: 'same-origin',
          });
          const text = await res.text();
          let json;
          try {
            json = JSON.parse(text);
          } catch {
            ElMessage.error(tt('page.styleSearch.batchDeleteBadResp', { status: res.status }));
            return;
          }
          if (json.code === 401) {
            ElMessage.error(tt('common.sessionExpired'));
            return;
          }
          if (json.code !== 0) {
            ElMessage.error(json.msg || tt('page.styleSearch.batchDeleteFail'));
            return;
          }
          ElMessage.success(tt('page.styleSearch.batchDone', {
            msg: json.msg || tt('common.done'),
            n: json.data && json.data.deleted != null ? json.data.deleted : ids.length,
          }));
          selectedRows.value = [];
          tableRef.value && typeof tableRef.value.clearSelection === 'function' && tableRef.value.clearSelection();
          fetchList();
        } catch (e) {
          ElMessage.error(e.message || tt('page.styleSearch.batchDeleteFail'));
        } finally {
          batchDeleting.value = false;
        }
      }

      function openH5() {
        window.open('/index.php/searchByImage', '_blank', 'noopener');
      }

      /** 可直链预览的图片地址（http(s)、站�?/、data:image�?*/
      function imageDisplayUrl(ref) {
        const s = String(ref || '').trim();
        if (!s) return '';
        if (/^https?:\/\//i.test(s)) return s;
        if (s.startsWith('//')) return (window.location && window.location.protocol ? window.location.protocol : 'https:') + s;
        if (s.startsWith('/')) return s;
        if (/^data:image\//i.test(s)) return s;
        return '';
      }
      function isImagePreviewable(ref) {
        return imageDisplayUrl(ref) !== '';
      }

      const editVisible = ref(false);
      const editSaving = ref(false);
      const editImageInputKey = ref(0);
      const editForm = reactive({ id: 0, product_code: '', hot_type: '', image_ref: '' });

      function openEdit(row) {
        editForm.id = row.id;
        editForm.product_code = row.product_code || '';
        editForm.hot_type = row.hot_type || '';
        editForm.image_ref = row.image_ref || '';
        editImageInputKey.value++;
        editVisible.value = true;
      }

      async function saveEdit() {
        if (!String(editForm.product_code || '').trim()) {
          ElMessage.warning(tt('page.styleSearch.fillProductCode'));
          return;
        }
        editSaving.value = true;
        try {
          const input = document.getElementById('editImageInput');
          const fd = new FormData();
          fd.append('product_code', String(editForm.product_code).trim());
          fd.append('hot_type', String(editForm.hot_type || '').trim());
          fd.append('image_ref', String(editForm.image_ref || '').trim());
          if (input && input.files && input.files[0]) {
            fd.append('image', input.files[0]);
          }
          const res = await fetch('/admin.php/product_search/update/' + editForm.id, {
            method: 'POST',
            body: fd,
            credentials: 'same-origin',
            headers: { ...apiFetchHeaders },
          });
          const text = await res.text();
          let json;
          try {
            json = JSON.parse(text);
          } catch {
            ElMessage.error(tt('page.styleSearch.saveNonJson', { status: res.status }));
            return;
          }
          if (json.code === 401) {
            ElMessage.error(tt('common.sessionExpired'));
            return;
          }
          if (json.code !== 0) {
            ElMessage.error(json.msg || tt('page.styleSearch.saveFail'));
            return;
          }
          ElMessage.success(tt('common.saved'));
          editVisible.value = false;
          fetchList();
        } catch (e) {
          ElMessage.error(e.message || tt('page.styleSearch.saveFail'));
        } finally {
          editSaving.value = false;
        }
      }

      onMounted(() => { fetchList(); });
      onUnmounted(() => { stopImportPolling(); });

      return {
        loading, items, total, page, pageSize, query, pythonOk, pythonDiag, importing,
        importDialogVisible, importTaskId, importPercent, importStatusText, importLogs, importDone, importPollError,
        closeImportDialog,
        tableRef, selectedRows, batchDeleting,
        visionDescribeOnImport, visionDescCount, volcArkEnabled, visionAnyProviderReady,
        editVisible, editSaving, editImageInputKey, editForm,
        fetchList, doImport, doDelete, doBatchDelete, onSelectionChange, openEdit, saveEdit, openH5, lang, tt,
        imageDisplayUrl, isImagePreviewable,
      };
    },
    template: `
      <div class="admin-modern-card">
        <div class="admin-header-actions">
          <div class="admin-breadcrumb">{{ tt('page.styleSearch.breadcrumb') }}</div>
          <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
            <div style="font-size:18px;font-weight:600;color:#111827;">{{ tt('page.styleSearch.pageTitle') }}</div>
            <div class="admin-action-buttons">
              <el-button type="default" @click="openH5">{{ tt('page.styleSearch.openH5') }}</el-button>
              <a class="btn btn-outline-secondary btn-sm" href="/admin.php/product_search/sampleCsv" style="border-radius:8px;">{{ tt('page.styleSearch.sampleCsv') }}</a>
              <a class="btn btn-outline-secondary btn-sm" href="/admin.php/product_search/exportCsv" rel="noopener" style="border-radius:8px;">{{ tt('page.styleSearch.exportCsv') }}</a>
            </div>
          </div>
        </div>

        <div class="hint-box">
          <div v-if="!pythonOk" style="color:#b45309;margin-bottom:8px;">
            <strong>{{ tt('page.styleSearch.pythonWarnTitle') }}</strong>{{ tt('page.styleSearch.pythonWarnBody') }}
            <div v-if="pythonDiag" style="margin-top:8px;font-size:12px;color:#92400e;word-break:break-all;background:#fffbeb;padding:8px;border-radius:6px;border:1px solid #fde68a;">{{ tt('page.styleSearch.pythonDiagLabel') }}{{ pythonDiag }}</div>
          </div>
          <div>{{ tt('page.styleSearch.hintImportMain') }}</div>
          <div v-if="volcArkEnabled" style="margin-top:8px;color:#b45309;">{{ tt('page.styleSearch.volcEnabledLine') }}</div>
          <div v-if="visionDescribeOnImport && !visionAnyProviderReady" style="margin-top:10px;padding:10px 12px;background:#fff7ed;border:1px solid #fdba74;border-radius:8px;color:#9a3412;font-size:13px;line-height:1.55;">
            {{ tt('page.styleSearch.volcNotReady') }}
          </div>
          <div v-if="volcArkEnabled" style="margin-top:8px;color:#0f766e;">
            {{ tt('page.styleSearch.volcDescIntro') }} <strong>{{ visionDescCount }}</strong> {{ tt('page.styleSearch.volcDescUnit') }}
            <span v-if="visionDescribeOnImport">{{ tt('page.styleSearch.volcDescOn') }}</span>
            <span v-else>{{ tt('page.styleSearch.volcDescOff') }}</span>
          </div>
          <div v-if="!volcArkEnabled" style="margin-top:8px;color:#64748b;">{{ tt('page.styleSearch.volcDisabledHint') }}</div>
        </div>

        <div class="admin-filter-section">
          <div class="admin-custom-form">
            <el-input v-model="query.keyword" clearable size="default" :placeholder="tt('page.styleSearch.phProductCode')" style="width:220px;" @keyup.enter="fetchList" />
            <div class="admin-filter-buttons">
              <el-button type="primary" @click="()=>{page=1;fetchList();}">{{ tt('common.filter') }}</el-button>
              <input id="csvFileInput" type="file" accept=".csv,.txt,.xlsx,.xls,.xlsm" style="max-width:240px;" />
              <el-button type="success" :loading="importing" @click="doImport">{{ tt('common.import') }}</el-button>
              <el-button type="danger" plain :disabled="!selectedRows.length" :loading="batchDeleting" @click="doBatchDelete">{{ tt('page.styleSearch.batchDelete') }}</el-button>
            </div>
          </div>
        </div>

        <el-table ref="tableRef" :data="items" stripe v-loading="loading" row-key="id" @selection-change="onSelectionChange">
          <el-table-column type="selection" width="48" reserve-selection />
          <el-table-column prop="id" label="ID" width="70" />
          <el-table-column prop="product_code" :label="tt('page.styleSearch.phProductCode')" min-width="120" />
          <el-table-column :label="tt('page.styleSearch.colRefImage')" min-width="120" width="120">
            <template #default="{ row }">
              <div class="style-img-cell">
                <el-image
                  v-if="isImagePreviewable(row.image_ref)"
                  :src="imageDisplayUrl(row.image_ref)"
                  :preview-src-list="[imageDisplayUrl(row.image_ref)]"
                  fit="cover"
                  lazy
                  preview-teleported
                  style="width:64px;height:64px;border-radius:8px;border:1px solid #e5e7eb;cursor:zoom-in;"
                >
                  <template #error>
                    <div class="style-img-fallback" style="max-width:100px;">{{ tt('page.styleSearch.imgLoadFail') }}</div>
                  </template>
                </el-image>
                <div v-else class="style-img-fallback" :title="row.image_ref">{{ row.image_ref }}</div>
              </div>
            </template>
          </el-table-column>
          <el-table-column prop="hot_type" :label="tt('page.styleSearch.colHotType')" width="120" />
          <el-table-column :label="tt('page.styleSearch.colAi')" min-width="160" show-overflow-tooltip>
            <template #default="{ row }">
              <span style="font-size:12px;color:#374151;">{{ row.ai_description_short || tt('page.styleSearch.emDash') }}</span>
            </template>
          </el-table-column>
          <el-table-column :label="tt('page.styleSearch.colEmb')" width="80">
            <template #default="{ row }">
              <el-tag size="small" :type="row.has_embedding ? 'success' : 'danger'">{{ row.has_embedding ? tt('page.styleSearch.embOk') : tt('page.styleSearch.embNo') }}</el-tag>
            </template>
          </el-table-column>
          <el-table-column prop="created_at" :label="tt('page.styleSearch.colImportedAt')" width="170" />
          <el-table-column :label="tt('page.styleSearch.colActions')" width="130" fixed="right">
            <template #default="{ row }">
              <el-button link type="primary" @click="openEdit(row)">{{ tt('common.edit') }}</el-button>
              <el-button link type="danger" @click="doDelete(row)">{{ tt('common.delete') }}</el-button>
            </template>
          </el-table-column>
        </el-table>

        <el-dialog v-model="importDialogVisible" :title="tt('page.styleSearch.importDlgTitle')" width="560px" destroy-on-close align-center @closed="closeImportDialog">
          <div style="margin-bottom:12px;font-size:13px;color:#475569;">{{ tt('page.styleSearch.importTaskLabel') }} {{ importTaskId }} · {{ importStatusText }}</div>
          <div v-if="importPollError" style="margin-bottom:10px;font-size:12px;color:#b91c1c;line-height:1.5;">{{ importPollError }}</div>
          <el-progress :percentage="importPercent" :status="importDone ? 'success' : undefined" />
          <div style="margin-top:14px;font-size:12px;color:#64748b;margin-bottom:6px;">{{ tt('page.styleSearch.importLog') }}</div>
          <div class="import-log-viewer">
            <div v-for="(log, idx) in importLogs" :key="idx" class="log-line">[{{ log.t || tt('page.styleSearch.emDash') }}] {{ log.m || '' }}</div>
            <div v-if="!importLogs.length" class="log-line" style="color:#94a3b8;">{{ tt('page.styleSearch.importWait') }}</div>
          </div>
          <template #footer>
            <el-button @click="closeImportDialog">{{ tt('page.styleSearch.close') }}</el-button>
          </template>
        </el-dialog>

        <el-dialog v-model="editVisible" :title="tt('page.styleSearch.editTitle')" width="520px" destroy-on-close align-center>
          <el-form label-width="96px" @submit.prevent>
            <el-form-item :label="tt('page.styleSearch.labelProductCode')">
              <el-input v-model="editForm.product_code" maxlength="128" :placeholder="tt('page.styleSearch.phRequired')" />
            </el-form-item>
            <el-form-item :label="tt('page.styleSearch.labelHotType')">
              <el-input v-model="editForm.hot_type" maxlength="200" :placeholder="tt('page.styleSearch.phOptional')" />
            </el-form-item>
            <el-form-item :label="tt('page.styleSearch.labelRefImage')">
              <el-input v-model="editForm.image_ref" type="textarea" :rows="3" :placeholder="tt('page.styleSearch.phImageRef')" />
              <div style="margin-top:8px;font-size:12px;color:#6b7280;line-height:1.5;">
                {{ tt('page.styleSearch.editRefHint') }}
              </div>
              <div style="margin-top:10px;font-size:13px;color:#374151;">{{ tt('page.styleSearch.editUploadNew') }}</div>
              <input :key="editImageInputKey" id="editImageInput" type="file" accept=".jpg,.jpeg,.png,.gif,.webp,image/jpeg,image/png" style="margin-top:6px;max-width:100%;font-size:13px;" />
            </el-form-item>
          </el-form>
          <template #footer>
            <el-button @click="editVisible = false">{{ tt('common.cancel') }}</el-button>
            <el-button type="primary" :loading="editSaving" @click="saveEdit">{{ tt('common.save') }}</el-button>
          </template>
        </el-dialog>

        <div class="admin-footer-pagination" style="margin-top:16px;">
          <span style="color:#6b7280;font-size:13px;">{{ tt('page.styleSearch.totalRows', { total: total }) }}</span>
          <el-pagination v-model:current-page="page" v-model:page-size="pageSize" background layout="prev, pager, next"
            :total="total" @update:current-page="(p)=>{page=p;fetchList();}" @update:page-size="(s)=>{pageSize=s;page=1;fetchList();}" />
        </div>
      </div>
    `
  }).use(ElementPlus).mount('#productSearchApp');
  {/literal}
</script>
{/block}
