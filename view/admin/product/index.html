{extend name="admin/common/layout" /}

{block name="title"}商品{/block}
{block name="page_title"}{/block}
{block name="breadcrumb"}{/block}
{block name="page_actions"}{/block}

{block name="style"}
<style>
    .content-header { display: none; }

    /* High-Density Modern（仅该页生效） */
    .tp-ep-wrap {
        padding: 24px;
        background: #f4f6f8;
        min-height: calc(100vh - 0px);
    }
    .admin-product-card {
        background: #ffffff;
        padding: 24px;
        border-radius: 10px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.03);
    }
    .admin-product-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
    }
    .admin-product-breadcrumb {
        font-size: 13px;
        color: #909399;
        line-height: 18px;
        margin-bottom: 6px;
    }
    .admin-product-title {
        font-size: 20px;
        font-weight: 700;
        color: #111827;
        line-height: 28px;
    }
    .admin-product-actions {
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .admin-product-actions .el-button { border-radius: 6px; }

    .admin-product-filters {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: nowrap;
        overflow-x: hidden; /* 默认不出现横向滚动条 */
        padding-bottom: 0;
        margin-bottom: 12px;
    }
    /* 仅在窄屏时允许横向滚动，避免布局断行 */
    @media (max-width: 1200px) {
        .admin-product-filters { overflow-x: auto; padding-bottom: 4px; }
    }
    @media (max-width: 576px) {
        .tp-ep-wrap {
            padding: 16px 12px;
        }
        .admin-product-card {
            padding: 16px;
        }
        .admin-product-header {
            flex-direction: column;
            align-items: stretch;
            gap: 12px;
        }
        .admin-product-header > div:first-child {
            min-width: 0;
        }
        .admin-product-title {
            word-break: keep-all;
            overflow-wrap: anywhere;
        }
        .admin-product-actions {
            justify-content: flex-start;
            flex-wrap: wrap;
        }
    }
    .admin-product-filter-actions {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 0 0 auto;
        margin-left: auto;
    }

    .name-cell {
        font-weight: 500;
        color: #303133;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .url-cell {
        min-width: 0;
    }
    .product-link-cell {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
    }
    .product-link-copy {
        flex: 1 1 auto;
        min-width: 0;
        border: 0;
        background: transparent;
        padding: 0;
        color: #374151;
        font: inherit;
        text-align: left;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        cursor: copy !important;
    }
    .product-link-copy:hover,
    .product-link-copy:focus {
        color: #0f766e;
        outline: none;
        text-decoration: underline;
        text-underline-offset: 3px;
    }
    .product-link-cell .el-button {
        flex: 0 0 auto;
    }
    .admin-product-footer {
        display: flex;
        justify-content: flex-end;
        margin-top: 20px;
    }
    .admin-inline-error {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin: 0 0 12px;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #fecaca;
        background: #fef2f2;
        color: #b91c1c;
        font-size: 13px;
    }
    .admin-product-card .el-table__inner-wrapper::before { height: 0; }
</style>
{/block}

{block name="content"}
<div class="tp-ep-wrap" id="productApp" data-module="product"></div>
{/block}

{block name="script"}
<!-- Vue3 + ElementPlus（CDN） -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.min.css">
<script src="/static/i18n/i18n.js?v=20260414_category_entry1"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.38/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.full.min.js"></script>
<script>
  {literal}
  const { createApp, reactive, ref, computed, onMounted } = Vue;
  const { ElMessage, ElMessageBox } = ElementPlus;
  const i18n = window.AppI18n;
  const lang = i18n ? i18n.getLang('zh') : 'zh';
  const tt = (k, vars) => (i18n ? i18n.t(k, vars || null, lang) : k);

  const headerCellStyle = {
    backgroundColor: '#F9FAFB',
    color: '#4B5563',
    fontWeight: '600',
    height: '48px',
    borderBottom: '1px solid #E5E7EB',
  };

  const cellStyle = {
    padding: '12px 0',
  };

  function toSort(order) {
    if (order === 'ascending') return 'asc';
    if (order === 'descending') return 'desc';
    return '';
  }

  function mountProductApp(options) {
    return createApp(options).use(ElementPlus).mount('#productApp');
  }

  const productAppOptions = {
    setup() {
      const loading = ref(false);
      const loadError = ref('');
      const items = ref([]);
      const total = ref(0);
      const page = ref(1);
      const pageSize = ref(10);
      const sortProp = ref('sort_order');
      const sortOrder = ref('asc');
      const categoryOptions = ref([]);

      const query = reactive({
        keyword: '',
        category: '',
        status: '',
      });

      async function fetchList() {
        loading.value = true;
        loadError.value = '';
        try {
          const params = {
            page: String(page.value),
            page_size: String(pageSize.value),
            keyword: query.keyword || '',
            category: query.category ? String(query.category) : '',
            status: (query.status !== '' && query.status !== null) ? String(query.status) : '',
            sort_prop: sortProp.value || '',
            sort_order: sortOrder.value || '',
          };
          let json = null;
          if (window.AdminApi && typeof window.AdminApi.get === 'function') {
            json = await window.AdminApi.get('/admin.php/product/list', params, { fallbackKey: 'common.loadingFailed' });
          } else {
            const queryParams = new URLSearchParams();
            Object.keys(params).forEach((key) => {
              const value = params[key];
              if (value === '') return;
              queryParams.set(key, value);
            });
            const res = await fetch('/admin.php/product/list?' + queryParams.toString(), { credentials: 'same-origin' });
            json = await res.json();
          }
          if (!json || json.code !== 0) throw new Error((json && json.msg) || tt('common.loadingFailed'));
          items.value = (json.data && json.data.items) ? json.data.items : [];
          total.value = (json.data && json.data.total) ? json.data.total : 0;
          const categoryList = (json.data && Array.isArray(json.data.category_options)) ? json.data.category_options : [];
          categoryOptions.value = categoryList.map((item) => ({
            label: String(item && item.name ? item.name : ''),
            value: String(item && item.id != null ? item.id : '')
          })).filter((item) => item.label !== '' && item.value !== '');
        } catch (e) {
          const message = e && e.message ? e.message : tt('common.loadingFailed');
          loadError.value = String(message || tt('common.loadingFailed'));
          ElMessage.error(loadError.value);
        } finally {
          loading.value = false;
        }
      }

      function onSearch() {
        page.value = 1;
        fetchList();
      }

      function onReset() {
        query.keyword = '';
        query.category = '';
        query.status = '';
        page.value = 1;
        fetchList();
      }

      function onSortChange({ prop, order }) {
        if (!prop) return;
        sortProp.value = prop;
        sortOrder.value = toSort(order) || (prop === 'sort_order' ? 'asc' : 'desc');
        page.value = 1;
        fetchList();
      }

      function goAdd() {
        window.location.href = '/admin.php/product/add';
      }

      function goCategoryManage() {
        window.location.href = '/admin.php/category?type=product';
      }

      function goEdit(row) {
        window.location.href = '/admin.php/product/edit/' + row.id;
      }

      async function copyGoodsUrl(url) {
        const value = String(url || '').trim();
        if (!value) {
          ElMessage.error(tt('common.copyFail'));
          return;
        }
        try {
          if (navigator.clipboard && navigator.clipboard.writeText && window.isSecureContext) {
            await navigator.clipboard.writeText(value);
          } else {
            const textarea = document.createElement('textarea');
            textarea.value = value;
            textarea.setAttribute('readonly', 'readonly');
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            textarea.style.top = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            const copied = document.execCommand('copy');
            document.body.removeChild(textarea);
            if (!copied) throw new Error('copy failed');
          }
          ElMessage.success(tt('common.copyDone'));
        } catch (e) {
          ElMessage.error(tt('common.copyFail'));
        }
      }

      function openGoodsUrl(url) {
        const value = String(url || '').trim();
        if (!value) return;
        window.open(value, '_blank', 'noopener');
      }

      async function doDelete(row) {
        await ElMessageBox.confirm(
          lang === 'en'
            ? 'Delete this product? The "product" field of related videos will be cleared.'
            : '确定删除该商品？关联视频的「所属商品」将清空。',
          lang === 'en' ? 'Confirm' : '删除确认',
          { type: 'warning' }
        );
        let json = null;
        if (window.AdminApi && typeof window.AdminApi.post === 'function') {
          json = await window.AdminApi.post('/admin.php/product/delete/' + row.id, {}, { fallbackKey: 'common.deleteFailed' });
        } else {
          const resp = await fetch('/admin.php/product/delete/' + row.id, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
            body: '',
            credentials: 'same-origin',
          });
          json = await resp.json();
        }
        if (json && json.code === 0) {
          ElMessage.success(json.msg || (lang === 'en' ? 'Deleted' : '已删除'));
          const maxPage = Math.max(1, Math.ceil(Math.max(0, total.value - 1) / pageSize.value));
          page.value = Math.min(page.value, maxPage);
          fetchList();
        } else {
          ElMessage.error((json && json.msg) || (lang === 'en' ? 'Delete failed' : '删除失败'));
        }
      }

      const rows = computed(() => items.value || []);
      function retryLoad() {
        fetchList();
      }

      onMounted(() => {
        fetchList();
      });

      return {
        loading,
        query,
        categoryOptions,
        rows,
        loadError,
        total,
        page,
        pageSize,
        headerCellStyle,
        cellStyle,
        lang,
        tt,
        onSearch,
        onReset,
        onSortChange,
        goAdd,
        goCategoryManage,
        goEdit,
        copyGoodsUrl,
        openGoodsUrl,
        doDelete,
        retryLoad,
        fetchList,
      };
    },
    template: `
      <div class="admin-product-card" data-section="product_list">
        <div class="admin-product-header">
          <div>
            <div class="admin-product-breadcrumb">${tt('page.product.breadcrumb')}</div>
            <div class="admin-product-title">${tt('page.product.title')}</div>
          </div>
          <div class="admin-product-actions">
            <el-button size="default" @click="goCategoryManage">${tt('page.product.actionCategoryManager')}</el-button>
            <el-button size="default" type="primary" @click="goAdd">${tt('page.product.add')}</el-button>
          </div>
        </div>

        <div class="admin-product-filters">
          <el-input
            v-model="query.keyword"
            size="default"
            clearable
            :placeholder="tt('page.product.searchName')"
            style="width:260px; flex:0 0 auto;"
            @keyup.enter="onSearch"
          />
          <el-select v-model="query.category" size="default" clearable :placeholder="tt('page.product.filterCategory')" style="width:180px; flex:0 0 auto;">
            <el-option v-for="cat in categoryOptions" :key="'cat' + cat.value" :label="cat.label" :value="cat.value" />
          </el-select>
          <el-select v-model="query.status" size="default" clearable :placeholder="tt('common.statusAll')" style="width:140px; flex:0 0 auto;">
            <el-option :label="tt('common.statusEnabled')" value="1" />
            <el-option :label="tt('common.statusDisabled')" value="0" />
          </el-select>

          <div class="admin-product-filter-actions">
            <el-button size="default" type="primary" @click="onSearch">{{ tt('common.filter') }}</el-button>
            <el-button size="default" @click="onReset">{{ tt('common.reset') }}</el-button>
          </div>
        </div>

        <div v-if="loadError" class="admin-inline-error" data-section="error_state">
          <span>{{ loadError }}</span>
          <el-button link type="primary" @click="retryLoad">{{ tt('common.refresh') }}</el-button>
        </div>

        <el-table
          :data="rows"
          stripe
          row-key="id"
          v-loading="loading"
          :header-cell-style="headerCellStyle"
          :cell-style="cellStyle"
          @sort-change="onSortChange"
        >
          <el-table-column prop="id" label="ID" width="80" sortable="custom" />
          <el-table-column :label="lang==='en'?'Name':'名称'" min-width="220">
            <template #default="{ row }">
              <div class="name-cell" :title="row.name">{{ row.name || '—' }}</div>
            </template>
          </el-table-column>
          <el-table-column :label="tt('page.product.colCategory')" min-width="140">
            <template #default="{ row }">
              <div class="name-cell" :title="row.category_name">{{ row.category_name || '--' }}</div>
            </template>
          </el-table-column>
          <el-table-column :label="lang==='en'?'Product URL':'商品链接'" min-width="320">
            <template #default="{ row }">
              <div v-if="row.goods_url" class="url-cell" :title="row.goods_url">
                <div class="product-link-cell">
                  <button
                    type="button"
                    class="product-link-copy"
                    :title="tt('page.product.copyLink') + ': ' + row.goods_url"
                    @click="copyGoodsUrl(row.goods_url)"
                  >{{ row.goods_url }}</button>
                  <el-button size="default" link type="info" @click.stop="openGoodsUrl(row.goods_url)">{{ tt('common.open') }}</el-button>
                </div>
              </div>
              <span v-else class="text-muted">—</span>
            </template>
          </el-table-column>
          <el-table-column prop="total_videos" :label="tt('page.product.totalVideos')" width="110" />
          <el-table-column prop="downloaded_videos" :label="tt('page.product.downloadedVideos')" width="110" />
          <el-table-column prop="undownloaded_videos" :label="tt('page.product.undownloadedVideos')" width="110" />
          <el-table-column prop="sort_order" :label="lang==='en'?'Sort':'排序'" width="110" sortable="custom" />
          <el-table-column :label="lang==='en'?'Status':'状态'" width="120">
            <template #default="{ row }">
              <el-tag size="default" effect="light" :type="String(row.status) === '1' ? 'success' : 'info'">
                {{ String(row.status) === '1' ? tt('common.statusEnabled') : tt('common.statusDisabled') }}
              </el-tag>
            </template>
          </el-table-column>
          <el-table-column prop="updated_at" :label="lang==='en'?'Updated':'更新时间'" min-width="180" />
          <el-table-column :label="lang==='en'?'Actions':'操作'" width="160" fixed="right">
            <template #default="{ row }">
              <el-button size="default" link type="primary" @click="goEdit(row)">{{ tt('common.edit') }}</el-button>
              <el-button size="default" link type="danger" @click="doDelete(row)">{{ tt('common.delete') }}</el-button>
            </template>
          </el-table-column>

          <template #empty>
            <div style="padding: 28px 0; text-align:center; color:#6b7280;">{{ tt('common.noData') }}</div>
          </template>
        </el-table>

        <div class="admin-product-footer">
          <el-pagination
            v-model:current-page="page"
            v-model:page-size="pageSize"
            size="default"
            background
            layout="total, prev, pager, next"
            :total="total"
            @update:current-page="(p)=>{ page=p; fetchList(); }"
            @update:page-size="(s)=>{ pageSize=s; page=1; fetchList(); }"
          />
        </div>
      </div>
    `
  };

  if (window.AdminPageBootstrap && typeof window.AdminPageBootstrap.init === 'function') {
    window.AdminPageBootstrap.init({
      appId: 'productApp',
      module: 'product',
      defaultSection: 'product_list',
      sectionSelector: '[data-section]',
      dependencies: ['Vue', 'ElementPlus'],
      onLoad: function () {
        return mountProductApp(productAppOptions);
      }
    });
  } else {
    mountProductApp(productAppOptions);
  }
  {/literal}
</script>
{/block}
