{extend name="admin/common/layout" /}

{block name="title"}分类{/block}
{block name="page_title"}{/block}
{block name="breadcrumb"}{/block}
{block name="page_actions"}{/block}

{block name="style"}
<style>
    .content-header { display: none; }
    .tp-cat-wrap { padding: 24px; background: #f4f6f8; min-height: calc(100vh - 0px); }
    .admin-cat-card { background: #fff; padding: 24px; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.03); }
    .admin-cat-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 12px; }
    .admin-cat-breadcrumb { font-size: 13px; color: #909399; margin-bottom: 6px; }
    .admin-cat-title { font-size: 20px; font-weight: 700; color: #111827; }
</style>
{/block}

{block name="content"}
<div id="categoryApp" class="tp-cat-wrap"></div>
{/block}

{block name="script"}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.min.css">
<script src="/static/i18n/i18n.js?v=20260408_modules"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.38/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.full.min.js"></script>
<script>
  {literal}
  const { createApp, ref, reactive, onMounted } = Vue;
  const { ElMessage, ElMessageBox } = ElementPlus;
  const i18n = window.AppI18n;
  const lang = i18n ? i18n.getLang('zh') : 'zh';
  const tt = (k, vars) => (i18n ? i18n.t(k, vars || null, lang) : k);
  const apiH = { 'Accept': 'application/json', 'X-Requested-With': 'XMLHttpRequest' };

  function parseJson(res, text) {
    try { return JSON.parse(text); } catch (e) { throw new Error(tt('page.styleSearch.errNonJson', { status: res.status })); }
  }

  createApp({
    setup() {
      const loading = ref(false);
      const items = ref([]);
      const total = ref(0);
      const page = ref(1);
      const pageSize = ref(20);
      const query = reactive({ keyword: '', type: '', status: '' });
      const dlg = ref(false);
      const saving = ref(false);
      const form = reactive({ id: 0, name: '', type: 'product', sort_order: 0, status: 1 });

      async function fetchList() {
        loading.value = true;
        try {
          const p = new URLSearchParams();
          p.set('page', String(page.value));
          p.set('page_size', String(pageSize.value));
          if (query.keyword) p.set('keyword', query.keyword);
          if (query.type) p.set('type', query.type);
          if (query.status !== '') p.set('status', String(query.status));
          const res = await fetch('/admin.php/category/listJson?' + p.toString(), { credentials: 'same-origin', headers: apiH });
          const json = parseJson(res, await res.text());
          if (!json || json.code !== 0) throw new Error((json && json.msg) || tt('common.loadingFailed'));
          items.value = (json.data && json.data.items) ? json.data.items : [];
          total.value = (json.data && json.data.total) ? json.data.total : 0;
        } catch (e) {
          ElMessage.error(e.message || tt('common.loadingFailed'));
        } finally {
          loading.value = false;
        }
      }

      function onSearch() { page.value = 1; fetchList(); }
      function onReset() {
        query.keyword = '';
        query.type = '';
        query.status = '';
        page.value = 1;
        fetchList();
      }
      function openAdd() {
        form.id = 0;
        form.name = '';
        form.type = 'product';
        form.sort_order = 0;
        form.status = 1;
        dlg.value = true;
      }
      function openEdit(row) {
        form.id = row.id;
        form.name = row.name || '';
        form.type = row.type || 'product';
        form.sort_order = row.sort_order != null ? Number(row.sort_order) : 0;
        form.status = row.status != null ? Number(row.status) : 1;
        dlg.value = true;
      }
      async function saveForm() {
        saving.value = true;
        try {
          const res = await fetch('/admin.php/category/save', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { ...apiH, 'Content-Type': 'application/json; charset=UTF-8' },
            body: JSON.stringify(form),
          });
          const json = parseJson(res, await res.text());
          if (!json || json.code !== 0) { ElMessage.error((json && json.msg) || tt('common.loadingFailed')); return; }
          ElMessage.success(json.msg || tt('common.saved'));
          dlg.value = false;
          fetchList();
        } catch (e) {
          ElMessage.error(e.message || tt('common.loadingFailed'));
        } finally {
          saving.value = false;
        }
      }
      async function delRow(row) {
        try {
          await ElMessageBox.confirm(tt('page.category.deleteConfirm'), tt('page.category.deleteTitle'), { type: 'warning' });
        } catch { return; }
        try {
          const res = await fetch('/admin.php/category/delete', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { ...apiH, 'Content-Type': 'application/json; charset=UTF-8' },
            body: JSON.stringify({ id: row.id }),
          });
          const json = parseJson(res, await res.text());
          if (!json || json.code !== 0) { ElMessage.error((json && json.msg) || tt('common.loadingFailed')); return; }
          ElMessage.success(tt('common.deleted'));
          fetchList();
        } catch (e) {
          ElMessage.error(e.message || tt('common.loadingFailed'));
        }
      }
      function typeLabel(t) {
        return t === 'influencer' ? tt('page.category.typeInfluencer') : tt('page.category.typeProduct');
      }
      onMounted(() => fetchList());

      return {
        tt, loading, items, total, page, pageSize, query, dlg, saving, form,
        fetchList, onSearch, onReset, openAdd, openEdit, saveForm, delRow, typeLabel
      };
    },
    template: `
      <div class="admin-cat-card">
        <div class="admin-cat-header">
          <div>
            <div class="admin-cat-breadcrumb">{{ tt('page.category.breadcrumb') }}</div>
            <div class="admin-cat-title">{{ tt('page.category.title') }}</div>
          </div>
          <el-button type="primary" @click="openAdd">{{ tt('page.category.add') }}</el-button>
        </div>

        <div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:12px; align-items:center;">
          <el-input v-model="query.keyword" clearable :placeholder="tt('page.category.searchPh')" style="width:220px;" @keyup.enter="onSearch" />
          <el-select v-model="query.type" clearable :placeholder="tt('page.category.typeFilter')" style="width:150px;">
            <el-option :label="tt('page.category.typeProduct')" value="product" />
            <el-option :label="tt('page.category.typeInfluencer')" value="influencer" />
          </el-select>
          <el-select v-model="query.status" clearable :placeholder="tt('page.category.statusFilter')" style="width:140px;">
            <el-option :label="tt('common.statusEnabled')" value="1" />
            <el-option :label="tt('common.statusDisabled')" value="0" />
          </el-select>
          <el-button type="primary" @click="onSearch">{{ tt('common.search') }}</el-button>
          <el-button @click="onReset">{{ tt('common.reset') }}</el-button>
        </div>

        <el-table :data="items" stripe v-loading="loading">
          <el-table-column prop="name" :label="tt('page.category.colName')" min-width="180" />
          <el-table-column :label="tt('page.category.colType')" width="120">
            <template #default="{ row }">{{ typeLabel(row.type) }}</template>
          </el-table-column>
          <el-table-column prop="sort_order" :label="tt('page.category.colSort')" width="100" />
          <el-table-column :label="tt('page.category.colStatus')" width="110">
            <template #default="{ row }">
              <el-tag size="small" :type="Number(row.status)===1 ? 'success' : 'info'">{{ Number(row.status)===1 ? tt('common.statusEnabled') : tt('common.statusDisabled') }}</el-tag>
            </template>
          </el-table-column>
          <el-table-column prop="updated_at" :label="tt('page.category.colUpdated')" min-width="160" />
          <el-table-column :label="tt('page.category.colActions')" width="140" fixed="right">
            <template #default="{ row }">
              <el-button link type="primary" size="small" @click="openEdit(row)">{{ tt('common.edit') }}</el-button>
              <el-button link type="danger" size="small" @click="delRow(row)">{{ tt('common.delete') }}</el-button>
            </template>
          </el-table-column>
        </el-table>
        <div style="display:flex; justify-content:flex-end; margin-top:16px;">
          <el-pagination v-model:current-page="page" v-model:page-size="pageSize" layout="total, prev, pager, next"
            :total="total"
            @update:current-page="(p)=>{ page=p; fetchList(); }"
            @update:page-size="(s)=>{ pageSize=s; page=1; fetchList(); }" />
        </div>

        <el-dialog v-model="dlg" :title="form.id ? tt('page.category.editTitle') : tt('page.category.addTitle')" width="520px" destroy-on-close>
          <el-form label-width="88px">
            <el-form-item :label="tt('page.category.colName')">
              <el-input v-model="form.name" maxlength="64" />
            </el-form-item>
            <el-form-item :label="tt('page.category.colType')">
              <el-select v-model="form.type" style="width:100%;">
                <el-option :label="tt('page.category.typeProduct')" value="product" />
                <el-option :label="tt('page.category.typeInfluencer')" value="influencer" />
              </el-select>
            </el-form-item>
            <el-form-item :label="tt('page.category.colSort')">
              <el-input-number v-model="form.sort_order" :min="0" :step="1" style="width:100%;" />
            </el-form-item>
            <el-form-item :label="tt('page.category.colStatus')">
              <el-select v-model="form.status" style="width:100%;">
                <el-option :label="tt('common.statusEnabled')" :value="1" />
                <el-option :label="tt('common.statusDisabled')" :value="0" />
              </el-select>
            </el-form-item>
          </el-form>
          <template #footer>
            <el-button @click="dlg=false">{{ tt('common.cancel') }}</el-button>
            <el-button type="primary" :loading="saving" @click="saveForm">{{ tt('common.save') }}</el-button>
          </template>
        </el-dialog>
      </div>
    `
  }).use(ElementPlus).mount('#categoryApp');
  {/literal}
</script>
{/block}
