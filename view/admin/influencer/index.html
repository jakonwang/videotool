{extend name="admin/common/layout" /}

{block name="title"}达人{/block}
{block name="page_title"}{/block}
{block name="breadcrumb"}{/block}
{block name="page_actions"}{/block}

{block name="style"}
<style>
    .content-header { display: none; }
    .tp-ep-wrap { padding: 24px; background: #f4f6f8; min-height: calc(100vh - 0px); }
    .admin-inf-card { background: #fff; padding: 24px; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.03); }
    .admin-inf-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
    .admin-inf-breadcrumb { font-size: 13px; color: #909399; margin-bottom: 6px; }
    .admin-inf-title { font-size: 20px; font-weight: 700; color: #111827; }
    .admin-inf-hint { margin: 6px 0 12px; color: #6b7280; font-size: 12px; line-height: 1.5; }
    .import-log-viewer { background: #0f172a; color: #e2e8f0; font-family: ui-monospace, monospace; font-size: 12px; max-height: 220px; overflow-y: auto; padding: 10px 12px; border-radius: 8px; border: 1px solid #334155; }
    .admin-inf-card .el-table__inner-wrapper::before { height: 0; }
</style>
{/block}

{block name="content"}
<div id="influencerApp" class="tp-ep-wrap"></div>
{/block}

{block name="script"}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.min.css">
<script src="/static/i18n/i18n.js?v=20260407_influencer_complete"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.38/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.full.min.js"></script>
<script>
  {literal}
  const { createApp, reactive, ref, computed, onMounted, onUnmounted } = Vue;
  const { ElMessage, ElMessageBox } = ElementPlus;
  const i18n = window.AppI18n;
  const lang = i18n ? i18n.getLang('zh') : 'zh';
  const tt = (k) => (i18n ? i18n.t(k, null, lang) : k);

  const apiFetchHeaders = {
    'Accept': 'application/json, text/javascript, */*;q=0.01',
    'X-Requested-With': 'XMLHttpRequest',
  };

  function parseJsonBody(res, text) {
    try { return JSON.parse(text); } catch (e) {
      throw new Error('非 JSON 响应 HTTP ' + res.status);
    }
  }

  const headerCellStyle = {
    backgroundColor: '#F9FAFB',
    color: '#4B5563',
    fontWeight: '600',
    height: '48px',
  };
  const cellStyle = { padding: '12px 0' };

  createApp({
    setup() {
      const loading = ref(false);
      const items = ref([]);
      const total = ref(0);
      const page = ref(1);
      const pageSize = ref(10);
      const query = reactive({ keyword: '', status: '' });
      const importing = ref(false);
      const importDialogVisible = ref(false);
      const importTaskId = ref(0);
      const importPercent = ref(0);
      const importStatusText = ref('');
      const importLogs = ref([]);
      const importDone = ref(false);
      let importPollTimer = null;
      const editVisible = ref(false);
      const editSaving = ref(false);
      const editForm = reactive({
        id: 0,
        tiktok_id: '',
        nickname: '',
        avatar_url: '',
        follower_count: 0,
        contact_text: '',
        region: '',
        status: 1,
      });

      function stopImportPolling() {
        if (importPollTimer) {
          clearTimeout(importPollTimer);
          importPollTimer = null;
        }
      }

      async function pollImportTickOnce() {
        if (!importTaskId.value || importDone.value) return;
        try {
          const fd = new URLSearchParams();
          fd.set('task_id', String(importTaskId.value));
          const res = await fetch('/admin.php/influencer/importTaskTick', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { ...apiFetchHeaders, 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
            body: fd.toString(),
          });
          const json = parseJsonBody(res, await res.text());
          if (json && json.code === 401) {
            ElMessage.error('未登录或会话过期');
            stopImportPolling();
            return;
          }
          if (!json || json.code !== 0) {
            ElMessage.error((json && json.msg) || '推进任务失败');
            stopImportPolling();
            return;
          }
          const d = json.data || {};
          importPercent.value = d.percent != null ? Number(d.percent) : 0;
          importStatusText.value = (d.status || '') + ' · ' + (d.processed_rows != null ? d.processed_rows : 0) + '/' + (d.total_rows != null ? d.total_rows : '?');
          importLogs.value = Array.isArray(d.logs) ? d.logs.slice(-80) : [];
          if (d.done) {
            importDone.value = true;
            stopImportPolling();
            const msg = '导入结束：新增 ' + (d.inserted != null ? d.inserted : 0) + '，更新 ' + (d.updated != null ? d.updated : 0) + '，失败 ' + (d.failed != null ? d.failed : 0);
            if (d.status === 'failed') ElMessage.error(msg + (d.error_message ? ' ' + d.error_message : ''));
            else ElMessage.success(msg);
            const input = document.getElementById('infFileInput');
            if (input) input.value = '';
            fetchList();
            return;
          }
        } catch (e) {
          ElMessage.error(e.message || '轮询失败');
          stopImportPolling();
        }
      }

      function startImportPolling() {
        stopImportPolling();
        importDone.value = false;
        const loop = async () => {
          if (!importDialogVisible.value || !importTaskId.value || importDone.value) return;
          await pollImportTickOnce();
          if (!importDone.value && importDialogVisible.value && importTaskId.value) {
            importPollTimer = setTimeout(loop, 1500);
          }
        };
        loop();
      }

      async function fetchList() {
        loading.value = true;
        try {
          const p = new URLSearchParams();
          p.set('page', String(page.value));
          p.set('page_size', String(pageSize.value));
          if (query.keyword) p.set('keyword', query.keyword);
          if (query.status !== '' && query.status != null) p.set('status', String(query.status));
          const res = await fetch('/admin.php/influencer/list?' + p.toString(), { credentials: 'same-origin', headers: { ...apiFetchHeaders } });
          const json = parseJsonBody(res, await res.text());
          if (!json || json.code !== 0) throw new Error((json && json.msg) || tt('common.loadingFailed'));
          items.value = (json.data && json.data.items) ? json.data.items : [];
          total.value = (json.data && json.data.total) ? json.data.total : 0;
        } catch (e) {
          ElMessage.error(e.message || tt('common.loadingFailed'));
        } finally {
          loading.value = false;
        }
      }

      function onSearch() {
        page.value = 1;
        fetchList();
      }

      function onReset() {
        query.keyword = '';
        query.status = '';
        page.value = 1;
        fetchList();
      }

      async function doImport() {
        const input = document.getElementById('infFileInput');
        if (!input || !input.files || !input.files[0]) {
          ElMessage.warning('请选择文件');
          return;
        }
        importing.value = true;
        try {
          const fd = new FormData();
          fd.append('file', input.files[0]);
          const res = await fetch('/admin.php/influencer/importCsv', {
            method: 'POST',
            body: fd,
            credentials: 'same-origin',
            headers: { ...apiFetchHeaders },
          });
          const json = parseJsonBody(res, await res.text());
          if (json && json.code === 401) {
            ElMessage.error('未登录或会话过期');
            return;
          }
          if (json && json.code === 0 && json.data && json.data.mode === 'async' && json.data.task_id) {
            importTaskId.value = Number(json.data.task_id);
            importPercent.value = 0;
            importLogs.value = [];
            importStatusText.value = '…';
            importDialogVisible.value = true;
            startImportPolling();
            return;
          }
          ElMessage.error((json && json.msg) || '导入失败');
        } catch (e) {
          ElMessage.error(e.message || '导入失败');
        } finally {
          importing.value = false;
        }
      }

      function closeImportDialog() {
        stopImportPolling();
        importDialogVisible.value = false;
      }

      async function copyText(text) {
        const t = String(text || '');
        if (!t) return;
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) await navigator.clipboard.writeText(t);
          else {
            const tmp = document.createElement('input');
            tmp.value = t;
            document.body.appendChild(tmp);
            tmp.select();
            document.execCommand('copy');
            document.body.removeChild(tmp);
          }
          ElMessage.success(tt('common.copy') + ' OK');
        } catch (e) {
          ElMessage.error('复制失败');
        }
      }

      function statusLabel(s) {
        const n = Number(s);
        if (n === 0) return tt('page.influencer.status0');
        if (n === 2) return tt('page.influencer.status2');
        return tt('page.influencer.status1');
      }

      function openEdit(row) {
        editForm.id = row.id;
        editForm.tiktok_id = row.tiktok_id || '';
        editForm.nickname = row.nickname || '';
        editForm.avatar_url = row.avatar_url || '';
        editForm.follower_count = row.follower_count != null ? Number(row.follower_count) : 0;
        editForm.contact_text = row.contact_display || '';
        editForm.region = row.region || '';
        editForm.status = row.status != null ? Number(row.status) : 1;
        editVisible.value = true;
      }

      async function saveEdit() {
        editSaving.value = true;
        try {
          const res = await fetch('/admin.php/influencer/update', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { ...apiFetchHeaders, 'Content-Type': 'application/json; charset=UTF-8' },
            body: JSON.stringify({
              id: editForm.id,
              nickname: editForm.nickname,
              avatar_url: editForm.avatar_url,
              follower_count: editForm.follower_count,
              contact_text: editForm.contact_text,
              region: editForm.region,
              status: editForm.status,
            }),
          });
          const json = parseJsonBody(res, await res.text());
          if (json && json.code === 401) {
            ElMessage.error('未登录或会话过期');
            return;
          }
          if (!json || json.code !== 0) {
            ElMessage.error((json && json.msg) || tt('common.loadingFailed'));
            return;
          }
          ElMessage.success(json.msg || tt('common.save'));
          editVisible.value = false;
          fetchList();
        } catch (e) {
          ElMessage.error(e.message || tt('common.loadingFailed'));
        } finally {
          editSaving.value = false;
        }
      }

      async function deleteRow(row) {
        try {
          await ElMessageBox.confirm(tt('page.influencer.deleteConfirm'), tt('common.delete'), { type: 'warning' });
        } catch {
          return;
        }
        try {
          const res = await fetch('/admin.php/influencer/delete', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { ...apiFetchHeaders, 'Content-Type': 'application/json; charset=UTF-8' },
            body: JSON.stringify({ id: row.id }),
          });
          const json = parseJsonBody(res, await res.text());
          if (json && json.code === 401) {
            ElMessage.error('未登录或会话过期');
            return;
          }
          if (!json || json.code !== 0) {
            ElMessage.error((json && json.msg) || tt('common.loadingFailed'));
            return;
          }
          ElMessage.success(json.msg || tt('common.delete'));
          fetchList();
        } catch (e) {
          ElMessage.error(e.message || tt('common.loadingFailed'));
        }
      }

      const rows = computed(() => items.value || []);

      onMounted(() => { fetchList(); });
      onUnmounted(() => { stopImportPolling(); });

      return {
        loading,
        rows,
        total,
        page,
        pageSize,
        query,
        importing,
        importDialogVisible,
        importPercent,
        importStatusText,
        importLogs,
        tt,
        lang,
        headerCellStyle,
        cellStyle,
        onSearch,
        onReset,
        fetchList,
        doImport,
        closeImportDialog,
        copyText,
        statusLabel,
        editVisible,
        editSaving,
        editForm,
        openEdit,
        saveEdit,
        deleteRow,
      };
    },
    template: `
      <div class="admin-inf-card">
        <div class="admin-inf-header">
          <div>
            <div class="admin-inf-breadcrumb">{{ tt('page.influencer.breadcrumb') }}</div>
            <div class="admin-inf-title">{{ tt('page.influencer.title') }}</div>
          </div>
          <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
            <a class="el-button el-button--default" style="text-decoration:none;" href="/admin.php/influencer/sampleCsv" target="_blank" rel="noopener">{{ tt('page.influencer.sampleCsv') }}</a>
            <input type="file" id="infFileInput" accept=".csv,.txt,.xlsx,.xls,.xlsm" style="max-width:220px;" />
            <el-button type="primary" size="default" :loading="importing" @click="doImport">{{ tt('page.influencer.importBtn') }}</el-button>
          </div>
        </div>
        <div class="admin-inf-hint">{{ tt('page.influencer.hint') }}</div>

        <div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:12px; align-items:center;">
          <el-input v-model="query.keyword" clearable :placeholder="tt('page.influencer.searchPh')" style="width:220px;" @keyup.enter="onSearch" />
          <el-select v-model="query.status" clearable :placeholder="tt('page.influencer.statusFilter')" style="width:140px;">
            <el-option :label="tt('common.statusAll')" value="" />
            <el-option :label="tt('page.influencer.status0')" value="0" />
            <el-option :label="tt('page.influencer.status1')" value="1" />
            <el-option :label="tt('page.influencer.status2')" value="2" />
          </el-select>
          <el-button type="primary" @click="onSearch">{{ tt('common.search') }}</el-button>
          <el-button @click="onReset">{{ tt('common.reset') }}</el-button>
        </div>

        <el-table :data="rows" stripe v-loading="loading" :header-cell-style="headerCellStyle" :cell-style="cellStyle" row-key="id">
          <el-table-column prop="tiktok_id" :label="tt('page.influencer.colHandle')" min-width="140" />
          <el-table-column prop="nickname" :label="tt('page.influencer.colNick')" min-width="120" />
          <el-table-column prop="follower_count" :label="tt('page.influencer.colFans')" width="100" />
          <el-table-column prop="region" :label="tt('page.influencer.colRegion')" width="100" />
          <el-table-column :label="tt('page.influencer.colStatus')" width="100">
            <template #default="{ row }">
              <el-tag size="small" :type="Number(row.status)===2 ? 'danger' : (Number(row.status)===0 ? 'info' : 'success')">{{ statusLabel(row.status) }}</el-tag>
            </template>
          </el-table-column>
          <el-table-column :label="tt('page.influencer.colContact')" min-width="160">
            <template #default="{ row }">
              <span style="word-break:break-all; font-size:13px;">{{ row.contact_display || '—' }}</span>
              <el-button v-if="row.contact_display" size="small" link type="primary" @click="copyText(row.contact_display)">{{ tt('common.copy') }}</el-button>
            </template>
          </el-table-column>
          <el-table-column prop="updated_at" :label="tt('page.influencer.colUpdated')" min-width="160" />
          <el-table-column :label="tt('page.influencer.colActions')" width="140" fixed="right">
            <template #default="{ row }">
              <el-button size="small" link type="primary" @click="openEdit(row)">{{ tt('common.edit') }}</el-button>
              <el-button size="small" link type="danger" @click="deleteRow(row)">{{ tt('common.delete') }}</el-button>
            </template>
          </el-table-column>
          <template #empty>
            <div style="padding:24px; text-align:center; color:#909399;">{{ tt('common.noData') }}</div>
          </template>
        </el-table>

        <div style="display:flex; justify-content:flex-end; margin-top:16px;">
          <el-pagination
            v-model:current-page="page"
            v-model:page-size="pageSize"
            layout="total, prev, pager, next"
            :total="total"
            @update:current-page="(p)=>{ page=p; fetchList(); }"
            @update:page-size="(s)=>{ pageSize=s; page=1; fetchList(); }"
          />
        </div>

        <el-dialog v-model="importDialogVisible" :title="tt('page.influencer.importProgress')" width="520px" @close="closeImportDialog">
          <el-progress :percentage="importPercent" />
          <div style="margin-top:8px; font-size:13px; color:#606266;">{{ importStatusText }}</div>
          <div class="import-log-viewer" style="margin-top:12px;">
            <div v-for="(log, idx) in importLogs" :key="idx">{{ log.t }} {{ log.m }}</div>
          </div>
        </el-dialog>

        <el-dialog v-model="editVisible" :title="tt('page.influencer.editTitle')" width="520px" destroy-on-close>
          <el-form label-width="100px" size="default">
            <el-form-item :label="tt('page.influencer.colHandle')">
              <el-input v-model="editForm.tiktok_id" disabled />
            </el-form-item>
            <el-form-item :label="tt('page.influencer.colNick')">
              <el-input v-model="editForm.nickname" />
            </el-form-item>
            <el-form-item :label="tt('page.influencer.colAvatar')">
              <el-input v-model="editForm.avatar_url" type="textarea" :rows="2" />
            </el-form-item>
            <el-form-item :label="tt('page.influencer.colFans')">
              <el-input-number v-model="editForm.follower_count" :min="0" :step="1" style="width:100%;" />
            </el-form-item>
            <el-form-item :label="tt('page.influencer.colRegion')">
              <el-input v-model="editForm.region" />
            </el-form-item>
            <el-form-item :label="tt('page.influencer.colContact')">
              <el-input v-model="editForm.contact_text" type="textarea" :rows="2" />
            </el-form-item>
            <el-form-item :label="tt('page.influencer.colStatus')">
              <el-select v-model="editForm.status" style="width:100%;">
                <el-option :label="tt('page.influencer.status0')" :value="0" />
                <el-option :label="tt('page.influencer.status1')" :value="1" />
                <el-option :label="tt('page.influencer.status2')" :value="2" />
              </el-select>
            </el-form-item>
          </el-form>
          <template #footer>
            <el-button @click="editVisible=false">{{ tt('common.cancel') }}</el-button>
            <el-button type="primary" :loading="editSaving" @click="saveEdit">{{ tt('common.save') }}</el-button>
          </template>
        </el-dialog>
      </div>
    `
  }).use(ElementPlus).mount('#influencerApp');
  {/literal}
</script>
{/block}
