{extend name="admin/common/layout" /}

{block name="title"}{/block}
{block name="page_title"}{/block}
{block name="breadcrumb"}{/block}
{block name="page_actions"}{/block}

{block name="style"}
<style>
    .content-header { display: none; }
    .tp-ep-wrap { padding: 24px; background: #f4f6f8; min-height: calc(100vh - 0px); }
    .admin-inf-card { background: #fff; padding: 24px; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.03); }
    .admin-inf-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
    .admin-inf-breadcrumb { font-size: 13px; color: #909399; margin-bottom: 6px; }
    .admin-inf-title { font-size: 20px; font-weight: 700; color: #111827; }
    .admin-inf-hint { margin: 6px 0 12px; color: #6b7280; font-size: 12px; line-height: 1.5; }
    .import-log-viewer { background: #0f172a; color: #e2e8f0; font-family: ui-monospace, monospace; font-size: 12px; max-height: 220px; overflow-y: auto; padding: 10px 12px; border-radius: 8px; border: 1px solid #334155; }
    .admin-inf-card .el-table__inner-wrapper::before { height: 0; }
    .inf-filter-form .el-form-item { margin-bottom: 0; }
    .inf-nowrap { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
{/block}

{block name="content"}
<div id="influencerApp" class="tp-ep-wrap"></div>
{/block}

{block name="script"}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.min.css">
<script src="/static/i18n/i18n.js?v=20260416_influencer_crm2"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.38/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.full.min.js"></script>
<script>
  {literal}
  const { createApp, reactive, ref, computed, onMounted, onUnmounted, nextTick } = Vue;
  const { ElMessage, ElMessageBox } = ElementPlus;
  const i18n = window.AppI18n;
  const lang = i18n ? i18n.getLang('zh') : 'zh';
  const tt = (k, vars) => (i18n ? i18n.t(k, vars || null, lang) : k);

  const apiFetchHeaders = {
    'Accept': 'application/json, text/javascript, */*;q=0.01',
    'X-Requested-With': 'XMLHttpRequest',
  };

  function parseJsonBody(res, text) {
    try { return JSON.parse(text); } catch (e) {
      throw new Error(tt('page.styleSearch.errNonJson', { status: res.status }));
    }
  }

  const headerCellStyle = {
    backgroundColor: '#F9FAFB',
    color: '#4B5563',
    fontWeight: '600',
    height: '48px',
  };
  const cellStyle = { padding: '12px 0' };

  createApp({
    setup() {
      const loading = ref(false);
      const items = ref([]);
      const total = ref(0);
      const page = ref(1);
      const pageSize = ref(10);
      const query = reactive({ keyword: '', status: '', category_id: '', tag_list: [], sort_by_contact: 0 });
      const categoryOptions = ref([]);
      const tagOptions = ref([]);
      const importing = ref(false);
      const importDialogVisible = ref(false);
      const importTaskId = ref(0);
      const importPercent = ref(0);
      const importStatusText = ref('');
      const importLogs = ref([]);
      const importDone = ref(false);
      let importPollTimer = null;
      const editVisible = ref(false);
      const editSaving = ref(false);
      const editForm = reactive({
        id: 0,
        tiktok_id: '',
        category_name: '',
        category_id: null,
        nickname: '',
        avatar_url: '',
        follower_count: 0,
        contact_whatsapp: '',
        contact_zalo: '',
        contact_note: '',
        region: '',
        status: 0,
        sample_tracking_no: '',
        sample_status: 0,
        tags: [],
      });
      const editTagInputVisible = ref(false);
      const editTagInputValue = ref('');
      const editTagInputRef = ref(null);
      const sampleShipVisible = ref(false);
      const sampleShipSaving = ref(false);
      const sampleShipForm = reactive({
        id: 0,
        tiktok_id: '',
        nickname: '',
        sample_tracking_no: '',
      });

      const outreachVisible = ref(false);
      const outreachRow = ref(null);
      const tplList = ref([]);
      const productList = ref([]);
      const outreachTplId = ref(null);
      const outreachProductId = ref(null);
      const outreachPreview = ref('');
      const outreachWaUrl = ref('');
      const outreachZaloUrl = ref('');
      const outreachRendering = ref(false);
      const historyVisible = ref(false);
      const historyRows = ref([]);

      function stopImportPolling() {
        if (importPollTimer) {
          clearTimeout(importPollTimer);
          importPollTimer = null;
        }
      }

      function mergeTagOptions(tags) {
        const merged = new Set(Array.isArray(tagOptions.value) ? tagOptions.value : []);
        if (Array.isArray(tags)) {
          tags.forEach((tag) => {
            const v = String(tag || '').trim();
            if (v) merged.add(v);
          });
        }
        tagOptions.value = Array.from(merged).sort((a, b) => a.localeCompare(b));
      }

      async function loadCategoryOptions(forceReload = false) {
        if (!forceReload && Array.isArray(categoryOptions.value) && categoryOptions.value.length) return;
        try {
          const res = await fetch('/admin.php/category/options?type=influencer', { credentials: 'same-origin', headers: { ...apiFetchHeaders } });
          const json = parseJsonBody(res, await res.text());
          if (json && json.code === 0 && json.data && Array.isArray(json.data.items)) {
            categoryOptions.value = json.data.items;
          }
        } catch (e) {
          ElMessage.error(e.message || tt('common.loadingFailed'));
        }
      }

      async function pollImportTickOnce() {
        if (!importTaskId.value || importDone.value) return;
        try {
          const fd = new URLSearchParams();
          fd.set('task_id', String(importTaskId.value));
          const res = await fetch('/admin.php/influencer/importTaskTick', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { ...apiFetchHeaders, 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
            body: fd.toString(),
          });
          const json = parseJsonBody(res, await res.text());
          if (json && json.code === 401) {
            ElMessage.error(tt('common.sessionExpired'));
            stopImportPolling();
            return;
          }
          if (!json || json.code !== 0) {
            ElMessage.error((json && json.msg) || tt('page.styleSearch.taskPushFail'));
            stopImportPolling();
            return;
          }
          const d = json.data || {};
          importPercent.value = d.percent != null ? Number(d.percent) : 0;
          importStatusText.value = tt('page.styleSearch.tickLine', {
            status: d.status || '',
            processed: d.processed_rows != null ? d.processed_rows : 0,
            total: d.total_rows != null ? d.total_rows : '?',
          });
          importLogs.value = Array.isArray(d.logs) ? d.logs.slice(-80) : [];
          if (d.done) {
            importDone.value = true;
            stopImportPolling();
            const msg = tt('page.styleSearch.importSummary', {
              inserted: d.inserted != null ? d.inserted : 0,
              updated: d.updated != null ? d.updated : 0,
              failed: d.failed != null ? d.failed : 0,
              err: d.error_message ? ' ' + d.error_message : '',
            });
            if (d.status === 'failed') ElMessage.error(msg);
            else ElMessage.success(msg);
            const input = document.getElementById('infFileInput');
            if (input) input.value = '';
            fetchList();
            return;
          }
        } catch (e) {
          ElMessage.error(e.message || tt('page.styleSearch.pollFail'));
          stopImportPolling();
        }
      }

      function startImportPolling() {
        stopImportPolling();
        importDone.value = false;
        const loop = async () => {
          if (!importDialogVisible.value || !importTaskId.value || importDone.value) return;
          await pollImportTickOnce();
          if (!importDone.value && importDialogVisible.value && importTaskId.value) {
            importPollTimer = setTimeout(loop, 1500);
          }
        };
        loop();
      }

      async function fetchList() {
        loading.value = true;
        try {
          const p = new URLSearchParams();
          p.set('page', String(page.value));
          p.set('page_size', String(pageSize.value));
          if (query.keyword) p.set('keyword', query.keyword);
          if (query.status !== '' && query.status != null) p.set('status', String(query.status));
          if (query.category_id) p.set('category_id', String(query.category_id));
          if (Array.isArray(query.tag_list) && query.tag_list.length) {
            query.tag_list.forEach((tag) => {
              const v = String(tag || '').trim();
              if (v) p.append('tags[]', v);
            });
          }
          if (Number(query.sort_by_contact) === 1) p.set('sort_by_contact', '1');
          const res = await fetch('/admin.php/influencer/listJson?' + p.toString(), { credentials: 'same-origin', headers: { ...apiFetchHeaders } });
          const json = parseJsonBody(res, await res.text());
          if (!json || json.code !== 0) throw new Error((json && json.msg) || tt('common.loadingFailed'));
          items.value = (json.data && json.data.items) ? json.data.items : [];
          if (json.data && Array.isArray(json.data.tag_options)) {
            mergeTagOptions(json.data.tag_options);
          }
          items.value.forEach((row) => mergeTagOptions(row.tags || []));
          total.value = (json.data && json.data.total) ? json.data.total : 0;
        } catch (e) {
          ElMessage.error(e.message || tt('common.loadingFailed'));
        } finally {
          loading.value = false;
        }
      }

      function onSearch() {
        page.value = 1;
        fetchList();
      }

      function onReset() {
        query.keyword = '';
        query.status = '';
        query.category_id = '';
        query.tag_list = [];
        query.sort_by_contact = 0;
        page.value = 1;
        fetchList();
      }

      async function doImport() {
        const input = document.getElementById('infFileInput');
        if (!input || !input.files || !input.files[0]) {
          ElMessage.warning(tt('page.influencer.pickFile'));
          return;
        }
        importing.value = true;
        try {
          const fd = new FormData();
          fd.append('file', input.files[0]);
          const res = await fetch('/admin.php/influencer/importCsv', {
            method: 'POST',
            body: fd,
            credentials: 'same-origin',
            headers: { ...apiFetchHeaders },
          });
          const json = parseJsonBody(res, await res.text());
          if (json && json.code === 401) {
            ElMessage.error(tt('common.sessionExpired'));
            return;
          }
          if (json && json.code === 0 && json.data && json.data.mode === 'async' && json.data.task_id) {
            importTaskId.value = Number(json.data.task_id);
            importPercent.value = 0;
            importLogs.value = [];
            importStatusText.value = tt('page.influencer.ellipsis');
            importDialogVisible.value = true;
            startImportPolling();
            return;
          }
          ElMessage.error((json && json.msg) || tt('page.styleSearch.importFail'));
        } catch (e) {
          ElMessage.error(e.message || tt('page.styleSearch.importFail'));
        } finally {
          importing.value = false;
        }
      }

      function closeImportDialog() {
        stopImportPolling();
        importDialogVisible.value = false;
      }

      async function copyText(text) {
        const t = String(text || '');
        if (!t) return;
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) await navigator.clipboard.writeText(t);
          else {
            const tmp = document.createElement('input');
            tmp.value = t;
            document.body.appendChild(tmp);
            tmp.select();
            document.execCommand('copy');
            document.body.removeChild(tmp);
          }
          ElMessage.success(tt('common.copyDone'));
        } catch (e) {
          ElMessage.error(tt('common.copyFail'));
        }
      }

      function statusLabel(s) {
        const n = Number(s);
        if (n === 0) return tt('page.influencer.status0');
        if (n === 1) return tt('page.influencer.status1');
        if (n === 2) return tt('page.influencer.status2');
        if (n === 3) return tt('page.influencer.status3');
        if (n === 4) return tt('page.influencer.status4');
        if (n === 5) return tt('page.influencer.status5');
        return tt('page.influencer.status6');
      }

      function statusTagType(s) {
        const n = Number(s);
        if (n === 6) return 'danger';
        if (n === 5) return 'success';
        if (n === 4) return 'warning';
        if (n === 0) return 'info';
        return '';
      }

      function formatFollowers(value) {
        const n = Number(value || 0);
        if (!Number.isFinite(n) || n <= 0) return '0';
        if (n >= 10000) {
          const w = Math.round((n / 10000) * 10) / 10;
          return String(w).replace(/\.0$/, '') + 'w';
        }
        return String(Math.trunc(n));
      }

      function handleMoreAction(row, command) {
        if (!row || !command) return;
        const cmd = String(command);
        if (cmd.indexOf('status:') === 0) {
          const status = Number(cmd.slice(7));
          if (Number.isInteger(status) && status >= 0 && status <= 6) {
            quickSetStatus(row, status);
          }
          return;
        }
        if (cmd === 'history') {
          openHistory(row);
          return;
        }
        if (cmd === 'edit') {
          openEdit(row);
          return;
        }
        if (cmd === 'delete') {
          deleteRow(row);
        }
      }

      async function openEdit(row) {
        await loadCategoryOptions(true);
        const ch = row.contact_channels || {};
        editForm.id = row.id;
        editForm.tiktok_id = row.tiktok_id || '';
        editForm.category_name = row.category_name || '';
        editForm.category_id = row.category_id || null;
        editForm.nickname = row.nickname || '';
        editForm.avatar_url = row.avatar_url || '';
        editForm.follower_count = row.follower_count != null ? Number(row.follower_count) : 0;
        editForm.contact_whatsapp = ch.whatsapp || '';
        editForm.contact_zalo = ch.zalo || '';
        editForm.contact_note = ch.text || '';
        editForm.region = row.region || '';
        editForm.status = row.status != null ? Number(row.status) : 0;
        editForm.sample_tracking_no = row.sample_tracking_no || '';
        editForm.sample_status = row.sample_status != null ? Number(row.sample_status) : 0;
        editForm.tags = Array.isArray(row.tags) ? [...row.tags] : [];
        mergeTagOptions(editForm.tags);
        editTagInputVisible.value = false;
        editTagInputValue.value = '';
        editVisible.value = true;
      }

      function removeEditTag(tag) {
        const value = String(tag || '').trim();
        if (!value) return;
        editForm.tags = (editForm.tags || []).filter((item) => String(item || '').trim() !== value);
      }

      async function showEditTagInput() {
        editTagInputVisible.value = true;
        await nextTick();
        if (editTagInputRef.value && typeof editTagInputRef.value.focus === 'function') {
          editTagInputRef.value.focus();
        }
      }

      function confirmEditTagInput() {
        const value = String(editTagInputValue.value || '').trim();
        if (value && !(editForm.tags || []).some((item) => String(item || '').trim() === value)) {
          editForm.tags = [...(editForm.tags || []), value];
          mergeTagOptions([value]);
        }
        editTagInputVisible.value = false;
        editTagInputValue.value = '';
      }

      async function saveEdit() {
        const selectedCategory = (categoryOptions.value || []).find((c) => Number(c.id) === Number(editForm.category_id));
        editSaving.value = true;
        try {
          const res = await fetch('/admin.php/influencer/update', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { ...apiFetchHeaders, 'Content-Type': 'application/json; charset=UTF-8' },
            body: JSON.stringify({
              id: editForm.id,
              category_id: editForm.category_id || 0,
              category_name: selectedCategory ? selectedCategory.name : '',
              nickname: editForm.nickname,
              avatar_url: editForm.avatar_url,
              follower_count: editForm.follower_count,
              contact_whatsapp: editForm.contact_whatsapp,
              contact_zalo: editForm.contact_zalo,
              contact_note: editForm.contact_note,
              region: editForm.region,
              status: editForm.status,
              sample_tracking_no: editForm.sample_tracking_no,
              sample_status: editForm.sample_status,
              tags: Array.isArray(editForm.tags) ? editForm.tags : [],
            }),
          });
          const json = parseJsonBody(res, await res.text());
          if (json && json.code === 401) {
            ElMessage.error(tt('common.sessionExpired'));
            return;
          }
          if (!json || json.code !== 0) {
            ElMessage.error((json && json.msg) || tt('common.loadingFailed'));
            return;
          }
          ElMessage.success(json.msg || tt('common.saved'));
          editVisible.value = false;
          fetchList();
        } catch (e) {
          ElMessage.error(e.message || tt('common.loadingFailed'));
        } finally {
          editSaving.value = false;
        }
      }

      async function deleteRow(row) {
        try {
          await ElMessageBox.confirm(tt('page.influencer.deleteConfirm'), tt('page.influencer.deleteDialogTitle'), {
            type: 'warning',
            confirmButtonText: tt('common.delete'),
            cancelButtonText: tt('common.cancel'),
          });
        } catch {
          return;
        }
        try {
          const res = await fetch('/admin.php/influencer/delete', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { ...apiFetchHeaders, 'Content-Type': 'application/json; charset=UTF-8' },
            body: JSON.stringify({ id: row.id }),
          });
          const json = parseJsonBody(res, await res.text());
          if (json && json.code === 401) {
            ElMessage.error(tt('common.sessionExpired'));
            return;
          }
          if (!json || json.code !== 0) {
            ElMessage.error((json && json.msg) || tt('common.loadingFailed'));
            return;
          }
          ElMessage.success(json.msg || tt('common.deleted'));
          fetchList();
        } catch (e) {
          ElMessage.error(e.message || tt('common.loadingFailed'));
        }
      }

      async function loadOutreachLists() {
        try {
          const [r1, r2] = await Promise.all([
            fetch('/admin.php/message_template/listJson?page=1&page_size=200&enabled=1', { credentials: 'same-origin', headers: { ...apiFetchHeaders } }),
            fetch('/admin.php/product/listJson?page=1&page_size=500&status=1', { credentials: 'same-origin', headers: { ...apiFetchHeaders } }),
          ]);
          const j1 = parseJsonBody(r1, await r1.text());
          const j2 = parseJsonBody(r2, await r2.text());
          if (j1 && j1.code === 0 && j1.data && j1.data.items) {
            tplList.value = j1.data.items.filter((x) => Number(x.status) === 1);
          }
          if (j2 && j2.code === 0 && j2.data && j2.data.items) {
            productList.value = j2.data.items;
          }
        } catch (e) {
          /* ignore */
        }
      }

      async function openOutreach(row) {
        outreachRow.value = row;
        outreachTplId.value = null;
        outreachProductId.value = null;
        outreachPreview.value = '';
        outreachWaUrl.value = '';
        outreachZaloUrl.value = '';
        outreachVisible.value = true;
        await loadOutreachLists();
        if (tplList.value.length) {
          outreachTplId.value = tplList.value[0].id;
        } else {
          ElMessage.warning(tt('page.influencer.noTemplates'));
        }
        await renderOutreachPreview();
      }

      async function quickSetStatus(row, status) {
        try {
          const res = await fetch('/admin.php/influencer/updateStatus', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { ...apiFetchHeaders, 'Content-Type': 'application/json; charset=UTF-8' },
            body: JSON.stringify({ id: row.id, status }),
          });
          const json = parseJsonBody(res, await res.text());
          if (!json || json.code !== 0) {
            ElMessage.error((json && json.msg) || tt('common.loadingFailed'));
            return;
          }
          ElMessage.success(tt('common.updated'));
          fetchList();
        } catch (e) {
          ElMessage.error(e.message || tt('common.loadingFailed'));
        }
      }

      function openSampleShipDialog(row) {
        sampleShipForm.id = Number(row.id || 0);
        sampleShipForm.tiktok_id = row.tiktok_id || '';
        sampleShipForm.nickname = row.nickname || '';
        sampleShipForm.sample_tracking_no = row.sample_tracking_no || '';
        sampleShipVisible.value = true;
      }

      async function submitSampleShip() {
        if (!sampleShipForm.id) return;
        const trackingNo = String(sampleShipForm.sample_tracking_no || '').trim();
        if (!trackingNo) {
          ElMessage.warning(tt('page.influencer.sampleTrackingRequired'));
          return;
        }
        sampleShipSaving.value = true;
        try {
          const res = await fetch('/admin.php/influencer/markSampleShipped', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { ...apiFetchHeaders, 'Content-Type': 'application/json; charset=UTF-8' },
            body: JSON.stringify({
              id: sampleShipForm.id,
              sample_tracking_no: trackingNo,
            }),
          });
          const json = parseJsonBody(res, await res.text());
          if (json && json.code === 401) {
            ElMessage.error(tt('common.sessionExpired'));
            return;
          }
          if (!json || json.code !== 0) {
            ElMessage.error((json && json.msg) || tt('common.loadingFailed'));
            return;
          }
          ElMessage.success(tt('common.updated'));
          sampleShipVisible.value = false;
          fetchList();
        } catch (e) {
          ElMessage.error(e.message || tt('common.loadingFailed'));
        } finally {
          sampleShipSaving.value = false;
        }
      }

      async function renderOutreachPreview() {
        const row = outreachRow.value;
        if (!row || !outreachTplId.value) {
          outreachPreview.value = '';
          outreachWaUrl.value = '';
          outreachZaloUrl.value = '';
          return;
        }
        outreachRendering.value = true;
        try {
          const body = {
            template_id: outreachTplId.value,
            influencer_id: row.id,
            product_id: outreachProductId.value || 0,
          };
          const res = await fetch('/admin.php/message_template/render', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { ...apiFetchHeaders, 'Content-Type': 'application/json; charset=UTF-8' },
            body: JSON.stringify(body),
          });
          const json = parseJsonBody(res, await res.text());
          if (json && json.code === 401) {
            ElMessage.error(tt('common.sessionExpired'));
            return;
          }
          if (!json || json.code !== 0) {
            outreachPreview.value = (json && json.msg) || tt('common.loadingFailed');
            outreachWaUrl.value = '';
            outreachZaloUrl.value = '';
            return;
          }
          const d = json.data || {};
          outreachPreview.value = d.text || '';
          outreachWaUrl.value = d.wa_url || '';
          outreachZaloUrl.value = d.zalo_url || '';
        } catch (e) {
          outreachPreview.value = e.message || tt('common.loadingFailed');
        } finally {
          outreachRendering.value = false;
        }
      }

      async function trackOutreachAction(action) {
        const row = outreachRow.value;
        if (!row || !outreachTplId.value) return;
        const res = await fetch('/admin.php/influencer/logOutreachAction', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { ...apiFetchHeaders, 'Content-Type': 'application/json; charset=UTF-8' },
          body: JSON.stringify({
            influencer_id: row.id,
            template_id: outreachTplId.value,
            product_id: outreachProductId.value || 0,
            action: action,
            rendered_body: outreachPreview.value || '',
          }),
        });
        const json = parseJsonBody(res, await res.text());
        if (json && json.code === 401) {
          throw new Error(tt('common.sessionExpired'));
        }
        if (!json || json.code !== 0) {
          throw new Error((json && json.msg) || tt('common.loadingFailed'));
        }
      }

      async function copyOutreachText() {
        const t = outreachPreview.value || '';
        if (!t) return;
        await copyText(t);
        try {

          try {

        } else {

          }
        }
      }
