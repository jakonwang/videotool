{extend name="admin/common/layout" /}

{block name="title"}用户{/block}
{block name="page_title"}{/block}
{block name="breadcrumb"}{/block}
{block name="page_actions"}{/block}

{block name="style"}
<style>
  .content-header { display: none; }

  /* High-Density Modern（与缓存页统一，仅该页生效） */
  .tp-ep-wrap {
    padding: 24px;
    background: #f4f6f8;
    min-height: calc(100vh - 0px);
  }
  .admin-user-card {
    background: #ffffff;
    padding: 24px;
    border-radius: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.03);
  }
  .admin-user-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 16px;
  }
  .admin-user-breadcrumb {
    font-size: 13px;
    color: #909399;
    line-height: 18px;
    margin-bottom: 6px;
  }
  .admin-user-title {
    font-size: 20px;
    font-weight: 700;
    color: #111827;
    line-height: 28px;
  }
  .admin-user-actions { display:flex; gap:12px; }
  .admin-user-actions .el-button { border-radius: 6px; }

  .admin-user-filters {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: nowrap;
    overflow-x: hidden;
    padding-bottom: 0;
    margin-bottom: 12px;
  }
  @media (max-width: 1200px) {
    .admin-user-filters { overflow-x: auto; padding-bottom: 4px; }
  }
  .admin-user-filter-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 0 0 auto;
    margin-left: auto;
  }
  .name-cell { font-weight: 500; color: #303133; }
  .admin-user-card .el-table__inner-wrapper::before { height: 0; }
  .admin-user-footer { display:flex; justify-content:flex-end; margin-top:20px; }
</style>
{/block}

{block name="content"}
<div class="tp-ep-wrap" id="adminUserApp"></div>
{/block}

{block name="script"}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.min.css">
<script src="/static/i18n/i18n.js?v=20260414_full_sync"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.38/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js"></script>
<script>
  {literal}
  const { createApp, reactive, ref, computed, onMounted } = Vue;
  const { ElMessage, ElMessageBox } = ElementPlus;
  const { Plus, Search, Edit, Key, Delete } = ElementPlusIconsVue;
  const i18n = window.AppI18n;
  const lang = i18n ? i18n.getLang('zh') : 'zh';
  const tt = (k, vars) => (i18n ? i18n.t(k, vars || null, lang) : k);

  const headerCellStyle = {
    backgroundColor: '#F9FAFB',
    color: '#4B5563',
    fontWeight: '600',
    height: '48px',
    borderBottom: '1px solid #E5E7EB'
  };
  const cellStyle = { padding: '12px 0' };

  createApp({
    setup() {
      const loading = ref(false);
      const items = ref([]);
      const total = ref(0);
      const page = ref(1);
      const pageSize = ref(10);
      const me = ref({ id: 0, username: '' });

      const query = reactive({
        keyword: '',
        status: '',
      });

      const dialog = reactive({
        visible: false,
        mode: 'create', // create | edit
        form: { id: 0, username: '', password: '', status: 1 },
      });

      const pwdDialog = reactive({
        visible: false,
        id: 0,
        username: '',
        password: '',
      });

      async function fetchList() {
        loading.value = true;
        try {
          const params = new URLSearchParams();
          params.set('page', String(page.value));
          params.set('page_size', String(pageSize.value));
          if (query.keyword) params.set('keyword', query.keyword);
          if (query.status !== '' && query.status !== null) params.set('status', String(query.status));
          const res = await fetch('/admin.php/user/listJson?' + params.toString(), { credentials: 'same-origin' });
          const json = await res.json();
          if (!json || json.code !== 0) throw new Error((json && json.msg) || tt('common.loadingFailed'));
          items.value = (json.data && json.data.items) ? json.data.items : [];
          total.value = (json.data && json.data.total) ? json.data.total : 0;
          me.value = (json.data && json.data.me) ? json.data.me : { id: 0, username: '' };
        } catch (e) {
          ElMessage.error(e && e.message ? e.message : tt('common.loadingFailed'));
        } finally {
          loading.value = false;
        }
      }

      function onSearch() {
        page.value = 1;
        fetchList();
      }

      function onReset() {
        query.keyword = '';
        query.status = '';
        page.value = 1;
        fetchList();
      }

      function openCreate() {
        dialog.mode = 'create';
        dialog.form = { id: 0, username: '', password: '', status: 1 };
        dialog.visible = true;
      }

      function openEdit(row) {
        dialog.mode = 'edit';
        dialog.form = { id: row.id, username: row.username, password: '', status: String(row.status) === '1' ? 1 : 0 };
        dialog.visible = true;
      }

      async function submitDialog() {
        const username = String(dialog.form.username || '').trim();
        if (!username) {
          ElMessage.warning(lang === 'en' ? 'Please enter username' : '请输入用户名');
          return;
        }

        if (dialog.mode === 'create') {
          const password = String(dialog.form.password || '');
          if (password.length < 6) {
            ElMessage.warning(lang === 'en' ? 'Password must be at least 6 characters' : '密码至少 6 位');
            return;
          }
          await postForm('/admin.php/user/create', {
            username,
            password,
            status: String(dialog.form.status || 1),
          }, '创建成功');
        } else {
          await postForm('/admin.php/user/update', {
            id: String(dialog.form.id),
            username,
            status: String(dialog.form.status || 1),
          }, '已保存');
        }

        dialog.visible = false;
        fetchList();
      }

      function openResetPwd(row) {
        pwdDialog.id = row.id;
        pwdDialog.username = row.username;
        pwdDialog.password = '';
        pwdDialog.visible = true;
      }

      async function submitResetPwd() {
        const p = String(pwdDialog.password || '');
        if (p.length < 6) {
          ElMessage.warning(lang === 'en' ? 'Password must be at least 6 characters' : '密码至少 6 位');
          return;
        }
        await postForm('/admin.php/user/resetPassword', {
          id: String(pwdDialog.id),
          password: p,
        }, '密码已重置');
        pwdDialog.visible = false;
      }

      async function doToggle(row) {
        if (me.value && Number(me.value.id) === Number(row.id)) {
          ElMessage.warning(lang === 'en' ? 'Cannot disable current account' : '不能禁用当前登录账号');
          return;
        }
        await postForm('/admin.php/user/toggle', { id: String(row.id) }, '已更新');
        fetchList();
      }

      async function doDelete(row) {
        if (me.value && Number(me.value.id) === Number(row.id)) {
          ElMessage.warning(lang === 'en' ? 'Cannot delete current account' : '不能删除当前登录账号');
          return;
        }
        await ElMessageBox.confirm(
          lang === 'en' ? `Delete user "${row.username}"?` : `确认删除用户「${row.username}」？`,
          lang === 'en' ? 'Confirm' : '删除确认',
          {
          type: 'warning',
          confirmButtonText: tt('common.delete'),
          cancelButtonText: tt('common.cancel'),
        });
        await postForm('/admin.php/user/delete', { id: String(row.id) }, '已删除');
        const maxPage = Math.max(1, Math.ceil(Math.max(0, total.value - 1) / pageSize.value));
        page.value = Math.min(page.value, maxPage);
        fetchList();
      }

      async function postForm(url, data, successMsg) {
        const body = new URLSearchParams();
        Object.keys(data || {}).forEach((k) => body.set(k, String(data[k] ?? '')));
        const resp = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
          body: body.toString(),
          credentials: 'same-origin',
        });
        const json = await resp.json();
        if (!json || json.code !== 0) {
          throw new Error((json && json.msg) || (lang === 'en' ? 'Operation failed' : '操作失败'));
        }
        ElMessage.success(successMsg || (json.msg || '成功'));
      }

      const rows = computed(() => items.value || []);

      onMounted(() => fetchList());

      return {
        loading,
        query,
        rows,
        total,
        page,
        pageSize,
        headerCellStyle,
        cellStyle,
        dialog,
        pwdDialog,
        Plus,
        Search,
        Edit,
        Key,
        Delete,
        tt,
        onSearch,
        onReset,
        openCreate,
        openEdit,
        submitDialog,
        openResetPwd,
        submitResetPwd,
        doToggle,
        doDelete,
        fetchList,
      };
    },
    template: `
      <div class="admin-user-card">
        <div class="admin-user-header">
          <div>
            <div class="admin-user-breadcrumb">${tt('page.user.breadcrumb')}</div>
            <div class="admin-user-title">${tt('page.user.title')}</div>
          </div>
          <div class="admin-user-actions">
            <el-button size="default" type="primary" :icon="Plus" @click="openCreate">${tt('page.user.add')}</el-button>
          </div>
        </div>

        <div class="admin-user-filters">
          <el-input
            v-model="query.keyword"
            size="default"
            clearable
            :placeholder="tt('page.user.searchUser')"
            :prefix-icon="Search"
            style="width:260px; flex:0 0 auto;"
            @keyup.enter="onSearch"
          />
          <el-select v-model="query.status" size="default" clearable :placeholder="tt('common.statusAll')" style="width:140px; flex:0 0 auto;">
            <el-option :label="tt('common.statusEnabled')" value="1" />
            <el-option :label="tt('common.statusDisabled')" value="0" />
          </el-select>

          <div class="admin-user-filter-actions">
            <el-button size="default" type="primary" @click="onSearch">{{ tt('common.filter') }}</el-button>
            <el-button size="default" @click="onReset">{{ tt('common.reset') }}</el-button>
          </div>
        </div>

        <el-table
          :data="rows"
          stripe
          row-key="id"
          v-loading="loading"
          :header-cell-style="headerCellStyle"
          :cell-style="cellStyle"
        >
          <el-table-column prop="id" label="ID" width="80" />
          <el-table-column :label="lang==='en'?'Username':'用户名'" min-width="180">
            <template #default="{ row }">
              <span class="name-cell">{{ row.username }}</span>
            </template>
          </el-table-column>
          <el-table-column :label="lang==='en'?'Status':'状态'" width="120">
            <template #default="{ row }">
              <el-tag size="default" effect="light" :type="String(row.status) === '1' ? 'success' : 'info'">
                {{ String(row.status) === '1' ? tt('common.statusEnabled') : tt('common.statusDisabled') }}
              </el-tag>
            </template>
          </el-table-column>
          <el-table-column prop="last_login_at" :label="lang==='en'?'Last login':'最后登录'" min-width="180" />
          <el-table-column prop="last_login_ip" label="IP" width="160" show-overflow-tooltip />
          <el-table-column prop="created_at" :label="lang==='en'?'Created':'创建时间'" min-width="180" />
          <el-table-column :label="lang==='en'?'Actions':'操作'" width="240" fixed="right">
            <template #default="{ row }">
              <el-button size="default" link type="primary" :icon="Edit" @click="openEdit(row)">{{ tt('common.edit') }}</el-button>
              <el-button size="default" link type="primary" :icon="Key" @click="openResetPwd(row)">{{ lang==='en'?'Reset password':'重置密码' }}</el-button>
              <el-button size="default" link type="primary" @click="doToggle(row)">{{ lang==='en'?'Toggle':'启停' }}</el-button>
              <el-button size="default" link type="danger" :icon="Delete" @click="doDelete(row)">{{ tt('common.delete') }}</el-button>
            </template>
          </el-table-column>
        </el-table>

        <div class="admin-user-footer">
          <el-pagination
            v-model:current-page="page"
            v-model:page-size="pageSize"
            size="default"
            background
            layout="total, prev, pager, next"
            :total="total"
            @update:current-page="(p)=>{ page=p; fetchList(); }"
            @update:page-size="(s)=>{ pageSize=s; page=1; fetchList(); }"
          />
        </div>

        <el-dialog v-model="dialog.visible" :title="dialog.mode === 'create' ? (lang==='en'?'Add user':'添加用户') : (lang==='en'?'Edit user':'编辑用户')" width="520px">
          <el-form label-width="92px">
            <el-form-item :label="lang==='en'?'Username':'用户名'">
              <el-input v-model="dialog.form.username" size="default" :placeholder="lang==='en'?'Enter username':'请输入用户名'" />
            </el-form-item>
            <el-form-item v-if="dialog.mode === 'create'" :label="lang==='en'?'Password':'密码'">
              <el-input v-model="dialog.form.password" size="default" :placeholder="lang==='en'?'At least 6 characters':'至少 6 位'" show-password />
            </el-form-item>
            <el-form-item :label="lang==='en'?'Status':'状态'">
              <el-select v-model="dialog.form.status" size="default" style="width:140px">
                <el-option :label="tt('common.statusEnabled')" :value="1" />
                <el-option :label="tt('common.statusDisabled')" :value="0" />
              </el-select>
            </el-form-item>
          </el-form>
          <template #footer>
            <el-button size="default" @click="dialog.visible=false">{{ tt('common.cancel') }}</el-button>
            <el-button size="default" type="primary" @click="submitDialog">{{ tt('common.save') }}</el-button>
          </template>
        </el-dialog>

        <el-dialog v-model="pwdDialog.visible" :title="lang==='en'?'Reset password':'重置密码'" width="520px">
          <el-form label-width="92px">
            <el-form-item :label="lang==='en'?'User':'用户'">
              <el-input :model-value="pwdDialog.username" size="default" disabled />
            </el-form-item>
            <el-form-item :label="lang==='en'?'New password':'新密码'">
              <el-input v-model="pwdDialog.password" size="default" :placeholder="lang==='en'?'At least 6 characters':'至少 6 位'" show-password @keyup.enter="submitResetPwd" />
            </el-form-item>
          </el-form>
          <template #footer>
            <el-button size="default" @click="pwdDialog.visible=false">{{ tt('common.cancel') }}</el-button>
            <el-button size="default" type="primary" @click="submitResetPwd">{{ tt('common.ok') }}</el-button>
          </template>
        </el-dialog>
      </div>
    `
  }).use(ElementPlus).mount('#adminUserApp');
  {/literal}
</script>
{/block}
