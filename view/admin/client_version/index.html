{extend name="admin/common/layout" /}

{block name="title"}鐗堟湰{/block}
{block name="page_title"}{/block}
{block name="breadcrumb"}{/block}
{block name="page_actions"}{/block}

{block name="style"}
<style>
    .content-header { display: none; }
    .admin-modern-card .el-table__inner-wrapper::before { height: 0; }
    .notes-preview { max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #4b5563; font-size: 13px; }
</style>
{/block}

{block name="content"}
<div id="clientVersionApp" class="admin-page-container"></div>
{/block}

{block name="script"}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.min.css">
<script src="/static/i18n/i18n.js?v=20260406_category1"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.38/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.full.min.js"></script>
<script>
  {literal}
  const { createApp, reactive, ref, computed, onMounted } = Vue;
  const { ElMessage, ElMessageBox } = ElementPlus;
  const i18n = window.AppI18n;
  const lang = i18n ? i18n.getLang('zh') : 'zh';
  const tt = (k, vars) => (i18n ? i18n.t(k, vars || null, lang) : k);

  const headerCellStyle = {
    backgroundColor: '#F9FAFB',
    color: '#4B5563',
    fontWeight: '600',
    height: '48px',
    borderBottom: '1px solid #E5E7EB',
  };
  const cellStyle = { padding: '12px 0' };

  const apiFetchHeaders = {
    'Accept': 'application/json, text/javascript, */*;q=0.01',
    'X-Requested-With': 'XMLHttpRequest',
  };

  function parseJsonBody(res, text) {
    if (res.status === 413) {
      throw new Error(
        '鏂囦欢瓒呰繃鏈嶅姟鍣ㄥ厑璁哥殑涓婁紶澶у皬锛圚TTP 413锛夈€傝鍘嬬缉瀹夎鍖呫€佹敼鐢ㄤ笅杞界洿閾撅紝鎴栧湪鏈嶅姟鍣ㄨ皟澶э細Nginx client_max_body_size銆丳HP upload_max_filesize/post_max_size锛堣锟?requirements.md锛夛拷?
      );
    }
    try {
      return JSON.parse(text);
    } catch (err) {
      const html = text && String(text).trim().startsWith('<');
      throw new Error(
        html
          ? ('鏈嶅姟鍣ㄨ繑鍥炰簡缃戦〉鑰岄潪 JSON锛堝父瑙侊細鏈櫥褰曪拷?04銆丳HP 鎶ラ敊锛夈€侶TTP ' + res.status)
          : ('鏃犳硶瑙ｆ瀽鎺ュ彛杩斿洖锛圚TTP ' + res.status + '锟?)
      );
    }
  }

  async function postForm(url, body) {
    const res = await fetch(url, {
      method: 'POST',
      headers: {
        ...apiFetchHeaders,
        'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8',
      },
      body: typeof body === 'string' ? body : new URLSearchParams(body).toString(),
      credentials: 'same-origin',
    });
    const text = await res.text();
    const j = parseJsonBody(res, text);
    if (j && j.code === 401) {
      throw new Error(j.msg || '鏈櫥褰曟垨浼氳瘽宸茶繃鏈燂紝璇峰埛鏂伴〉闈㈤噸鏂扮櫥锟?);
    }
    return j;
  }

  createApp({
    setup() {
      const loading = ref(false);
      const items = ref([]);
      const total = ref(0);
      const page = ref(1);
      const pageSize = ref(10);
      const query = reactive({ keyword: '', status: '' });

      const formVisible = ref(false);
      const formMode = ref('add');
      const form = reactive({
        id: 0,
        version: '',
        release_notes: '',
        download_url: '',
        is_mandatory: 0,
        status: 1,
      });
      const uploadLoading = ref(false);

      async function fetchList() {
        loading.value = true;
        try {
          const params = new URLSearchParams();
          params.set('page', String(page.value));
          params.set('page_size', String(pageSize.value));
          if (query.keyword) params.set('keyword', query.keyword);
          if (query.status !== '' && query.status !== null) params.set('status', String(query.status));
          const res = await fetch('/admin.php/client_version/list?' + params.toString(), {
            credentials: 'same-origin',
            headers: { ...apiFetchHeaders },
          });
          const text = await res.text();
          const json = parseJsonBody(res, text);
          if (json && json.code === 401) throw new Error(json.msg || '鏈櫥褰曟垨浼氳瘽宸茶繃鏈燂紝璇峰埛鏂伴〉闈㈤噸鏂扮櫥锟?);
          if (!json || json.code !== 0) throw new Error((json && json.msg) || tt('common.loadingFailed'));
          items.value = (json.data && json.data.items) ? json.data.items : [];
          total.value = (json.data && json.data.total) ? json.data.total : 0;
        } catch (e) {
          ElMessage.error(e && e.message ? e.message : tt('common.loadingFailed'));
        } finally {
          loading.value = false;
        }
      }

      function onSearch() { page.value = 1; fetchList(); }
      function onReset() {
        query.keyword = '';
        query.status = '';
        page.value = 1;
        fetchList();
      }

      function openAdd() {
        formMode.value = 'add';
        form.id = 0;
        form.version = '';
        form.release_notes = '';
        form.download_url = '';
        form.is_mandatory = 0;
        form.status = 1;
        formVisible.value = true;
      }

      function openEdit(row) {
        formMode.value = 'edit';
        form.id = row.id;
        form.version = row.version;
        form.release_notes = row.release_notes || '';
        form.download_url = row.download_url || '';
        form.is_mandatory = row.is_mandatory ? 1 : 0;
        form.status = row.status ? 1 : 0;
        formVisible.value = true;
      }

      async function submitForm() {
        const body = {
          version: form.version.trim(),
          release_notes: form.release_notes,
          download_url: form.download_url.trim(),
          is_mandatory: String(form.is_mandatory ? 1 : 0),
          status: String(form.status ? 1 : 0),
        };
        const url = formMode.value === 'add'
          ? '/admin.php/client_version/add'
          : '/admin.php/client_version/update/' + form.id;
        try {
          const j = await postForm(url, body);
          if (j && j.code === 0) {
            formVisible.value = false;
            ElMessage.success(j.msg || tt('common.save'));
            fetchList();
          } else {
            ElMessage.error((j && j.msg) || '澶辫触');
          }
        } catch (e) {
          ElMessage.error(e && e.message ? e.message : '璇锋眰澶辫触');
        }
      }

      async function customUpload(opt) {
        uploadLoading.value = true;
        try {
          const fd = new FormData();
          fd.append('file', opt.file);
          const res = await fetch('/admin.php/client_version/uploadPackage', {
            method: 'POST',
            body: fd,
            credentials: 'same-origin',
            headers: { ...apiFetchHeaders },
          });
          const text = await res.text();
          const json = parseJsonBody(res, text);
          if (json && json.code === 401) {
            throw new Error(json.msg || '鏈櫥褰曟垨浼氳瘽宸茶繃鏈燂紝璇峰埛鏂伴〉闈㈤噸鏂扮櫥锟?);
          }
          if (json && json.code === 0 && json.data && json.data.url) {
            form.download_url = json.data.url;
            ElMessage.success(json.msg || '涓婁紶鎴愬姛');
            opt.onSuccess && opt.onSuccess(json);
          } else {
            throw new Error((json && json.msg) || '涓婁紶澶辫触');
          }
        } catch (e) {
          ElMessage.error(e.message || '涓婁紶澶辫触');
          opt.onError && opt.onError(e);
        } finally {
          uploadLoading.value = false;
        }
      }

      async function doToggle(row) {
        try {
          const j = await postForm('/admin.php/client_version/toggle/' + row.id, {});
          if (j && j.code === 0) {
            ElMessage.success(j.msg || 'ok');
            fetchList();
          } else {
            ElMessage.error((j && j.msg) || '澶辫触');
          }
        } catch (e) {
          ElMessage.error(e && e.message ? e.message : '璇锋眰澶辫触');
        }
      }

      async function doDelete(row) {
        try {
          await ElMessageBox.confirm(
            lang === 'en' ? 'Delete this version record?' : '纭畾鍒犻櫎璇ョ増鏈褰曪紵',
            lang === 'en' ? 'Confirm' : '鍒犻櫎纭',
            { type: 'warning' }
          );
          const j = await postForm('/admin.php/client_version/delete/' + row.id, {});
          if (j && j.code === 0) {
            ElMessage.success(j.msg || tt('common.delete'));
            const maxPage = Math.max(1, Math.ceil(Math.max(0, total.value - 1) / pageSize.value));
            page.value = Math.min(page.value, maxPage);
            fetchList();
          } else {
            ElMessage.error((j && j.msg) || '澶辫触');
          }
        } catch (e) {
          if (e === 'cancel') return;
          ElMessage.error(e && e.message ? e.message : '璇锋眰澶辫触');
        }
      }

      const rows = computed(() => items.value || []);

      function packageHref(row) {
        const u = row && row.download_url ? String(row.download_url).trim() : '';
        if (!u) return '';
        if (/^https?:\/\//i.test(u)) return u;
        if (u.startsWith('//')) return window.location.protocol + u;
        if (u.startsWith('/')) return window.location.origin + u;
        return window.location.origin + '/' + u.replace(/^\.\//, '');
      }

      function openPackage(row) {
        const href = packageHref(row);
        if (!href) {
          ElMessage.warning(lang === 'en' ? 'No package URL' : '鏈厤缃畨瑁呭寘鍦板潃');
          return;
        }
        window.open(href, '_blank', 'noopener');
      }

      function openPublicDownloadPage() {
        window.open('/index.php/download', '_blank', 'noopener');
      }

      onMounted(() => { fetchList(); });

      return {
        loading, query, rows, total, page, pageSize,
        formVisible, formMode, form, uploadLoading,
        headerCellStyle, cellStyle, tt, lang,
        onSearch, onReset, openAdd, openEdit, submitForm,
        customUpload, doToggle, doDelete, fetchList,
        packageHref, openPackage, openPublicDownloadPage,
      };
    },
    template: `
      <div class="admin-modern-card">
        <div class="admin-header-actions">
          <div class="admin-breadcrumb">绯荤粺 / 鐗堟湰</div>
          <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
            <div style="font-size:18px;font-weight:600;color:#111827;">{{ lang==='en' ? 'Desktop releases' : '鐗堟湰鍙戝竷' }}</div>
            <div class="admin-action-buttons">
              <el-button @click="openPublicDownloadPage">{{ lang==='en' ? 'Public downloads' : '鍏紑涓嬭浇锟? }}</el-button>
              <el-button type="primary" @click="openAdd">{{ lang==='en' ? 'New release' : '鍙戝竷鏂扮増锟? }}</el-button>
            </div>
          </div>
        </div>

        <div class="admin-filter-section">
          <div class="admin-custom-form">
            <el-input v-model="query.keyword" clearable size="default"
              :placeholder="lang==='en'?'Version / notes':'鐗堟湰鍙锋垨鏇存柊璇存槑'" style="width:240px;flex:0 0 auto;" @keyup.enter="onSearch" />
            <el-select v-model="query.status" clearable size="default" :placeholder="tt('common.statusAll')" style="width:140px;flex:0 0 auto;">
              <el-option :label="lang==='en'?'Published':'宸插彂锟?" value="1" />
              <el-option :label="lang==='en'?'Offline':'宸蹭笅锟?" value="0" />
            </el-select>
            <div class="admin-filter-buttons">
              <el-button type="primary" @click="onSearch">{{ tt('common.filter') }}</el-button>
              <el-button @click="onReset">{{ tt('common.reset') }}</el-button>
            </div>
          </div>
        </div>

        <el-table :data="rows" stripe row-key="id" v-loading="loading" :header-cell-style="headerCellStyle" :cell-style="cellStyle">
          <el-table-column prop="id" label="ID" width="72" />
          <el-table-column prop="version" :label="lang==='en'?'Version':'鐗堟湰锟?" width="120" />
          <el-table-column :label="lang==='en'?'Notes':'鏇存柊鏃ュ織'" min-width="220">
            <template #default="{ row }">
              <div class="notes-preview" :title="row.release_notes">{{ row.release_notes || '锟? }}</div>
            </template>
          </el-table-column>
          <el-table-column :label="lang==='en'?'Force':'寮哄埗鏇存柊'" width="100">
            <template #default="{ row }">
              <el-tag size="small" :type="row.is_mandatory ? 'warning' : 'info'">{{ row.is_mandatory ? (lang==='en'?'Yes':'锟?) : (lang==='en'?'No':'锟?) }}</el-tag>
            </template>
          </el-table-column>
          <el-table-column :label="tt('common.statusEnabled')" width="100">
            <template #default="{ row }">
              <el-tag size="small" :type="String(row.status)==='1'?'success':'info'">
                {{ String(row.status)==='1' ? (lang==='en'?'Live':'鍙戝竷') : (lang==='en'?'Off':'涓嬬嚎') }}
              </el-tag>
            </template>
          </el-table-column>
          <el-table-column prop="created_at" :label="lang==='en'?'Released':'鍙戝竷鏃堕棿'" width="170" />
          <el-table-column :label="lang==='en'?'Download':'涓嬭浇'" width="88" align="center">
            <template #default="{ row }">
              <el-button v-if="packageHref(row)" link type="primary" @click="openPackage(row)">{{ lang==='en' ? 'Download' : '涓嬭浇' }}</el-button>
              <span v-else style="color:#9ca3af;font-size:13px;">锟?/span>
            </template>
          </el-table-column>
          <el-table-column :label="lang==='en'?'Actions':'鎿嶄綔'" width="200" fixed="right">
            <template #default="{ row }">
              <el-button link type="primary" @click="openEdit(row)">{{ tt('common.edit') }}</el-button>
              <el-button link type="primary" @click="doToggle(row)">{{ String(row.status)==='1' ? (lang==='en'?'Offline':'涓嬬嚎') : (lang==='en'?'Publish':'鍙戝竷') }}</el-button>
              <el-button link type="danger" @click="doDelete(row)">{{ tt('common.delete') }}</el-button>
            </template>
          </el-table-column>
          <template #empty>
            <div style="padding:28px 0;text-align:center;color:#6b7280;">{{ tt('common.noData') }}</div>
          </template>
        </el-table>

        <div class="admin-footer-pagination">
          <span style="color:#6b7280;font-size:13px;">{{ lang==='en' ? ('Total ' + total) : ('锟?' + total + ' 锟?) }}</span>
          <el-pagination v-model:current-page="page" v-model:page-size="pageSize" background layout="prev, pager, next"
            :total="total" @update:current-page="(p)=>{page=p;fetchList();}" @update:page-size="(s)=>{pageSize=s;page=1;fetchList();}" />
        </div>

        <el-dialog v-model="formVisible" :title="formMode==='add' ? (lang==='en'?'New release':'鍙戝竷鏂扮増锟?) : tt('common.edit')" width="520px" destroy-on-close>
          <el-form label-width="100px">
            <el-form-item :label="lang==='en'?'Version':'鐗堟湰锟?" required>
              <el-input v-model="form.version" placeholder="1.0.0" />
            </el-form-item>
            <el-form-item :label="lang==='en'?'Notes':'鏇存柊璇存槑'">
              <el-input v-model="form.release_notes" type="textarea" :rows="4" />
            </el-form-item>
            <el-form-item :label="lang==='en'?'Package URL':'瀹夎锟?">
              <el-input v-model="form.download_url" type="textarea" :rows="2" :placeholder="lang==='en'?'Direct link':'鐩撮摼锛屾垨涓嬫柟涓婁紶'" />
              <el-upload class="mt-2" :show-file-list="false" :http-request="customUpload" :disabled="uploadLoading">
                <el-button size="small" :loading="uploadLoading">{{ lang==='en' ? 'Upload file' : '涓婁紶闄勪欢' }}</el-button>
              </el-upload>
              <div class="mt-1 text-muted" style="font-size:12px;color:#6b7280;line-height:1.5;">
                {{ lang==='en'
                  ? 'Large installers: use a direct URL, or raise Nginx/PHP upload limits (see docs).'
                  : '瀹夎鍖呰緝澶ф椂寤鸿濉閾撅紱鏈湴涓婁紶鑻ュ嚭锟?413锛岄渶鍦ㄦ湇鍔″櫒璋冨ぇ涓婁紶闄愬埗锛堣 requirements.md锛夛拷? }}
              </div>
            </el-form-item>
            <el-form-item :label="lang==='en'?'Force update':'寮哄埗鏇存柊'">
              <el-switch v-model="form.is_mandatory" :active-value="1" :inactive-value="0" />
            </el-form-item>
            <el-form-item :label="lang==='en'?'Status':'鐘讹拷?">
              <el-radio-group v-model="form.status">
                <el-radio-button :label="1">{{ lang==='en'?'Published':'鍙戝竷' }}</el-radio-button>
                <el-radio-button :label="0">{{ lang==='en'?'Offline':'涓嬬嚎' }}</el-radio-button>
              </el-radio-group>
            </el-form-item>
          </el-form>
          <template #footer>
            <el-button @click="formVisible=false">{{ tt('common.cancel') }}</el-button>
            <el-button type="primary" @click="submitForm">{{ tt('common.save') }}</el-button>
          </template>
        </el-dialog>
      </div>
    `
  }).use(ElementPlus).mount('#clientVersionApp');
  {/literal}
</script>
{/block}
