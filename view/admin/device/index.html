{extend name="admin/common/layout" /}

{block name="title"}设备{/block}
{block name="page_title"}{/block}
{block name="breadcrumb"}{/block}
{block name="page_actions"}{/block}

{block name="style"}
<style>
    .content-header { display: none; }
    /* High-Density Modern（仅该页生效，风格与商品/达人链统一） */
    .tp-ep-wrap {
        padding: 24px;
        background: #f4f6f8;
        min-height: calc(100vh - 0px);
    }
    .admin-dev-card {
        background: #ffffff;
        padding: 24px;
        border-radius: 10px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.03);
    }
    .admin-dev-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
    }
    .admin-dev-breadcrumb {
        font-size: 13px;
        color: #909399;
        line-height: 18px;
        margin-bottom: 6px;
    }
    .admin-dev-title {
        font-size: 20px;
        font-weight: 700;
        color: #111827;
        line-height: 28px;
    }
    .admin-dev-actions .el-button { border-radius: 6px; }
    .admin-dev-filters {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: nowrap;
        overflow-x: hidden;
        padding-bottom: 0;
        margin-bottom: 12px;
    }
    @media (max-width: 1200px) {
        .admin-dev-filters { overflow-x: auto; padding-bottom: 4px; }
    }
    .admin-dev-filter-actions {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 0 0 auto;
        margin-left: auto;
    }
    .name-cell {
        font-weight: 500;
        color: #303133;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .ip-cell {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 12px;
        color: #374151;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        padding: 2px 8px;
        display: inline-flex;
        align-items: center;
        line-height: 18px;
    }
    .admin-dev-card .el-table__inner-wrapper::before { height: 0; }
    .admin-dev-footer {
        display: flex;
        justify-content: flex-end;
        margin-top: 20px;
    }
</style>
{/block}

{block name="content"}
<script>
  // 下拉选项：由服务端注入（平台列表），避免额外接口
  const PLATFORM_OPTIONS = [];
  {volist name="platforms" id="p"}
  PLATFORM_OPTIONS.push({ id: {$p.id}, label: "{:addslashes((string)$p.name)}" });
  {/volist}
</script>
<div class="tp-ep-wrap" id="deviceApp"></div>
{/block}

{block name="script"}
<!-- Vue3 + ElementPlus（CDN） -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.min.css">
<script src="/static/i18n/i18n.js?v=20260407_sidebar_menu1"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.38/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.full.min.js"></script>
<script>
  {literal}
  const { createApp, reactive, ref, computed, onMounted } = Vue;
  const { ElMessage, ElMessageBox } = ElementPlus;
  const i18n = window.AppI18n;
  const lang = i18n ? i18n.getLang('zh') : 'zh';
  const tt = (k, vars) => (i18n ? i18n.t(k, vars || null, lang) : k);

  const headerCellStyle = {
    backgroundColor: '#F9FAFB',
    color: '#4B5563',
    fontWeight: '600',
    height: '48px',
    borderBottom: '1px solid #E5E7EB',
  };

  const cellStyle = {
    padding: '12px 0',
  };

  createApp({
    setup() {
      const loading = ref(false);
      const items = ref([]);
      const total = ref(0);
      const page = ref(1);
      const pageSize = ref(10);

      const query = reactive({
        platform_id: 0,
        status: '',
        keyword: '',
      });

      const platformOptions = computed(() => (Array.isArray(PLATFORM_OPTIONS) ? PLATFORM_OPTIONS : []));

      function respMsg(json, fallbackKey) {
        if (json && json.error_key) return tt(json.error_key);
        if (json && json.msg) return String(json.msg);
        return tt(fallbackKey || 'common.operationFailed');
      }

      async function fetchList() {
        loading.value = true;
        try {
          const params = new URLSearchParams();
          params.set('page', String(page.value));
          params.set('page_size', String(pageSize.value));
          if (query.platform_id && Number(query.platform_id) > 0) params.set('platform_id', String(query.platform_id));
          if (query.status !== '' && query.status !== null) params.set('status', String(query.status));
          if (query.keyword) params.set('keyword', query.keyword);

          const res = await fetch('/admin.php/device/list?' + params.toString(), { credentials: 'same-origin' });
          const json = await res.json();
          if (!json || json.code !== 0) throw new Error(respMsg(json, 'common.loadingFailed'));
          items.value = (json.data && json.data.items) ? json.data.items : [];
          total.value = (json.data && json.data.total) ? json.data.total : 0;
        } catch (e) {
          ElMessage.error(e && e.message ? e.message : tt('common.loadingFailed'));
        } finally {
          loading.value = false;
        }
      }

      function onSearch() {
        page.value = 1;
        fetchList();
      }

      function onReset() {
        query.platform_id = 0;
        query.status = '';
        query.keyword = '';
        page.value = 1;
        fetchList();
      }

      function goAdd() {
        window.location.href = '/admin.php/device/add';
      }

      function goEdit(row) {
        window.location.href = '/admin.php/device/edit/' + row.id;
      }

      async function doDelete(row) {
        await ElMessageBox.confirm(
          tt('page.device.deleteConfirm', { name: row.device_name || '-' }),
          tt('common.delete'),
          {
            type: 'warning',
            confirmButtonText: tt('common.delete'),
            cancelButtonText: tt('common.cancel'),
          }
        );
        const resp = await fetch('/admin.php/device/delete/' + row.id, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
          body: '',
          credentials: 'same-origin',
        });
        const json = await resp.json();
        if (json && json.code === 0) {
          ElMessage.success(respMsg(json, 'common.deleted'));
          const maxPage = Math.max(1, Math.ceil(Math.max(0, total.value - 1) / pageSize.value));
          page.value = Math.min(page.value, maxPage);
          fetchList();
        } else {
          ElMessage.error(respMsg(json, 'common.deleteFailed'));
        }
      }

      const rows = computed(() => items.value || []);

      onMounted(() => fetchList());

      return {
        loading,
        query,
        rows,
        total,
        page,
        pageSize,
        platformOptions,
        headerCellStyle,
        cellStyle,
        tt,
        onSearch,
        onReset,
        goAdd,
        goEdit,
        doDelete,
        fetchList,
      };
    },
    template: `
      <div class="admin-dev-card">
        <div class="admin-dev-header">
          <div>
            <div class="admin-dev-breadcrumb">${tt('page.device.breadcrumb')}</div>
            <div class="admin-dev-title">${tt('page.device.title')}</div>
          </div>
          <div class="admin-dev-actions">
            <el-button size="default" type="primary" style="border-radius:6px" @click="goAdd">${tt('page.device.add')}</el-button>
          </div>
        </div>

        <div class="admin-dev-filters">
          <el-select v-model="query.platform_id" size="default" clearable :placeholder="tt('page.device.allPlatforms')" style="width:180px; flex:0 0 auto;">
            <el-option :label="tt('page.device.allPlatforms')" :value="0" />
            <el-option v-for="o in platformOptions" :key="o.id" :label="o.label" :value="o.id" />
          </el-select>
          <el-select v-model="query.status" size="default" clearable :placeholder="tt('common.statusAll')" style="width:140px; flex:0 0 auto;">
            <el-option :label="tt('common.statusEnabled')" value="1" />
            <el-option :label="tt('common.statusDisabled')" value="0" />
          </el-select>
          <el-input
            v-model="query.keyword"
            size="default"
            clearable
            :placeholder="tt('page.device.searchDeviceIp')"
            style="width:260px; flex:0 0 auto;"
            @keyup.enter="onSearch"
          />

          <div class="admin-dev-filter-actions">
            <el-button size="default" type="primary" @click="onSearch">{{ tt('common.filter') }}</el-button>
            <el-button size="default" @click="onReset">{{ tt('common.reset') }}</el-button>
          </div>
        </div>

        <el-table
          :data="rows"
          stripe
          row-key="id"
          v-loading="loading"
          :header-cell-style="headerCellStyle"
          :cell-style="cellStyle"
        >
          <el-table-column prop="id" label="ID" width="80" />
          <el-table-column :label="tt('page.device.colName')" min-width="180">
            <template #default="{ row }">
              <div class="name-cell" :title="row.device_name">{{ row.device_name || '—' }}</div>
            </template>
          </el-table-column>
          <el-table-column :label="tt('page.device.colPlatform')" min-width="160">
            <template #default="{ row }">
              <span style="color:#4b5563;">{{ (row.platform && row.platform.name) ? row.platform.name : '—' }}</span>
            </template>
          </el-table-column>
          <el-table-column :label="tt('page.device.colIp')" width="200">
            <template #default="{ row }">
              <span class="ip-cell">{{ row.ip_address || '—' }}</span>
            </template>
          </el-table-column>
          <el-table-column :label="tt('page.device.colStatus')" width="120">
            <template #default="{ row }">
              <el-tag size="default" effect="light" :type="String(row.status) === '1' ? 'success' : 'info'">
                {{ String(row.status) === '1' ? tt('common.statusEnabled') : tt('common.statusDisabled') }}
              </el-tag>
            </template>
          </el-table-column>
          <el-table-column prop="created_at" :label="tt('page.device.colCreatedAt')" min-width="180" />
          <el-table-column :label="tt('page.device.colActions')" width="160" fixed="right">
            <template #default="{ row }">
              <el-button size="default" link type="primary" @click="goEdit(row)">{{ tt('common.edit') }}</el-button>
              <el-button size="default" link type="danger" @click="doDelete(row)">{{ tt('common.delete') }}</el-button>
            </template>
          </el-table-column>

          <template #empty>
            <div style="padding: 28px 0; text-align:center; color:#6b7280;">{{ tt('page.device.empty') }}</div>
          </template>
        </el-table>

        <div class="admin-dev-footer">
          <el-pagination
            v-model:current-page="page"
            v-model:page-size="pageSize"
            size="default"
            background
            layout="total, prev, pager, next"
            :total="total"
            @update:current-page="(p)=>{ page=p; fetchList(); }"
            @update:page-size="(s)=>{ pageSize=s; page=1; fetchList(); }"
          />
        </div>
      </div>
    `
  }).use(ElementPlus).mount('#deviceApp');
  {/literal}
</script>
{/block}
