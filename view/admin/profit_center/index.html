{extend name="admin/common/layout" /}

{block name="title"}利润中心{/block}
{block name="page_title"}<span data-i18n="page.profitCenter.title">Profit Center</span>{/block}
{block name="breadcrumb"}<span data-i18n="page.profitCenter.breadcrumb">Growth Hub / Profit Center</span>{/block}

{block name="style"}
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap');

  :root {
    --pc-bg: #f8fafc;
    --pc-card: #ffffff;
    --pc-muted: #64748b;
    --pc-line: #e2e8f0;
    --pc-soft: #f1f5f9;
    --pc-primary: var(--dash-btn-primary, #1677ff);
    --pc-primary-dim: var(--dash-btn-primary-hover, #0f6fe8);
    --pc-primary-active: var(--dash-btn-primary-active, #0c5fca);
    --pc-btn-shadow: var(--dash-btn-primary-shadow, 0 8px 18px rgba(22, 119, 255, .22));
    --pc-text: #0f172a;
    --pc-success: #16a34a;
    --pc-danger: #dc2626;
    --pc-shadow: 0 4px 12px rgba(15, 23, 42, 0.05);
    --pc-radius: 12px;
    --pc-label-width: 120px;
  }

  .content-wrapper {
    background: var(--pc-bg) !important;
  }

  .content-header {
    display: none;
  }

  .material-symbols-outlined {
    font-family: 'Material Symbols Outlined', sans-serif;
    font-weight: normal;
    font-style: normal;
    font-size: 18px;
    line-height: 1;
    letter-spacing: normal;
    text-transform: none;
    display: inline-block;
    white-space: nowrap;
    word-wrap: normal;
    direction: ltr;
    -webkit-font-feature-settings: 'liga';
    -webkit-font-smoothing: antialiased;
    font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 20;
    vertical-align: middle;
  }

  .pc-page {
    max-width: 1540px;
    margin: 0 auto 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    color: var(--pc-text);
    font-family: Inter, "Helvetica Neue", Arial, sans-serif;
  }

  .pc-panel {
    border: 1px solid var(--pc-line);
    border-radius: var(--pc-radius);
    background: var(--pc-card);
    box-shadow: var(--pc-shadow);
    padding: 16px;
  }

  .pc-toolbar {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: flex-start;
    padding: 0 2px;
    flex-wrap: wrap;
  }

  .pc-toolbar-title {
    font-size: 26px;
    line-height: 1.12;
    font-weight: 800;
    letter-spacing: -0.015em;
    font-family: Manrope, "Helvetica Neue", Arial, sans-serif;
  }

  .pc-toolbar-subtitle {
    margin-top: 8px;
    font-size: 14px;
    color: var(--pc-muted);
    line-height: 1.55;
  }

  .pc-toolbar-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
    margin-left: auto;
    padding-top: 8px;
  }

  .pc-kpi-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 20px;
  }

  .pc-kpi-card {
    border: 1px solid #eef2f6;
    border-radius: var(--pc-radius);
    padding: 18px 16px;
    background: #fff;
    min-height: 132px;
    position: relative;
  }

  .pc-kpi-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  .pc-kpi-icon {
    width: 34px;
    height: 34px;
    border-radius: 999px;
    background: #e8f0ff;
    color: #1f5eea;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: inset 0 0 0 1px rgba(37, 99, 235, .14);
  }

  .pc-kpi-label {
    font-size: 13px;
    letter-spacing: 0;
    font-weight: 700;
    color: #778296;
  }

  .pc-kpi-value {
    margin-top: 10px;
    font-size: 28px;
    line-height: 1.1;
    font-weight: 800;
    letter-spacing: 0;
    font-family: Manrope, "Helvetica Neue", Arial, sans-serif;
    color: #171b22;
  }

  .pc-kpi-foot {
    margin-top: 10px;
    font-size: 12px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: #6f7c90;
  }

  .pc-kpi-card:nth-child(1) .pc-kpi-icon {
    background: linear-gradient(145deg, #eff6ff, #dbeafe);
    color: #1d4ed8;
    box-shadow: inset 0 0 0 1px rgba(59, 130, 246, .25);
  }

  .pc-kpi-card:nth-child(2) .pc-kpi-icon {
    background: linear-gradient(145deg, #edf4ff, #dbeafe);
    color: #2563eb;
    box-shadow: inset 0 0 0 1px rgba(37, 99, 235, .24);
  }

  .pc-kpi-card:nth-child(3) .pc-kpi-icon {
    background: linear-gradient(145deg, #e8f0ff, #d7e5ff);
    color: #1e40af;
    box-shadow: inset 0 0 0 1px rgba(30, 64, 175, .22);
  }

  .pc-kpi-card:nth-child(4) .pc-kpi-icon {
    background: linear-gradient(145deg, #f1f5f9, #e2e8f0);
    color: #334155;
    box-shadow: inset 0 0 0 1px rgba(71, 85, 105, .2);
  }

  .pc-kpi-card:nth-child(5) .pc-kpi-icon {
    background: linear-gradient(145deg, #ecf2ff, #dbeafe);
    color: #1d4ed8;
    box-shadow: inset 0 0 0 1px rgba(37, 99, 235, .24);
  }

  .pc-kpi-foot.up {
    color: var(--pc-success);
  }

  .pc-kpi-foot.down {
    color: var(--pc-danger);
  }

  .pc-filter-panel {
    padding: 16px;
  }

  .pc-filter-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: flex-end;
    margin-bottom: 16px;
  }

  .pc-filter-item > label {
    display: block;
    margin-bottom: 8px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0;
    color: #6e7b90;
  }

  .pc-filter-item {
    min-width: 220px;
    flex: 1 1 220px;
  }

  .pc-filter-item.is-channel {
    max-width: 260px;
  }

  .pc-filter-item .el-input__wrapper,
  .pc-filter-item .el-select__wrapper,
  .pc-filter-item .el-date-editor.el-input {
    border-radius: 8px;
    min-height: 40px;
    border: 1px solid transparent;
    background: #f4f6f8;
    box-shadow: none !important;
  }

  .pc-filter-item .el-input__wrapper.is-focus,
  .pc-filter-item .el-select__wrapper.is-focused {
    background: #fff;
    border-color: #d2dbec;
  }

  .pc-filter-actions {
    padding-top: 16px;
    border-top: 1px solid #edf1f6;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .pc-inline-error {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-top: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #fecaca;
    background: #fef2f2;
    color: #b91c1c;
    font-size: 13px;
  }

  .pc-plugin-card {
    padding: 16px;
  }

  .pc-plugin-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    flex-wrap: wrap;
  }

  .pc-plugin-title {
    margin: 0;
    font-size: 16px;
    font-weight: 700;
    color: #1f2937;
  }

  .pc-plugin-desc {
    margin-top: 6px;
    font-size: 13px;
    color: #64748b;
    line-height: 1.6;
  }

  .pc-plugin-metrics {
    margin-top: 12px;
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
  }

  .pc-plugin-metric {
    padding: 12px;
    border: 1px solid #e6ecf5;
    border-radius: 10px;
    background: #f8fbff;
  }

  .pc-plugin-metric-label {
    font-size: 12px;
    color: #6b7280;
  }

  .pc-plugin-metric-value {
    margin-top: 4px;
    font-size: 18px;
    font-weight: 700;
    color: #1e3a8a;
    font-family: Manrope, "Helvetica Neue", Arial, sans-serif;
  }

  .pc-plugin-metric-value.is-small {
    font-size: 14px;
    font-family: Inter, "Helvetica Neue", Arial, sans-serif;
  }

  .pc-plugin-layout {
    display: grid;
    grid-template-columns: minmax(0, 1.1fr) minmax(0, 1fr);
    gap: 16px;
    min-width: 0;
  }

  .pc-plugin-layout > * {
    min-width: 0;
  }

  .pc-plugin-block {
    border: 1px solid #e6ecf5;
    border-radius: 10px;
    background: #fff;
    padding: 12px;
    min-width: 0;
  }

  .pc-plugin-block h4 {
    margin: 0;
    font-size: 14px;
    font-weight: 700;
    color: #1f2937;
  }

  .pc-plugin-block-sub {
    margin-top: 4px;
    font-size: 12px;
    color: #6b7280;
    line-height: 1.5;
  }

  .pc-plugin-form-grid {
    margin-top: 12px;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .pc-plugin-form-actions {
    margin-top: 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .pc-plugin-token-box {
    margin-top: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px dashed #bfdbfe;
    background: #eff6ff;
    font-size: 12px;
    color: #1e3a8a;
  }

  .pc-plugin-tables {
    margin-top: 12px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: 12px;
    min-width: 0;
  }

  .pc-plugin-tables > * {
    min-width: 0;
  }

  .pc-plugin-logs {
    margin-top: 16px;
    min-width: 0;
  }

  .pc-plugin-block .el-table,
  .pc-plugin-logs .el-table {
    width: 100% !important;
    max-width: 100%;
    table-layout: fixed;
  }

  .pc-plugin-block .el-table__inner-wrapper,
  .pc-plugin-logs .el-table__inner-wrapper {
    overflow-x: auto;
  }

  .pc-plugin-logs .el-table .cell {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .pc-action-left,
  .pc-action-right {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .pc-page .el-button {
    border-radius: 8px;
    font-weight: 700;
    height: 32px;
    min-height: 32px;
    padding: 0 12px;
    font-size: 14px;
    line-height: 1;
  }

  .pc-toolbar-actions .el-button {
    height: 40px;
    min-height: 40px;
    padding: 0 16px;
  }

  .pc-btn-lg.el-button {
    height: 40px;
    min-height: 40px;
    padding: 0 16px;
  }

  .pc-btn-md.el-button {
    height: 32px;
    min-height: 32px;
    padding: 0 12px;
  }

  .pc-btn-sm.el-button {
    height: 24px;
    min-height: 24px;
    padding: 0 8px;
    border-radius: 6px;
    font-size: 12px;
  }

  .pc-btn-ghost.el-button {
    border-color: var(--pc-line);
    color: var(--pc-text);
    background: #fff;
  }
  .pc-btn-ghost.el-button:hover,
  .pc-btn-ghost.el-button:focus {
    border-color: rgba(22, 119, 255, .28);
    color: var(--pc-primary);
    background: #f5f9ff;
  }

  .pc-btn-icon {
    font-size: 17px;
    margin-right: 6px;
    color: var(--pc-primary);
    width: 20px;
    height: 20px;
    border-radius: 6px;
    background: #eaf3ff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .pc-toolbar-actions .pc-btn-dark .pc-btn-icon,
  .pc-toolbar-actions .el-button--primary .pc-btn-icon {
    color: #fff;
    background: rgba(255, 255, 255, .16);
  }

  .pc-page .el-button--primary {
    border-color: var(--pc-primary) !important;
    background: var(--pc-primary) !important;
    box-shadow: var(--pc-btn-shadow);
  }

  .pc-btn-dark.el-button {
    border: 1px solid var(--pc-primary) !important;
    background: var(--pc-primary) !important;
    color: #fff !important;
    box-shadow: var(--pc-btn-shadow) !important;
  }

  .pc-btn-dark.el-button:hover {
    border-color: var(--pc-primary-dim) !important;
    background: var(--pc-primary-dim) !important;
    box-shadow: 0 6px 14px rgba(22, 119, 255, .22) !important;
  }

  .pc-table-panel {
    padding: 16px;
  }

  .pc-table-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 8px;
  }

  .pc-table-title {
    font-size: 18px;
    font-weight: 700;
    color: #4a576e;
    letter-spacing: 0;
  }

  .pc-table-sub {
    color: #7b8598;
    font-size: 13px;
  }

  .pc-main-table.el-table {
    border-radius: 12px;
    overflow: hidden;
    --el-table-header-bg-color: #f5f7fa;
    --el-table-row-hover-bg-color: #f6f9ff;
  }

  .pc-page .el-table .el-table__cell {
    border-bottom-color: #edf1f6 !important;
    padding: 12px 16px !important;
  }

  .pc-main-table th.el-table__cell {
    color: #556279;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0;
    text-transform: none;
  }

  .pc-money-main {
    font-size: 14px;
    font-weight: 700;
    color: #1f2b40;
  }

  .pc-money-sub {
    margin-top: 4px;
    font-size: 12px;
    color: #8692a7;
  }

  .pc-channel-tag.el-tag {
    border-radius: 8px;
    padding: 2px 9px;
    font-size: 12px;
    line-height: 1.2;
    background: #fff;
    border-color: #9bc0ff;
    color: #2d76df;
  }

  .pc-row-btn.el-button {
    min-height: auto;
    height: auto;
    padding: 0;
    font-size: 14px;
    border-radius: 0;
    border: 0;
    background: transparent;
    color: var(--pc-primary);
    box-shadow: none !important;
  }

  .pc-row-btn-danger.el-button {
    color: #dc2626;
  }

  .pc-value-positive {
    color: var(--pc-success);
  }

  .pc-value-negative {
    color: var(--pc-danger);
  }

  .pc-summary-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    margin-top: 12px;
  }

  .pc-summary-card {
    border: 1px solid #edf1f6;
    border-radius: 12px;
    padding: 12px;
    background: #fff;
  }

  .pc-summary-title {
    font-size: 18px;
    font-weight: 700;
    color: #53617a;
    margin-bottom: 12px;
  }

  .pc-summary-table .el-table__cell {
    padding: 14px 16px !important;
  }

  .pc-summary-table th.el-table__cell {
    font-size: 15px;
    font-weight: 700;
    color: #4f5f7b;
  }

  .pc-summary-table td.el-table__cell {
    font-size: 16px;
    color: #1f2b40;
  }

  .pc-summary-table .cell {
    line-height: 1.5;
  }

  .pc-modal-overlay {
    background: rgba(13, 20, 32, .45) !important;
    backdrop-filter: blur(3px);
  }

  .pc-modal-overlay .el-overlay-dialog {
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    padding: 16px !important;
    box-sizing: border-box;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .pc-dialog.el-dialog {
    margin: 0 !important;
    top: 0 !important;
    max-width: calc(100vw - 28px);
    max-height: calc(100vh - 28px);
    border-radius: var(--pc-radius);
    overflow: hidden;
    box-shadow: 0 20px 56px rgba(9, 16, 26, .26);
  }

  .pc-plugin-dialog.el-dialog {
    width: min(1220px, calc(100vw - 28px)) !important;
  }

  .pc-dialog .el-dialog__header {
    margin-right: 0;
    border-bottom: 1px solid #f0f3f7;
    padding: 16px;
  }

  .pc-dialog .el-dialog__body {
    padding: 16px;
    max-height: calc(100vh - 160px);
    overflow-y: auto;
    overflow-x: hidden;
    background: #fff;
  }

  .pc-dialog .el-dialog__footer {
    border-top: 1px solid #f0f3f7;
    padding: 16px;
    background: #fff;
  }

  .pc-form-card {
    border: 1px solid #edf1f6;
    border-radius: 8px;
    background: #fff;
    padding: 16px;
    margin-bottom: 16px;
  }

  .pc-form-card h4 {
    margin: 0 0 8px;
    color: #445571;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .06em;
    text-transform: uppercase;
  }

  .pc-entry-layout {
    display: grid;
    grid-template-columns: minmax(0, 1.8fr) minmax(300px, 1fr);
    gap: 20px;
  }

  .pc-entry-side-card {
    border: 1px solid #edf1f6;
    border-radius: 8px;
    background: #f8fafd;
    padding: 16px;
    margin-bottom: 16px;
  }

  .pc-entry-side-title {
    font-size: 12px;
    font-weight: 700;
    color: #5a6880;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  .pc-entry-side-row {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    font-size: 14px;
    color: #52607a;
    padding: 4px 0;
  }

  .pc-entry-side-row strong {
    color: #101a2c;
  }

  .pc-entry-layout .el-form-item__label {
    white-space: nowrap;
    font-size: 14px;
    color: #4f5f7b;
    font-weight: 700;
    width: var(--pc-label-width);
    justify-content: flex-end;
    text-align: right;
    padding-right: 12px;
  }

  .pc-dialog .el-form:not(.el-form--inline) .el-form-item__label {
    font-size: 14px;
    color: #4f5f7b;
    font-weight: 600;
    justify-content: flex-end;
    text-align: right;
    padding-right: 12px;
  }

  .pc-dialog .el-form:not(.el-form--inline) .el-form-item {
    margin-bottom: 20px;
  }

  .pc-dialog .el-form:not(.el-form--inline) .el-form-item__content {
    min-width: 0;
  }

  .pc-dialog .el-input__wrapper,
  .pc-dialog .el-select__wrapper,
  .pc-dialog .el-date-editor.el-input,
  .pc-dialog .el-input-number {
    min-height: 32px;
  }

  .pc-dialog .el-input-number {
    width: 100%;
  }

  .pc-dialog .el-input-number .el-input-number__decrease,
  .pc-dialog .el-input-number .el-input-number__increase {
    width: 32px;
  }

  .pc-entry-layout .el-form-item {
    margin-bottom: 20px;
  }

  .pc-entry-layout .el-input-number,
  .pc-entry-layout .el-select,
  .pc-entry-layout .el-date-editor.el-input {
    width: 100%;
  }

  .pc-entry-layout .el-col {
    min-width: 0;
  }

  .pc-store-layout {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 20px;
  }

  .pc-store-list {
    max-height: 560px;
    overflow: auto;
    padding-right: 2px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .pc-store-card {
    border: 1px solid #edf1f6;
    border-radius: 8px;
    padding: 16px;
    background: #fff;
  }

  .pc-store-card.is-active {
    border-color: rgba(0, 82, 208, .38);
    box-shadow: 0 0 0 1px rgba(0, 82, 208, .12);
  }

  .pc-store-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  .pc-store-name {
    font-size: 14px;
    font-weight: 700;
    color: #1d2739;
  }

  .pc-store-code {
    margin-top: 2px;
    color: #7d899d;
    font-size: 11px;
  }

  .pc-store-metrics {
    margin-top: 8px;
    background: #f6f8fb;
    border-radius: 8px;
    padding: 8px;
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
  }

  .pc-store-metric-item {
    text-align: center;
  }

  .pc-store-metric-label {
    font-size: 12px;
    color: #8a95a8;
    margin-bottom: 2px;
  }

  .pc-store-metric-value {
    font-size: 12px;
    font-weight: 700;
    color: #1c2434;
  }

  .pc-store-actions {
    margin-top: 8px;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  .pc-import-steps {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .pc-import-step {
    border: 1px solid #edf1f6;
    border-radius: 8px;
    background: #fff;
    padding: 16px;
  }

  .pc-import-step-head {
    display: flex;

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.min.css">
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.38/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/element-plus@2.7.8/dist/index.full.min.js"></script>
<script>
{literal}
(function () {
  const { createApp, reactive, ref, computed, onMounted, watch } = Vue;
  const { ElMessage, ElMessageBox } = ElementPlus;
  const i18n = window.AppI18n;
  const lang = i18n ? i18n.getLang('zh') : 'zh';
  const tt = (k, vars) => (i18n ? i18n.t(k, vars || null, lang) : k);
  const headers = { 'Accept': 'application/json, text/javascript, */*;q=0.01', 'X-Requested-With': 'XMLHttpRequest' };

  function parseJson(text) {
    try { return JSON.parse(text); } catch (_) { return null; }
  }

  function resolveApiMessage(json, fallbackKey) {
    if (i18n && typeof i18n.resolveApiMessage === 'function') {
      return i18n.resolveApiMessage(json, fallbackKey || 'common.operationFailed', null, lang);
    }
    if (json && json.error_key) {
      const key = String(json.error_key);
      const translated = tt(key);
      if (translated && translated !== key) return translated;
    }
    return tt(fallbackKey || 'common.operationFailed');
  }

  function translateMaybeText(raw, fallbackKey) {
    if (i18n && typeof i18n.resolveApiMessage === 'function') {
      return i18n.resolveApiMessage({ msg: raw }, fallbackKey || 'common.operationFailed', null, lang);
    }
    return String(raw || '');
  }

  function today() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + day;
  }

  async function apiGet(url, params, fallbackKey) {
    if (window.AdminApi && typeof window.AdminApi.get === 'function') {
      return window.AdminApi.get(url, params || {}, { fallbackKey: fallbackKey || 'common.loadingFailed' });
    }
    const u = new URL(url, window.location.origin);
    Object.keys(params || {}).forEach((key) => {
      const value = params[key];
      if (value === null || typeof value === 'undefined' || value === '') return;
      u.searchParams.set(key, String(value));
    });
    const res = await fetch(u.pathname + (u.search || ''), { credentials: 'same-origin', headers });
    const json = parseJson(await res.text());
    if (!json || Number(json.code || 0) !== 0) {
      throw new Error(resolveApiMessage(json, fallbackKey || 'common.loadingFailed'));
    }
    return json;
  }

  async function apiPost(url, payload, fallbackKey) {
    if (window.AdminApi && typeof window.AdminApi.post === 'function') {
      return window.AdminApi.post(url, payload || {}, { fallbackKey: fallbackKey || 'common.operationFailed' });
    }
    const res = await fetch(url, {
      method: 'POST',
      credentials: 'same-origin',
      headers: { ...headers, 'Content-Type': 'application/json; charset=UTF-8' },
      body: JSON.stringify(payload || {})
    });
    const json = parseJson(await res.text());
    if (!json || Number(json.code || 0) !== 0) {
      throw new Error(resolveApiMessage(json, fallbackKey || 'common.operationFailed'));
    }
    return json;
  }

  const profitCenterAppOptions = {
    setup() {
      const loading = ref(false);
      const summaryLoading = ref(false);
      const stores = ref([]);
      const accounts = ref([]);
      const entries = ref([]);
      const total = ref(0);
      const page = ref(1);
      const pageSize = ref(20);
      const fallbackCount = ref(0);
      const loadError = ref('');

      const filters = reactive({
        date_from: today(),
        date_to: today(),
        store_id: '',
        account_id: '',
        channel_type: ''
      });

      const summary = reactive({
        kpi: { net_profit_cny: 0, ad_spend_cny: 0, ad_compensation_cny: 0, gmv_cny: 0, order_count: 0, avg_roi: null, entry_count: 0 },
        by_store: [],
        by_channel: [],
        by_day: []
      });

      const entryDialogVisible = ref(false);
      const entrySaving = ref(false);
      const entryForm = reactive({
        id: 0,
        entry_date: today(),
        store_id: '',
        account_id: '',
        channel_type: 'video',
        sale_price_cny: 0,
        product_cost_cny: 0,
        cancel_rate: 0,
        platform_fee_rate: 0,
        influencer_commission_rate: 0,
        live_hours: 0,
        wage_hourly_cny: 0,
        ad_spend_amount: 0,
        ad_spend_currency: 'USD',
        ad_compensation_amount: 0,
        ad_compensation_currency: 'USD',
        gmv_amount: 0,
        gmv_currency: 'VND',
        order_count: 0,
        raw_metrics_json: ''
      });

      const batchDialogVisible = ref(false);
      const batchSaving = ref(false);
      const batchRowSeed = ref(1);
      const batchMode = ref('quick');
      const batchRows = ref([]);
      const batchPreset = reactive({
        entry_date: today(),
        store_id: '',
        account_id: '',
        channel_type: 'video'
      });
      const batchResult = reactive({
        total: 0,
        saved_count: 0,
        failed_count: 0,
        failed_items: []
      });

      const storeDialogVisible = ref(false);
      const storeLoading = ref(false);
      const storeForm = reactive({
        id: 0,
        store_code: '',
        store_name: '',
        default_sale_price_cny: 0,
        default_product_cost_cny: 0,
        default_cancel_rate: 0,
        default_cancel_rate_live: 0,
        default_cancel_rate_video: 0,
        default_cancel_rate_influencer: 0,
        default_platform_fee_rate: 0,
        default_influencer_commission_rate: 0,
        default_live_wage_hourly_cny: 0,
        default_timezone: 'Asia/Bangkok',
        default_gmv_currency: 'VND',
        status: 1,
        notes: ''
      });

      const accountDialogVisible = ref(false);
      const accountLoading = ref(false);
      const accountForm = reactive({
        id: 0,
        store_id: '',
        account_name: '',
        account_code: '',
        account_currency: 'USD',
        default_gmv_currency: 'VND',
        status: 1,
        notes: ''
      });

      const importDialogVisible = ref(false);
      const importLoading = ref(false);
      const importFile = ref(null);
      const importForm = reactive({
        store_id: '',
        account_id: '',
        ad_spend_currency: '',
        gmv_currency: ''
      });

      const fxDialogVisible = ref(false);
      const fxLoading = ref(false);
      const fxSyncing = ref(false);
      const fxRows = ref([]);
      const fxForm = reactive({ rate_date: today(), currencies: ['USD', 'VND'] });

      const pluginDialogVisible = ref(false);
      const pluginLoading = ref(false);
      const pluginLogsLoading = ref(false);
      const pluginTokenCreating = ref(false);
      const pluginBootstrapData = reactive({
        api_base: '',
        ingest_path: '/admin.php/profit_center/plugin/ingestBatch',
        stores: [],
        accounts: [],
        tokens: [],
        mappings: { store: [], account: [] }
      });
      const pluginTokenForm = reactive({
        name: 'TikTok Browser Plugin',
        expires_days: 30,
        latest_token: ''
      });
      const pluginMappingForm = reactive({
        type: 'store',
        alias: '',
        store_id: '',
        account_id: ''
      });
      const pluginLogs = ref([]);

      const channelOptions = computed(() => [
        { value: 'live', label: tt('page.profitCenter.channelLive') },
        { value: 'video', label: tt('page.profitCenter.channelVideo') },
        { value: 'influencer', label: tt('page.profitCenter.channelInfluencer') }
      ]);
      const currencyOptions = computed(() => ['CNY', 'USD', 'VND']);

      const entryAccountOptions = computed(() => {
        if (!entryForm.store_id) return accounts.value;
        return accounts.value.filter((a) => String(a.store_id) === String(entryForm.store_id));
      });

      const importAccountOptions = computed(() => {
        if (!importForm.store_id) return accounts.value;
        return accounts.value.filter((a) => String(a.store_id) === String(importForm.store_id));
      });
      const batchPresetAccountOptions = computed(() => {
        if (!batchPreset.store_id) return accounts.value;
        return accounts.value.filter((a) => String(a.store_id) === String(batchPreset.store_id));
      });
      const importFileName = computed(() => (importFile.value && importFile.value.name ? String(importFile.value.name) : ''));
      const selectedEntryStore = computed(() => stores.value.find((s) => String(s.id) === String(entryForm.store_id)) || null);
      const selectedEntryAccount = computed(() => accounts.value.find((a) => String(a.id) === String(entryForm.account_id)) || null);
      const entryRoiPreview = computed(() => {
        const ad = Number(entryForm.ad_spend_amount || 0);
        const gmv = Number(entryForm.gmv_amount || 0);
        if (ad <= 0) return null;
        return gmv / ad;
      });
      const entryWageCostPreview = computed(() => Number(entryForm.live_hours || 0) * Number(entryForm.wage_hourly_cny || 0));
      const activeStoreCount = computed(() => stores.value.filter((s) => Number(s.status || 0) === 1).length);
      const pluginTokenCount = computed(() => Array.isArray(pluginBootstrapData.tokens) ? pluginBootstrapData.tokens.filter((x) => Number(x.status || 0) === 1).length : 0);
      const pluginMapCount = computed(() => {
        const storeCount = Array.isArray(pluginBootstrapData.mappings && pluginBootstrapData.mappings.store) ? pluginBootstrapData.mappings.store.length : 0;
        const accountCount = Array.isArray(pluginBootstrapData.mappings && pluginBootstrapData.mappings.account) ? pluginBootstrapData.mappings.account.length : 0;
        return storeCount + accountCount;
      });
      const pluginLastIngestAt = computed(() => {
        if (!Array.isArray(pluginLogs.value) || pluginLogs.value.length === 0) return '--';
        return String(pluginLogs.value[0].created_at || '--');
      });

      const queryString = computed(() => {
        const p = new URLSearchParams();
        if (filters.date_from) p.set('date_from', filters.date_from);
        if (filters.date_to) p.set('date_to', filters.date_to);
        if (filters.store_id) p.set('store_id', String(filters.store_id));
        if (filters.account_id) p.set('account_id', String(filters.account_id));
        if (filters.channel_type) p.set('channel_type', String(filters.channel_type));
        return p.toString();
      });
      const kpiTrends = computed(() => {
        const rows = Array.isArray(summary.by_day) ? summary.by_day.slice() : [];
        if (rows.length < 2) {
          return {
            net_profit_cny: { text: '--', up: null },
            ad_spend_cny: { text: '--', up: null },
            gmv_cny: { text: '--', up: null },
            order_count: { text: '--', up: null },
            avg_roi: { text: '--', up: null }
          };
        }
        rows.sort((a, b) => String(a.entry_date || '').localeCompare(String(b.entry_date || '')));
        const prev = rows[rows.length - 2] || {};
        const curr = rows[rows.length - 1] || {};
        const calc = (key) => {
          const p = Number(prev[key] || 0);
          const c = Number(curr[key] || 0);
          if (!Number.isFinite(p) || !Number.isFinite(c) || p === 0) return { text: '--', up: null };
          const pct = ((c - p) / Math.abs(p)) * 100;
          return {
            text: (pct >= 0 ? '+' : '') + pct.toFixed(1) + '%',
            up: pct >= 0
          };
        };
        return {
          net_profit_cny: calc('net_profit_cny'),
          ad_spend_cny: calc('ad_spend_cny'),
          gmv_cny: calc('gmv_cny'),
          order_count: calc('order_count'),
          avg_roi: calc('avg_roi')
        };
      });

      function formatMoney(v) { return Number(v || 0).toFixed(2); }
      function formatRoi(v) {
        if (v == null || v === '') return '--';
        const n = Number(v);
        return Number.isFinite(n) ? n.toFixed(4) : '--';
      }
      function formatPercent(v) {
        const n = Number(v || 0);
        if (!Number.isFinite(n)) return '--';
        return (n * 100).toFixed(2) + '%';
      }
      function getStoreCancelRate(store, channel) {
        if (!store) return 0;
        const base = Number(store.default_cancel_rate || 0);
        if (channel === 'live') return Number(store.default_cancel_rate_live ?? base);
        if (channel === 'video') return Number(store.default_cancel_rate_video ?? base);
        if (channel === 'influencer') return Number(store.default_cancel_rate_influencer ?? base);
        return base;
      }
      function fxStatusLabel(status) {
        const s = String(status || '');
        if (s === 'fallback_latest') return tt('page.profitCenter.fxFallback');
        if (s === 'missing') return tt('page.profitCenter.fxMissing');
        if (s === 'identity') return tt('page.profitCenter.fxIdentity');
        return tt('page.profitCenter.fxExact');
      }
      function fxTagType(status) {
        const s = String(status || '');
        if (s === 'fallback_latest') return 'warning';
        if (s === 'missing') return 'danger';
        if (s === 'identity') return 'info';
        return 'success';
      }
      function fxSourceLabel(source) {
        const s = String(source || '').toLowerCase();
        if (!s) return tt('page.profitCenter.fxSourceUnknown');
        if (s === 'manual_test' || s === 'manual') return tt('page.profitCenter.fxSourceManual');
        if (s === 'currency_api_jsdelivr') return tt('page.profitCenter.fxSourceCurrencyApi');
        if (s === 'open_er_api') return tt('page.profitCenter.fxSourceErApi');
        if (s === 'fxratesapi_latest') return tt('page.profitCenter.fxSourceFxRatesApi');
        if (s === 'fallback_latest') return tt('page.profitCenter.fxSourceFallbackLatest');
        return translateMaybeText(source, 'page.profitCenter.fxSourceUnknown');
      }
      function channelLabelByType(type) {
        const t = String(type || '');
        if (t === 'live') return tt('page.profitCenter.channelLive');
        if (t === 'video') return tt('page.profitCenter.channelVideo');
        if (t === 'influencer') return tt('page.profitCenter.channelInfluencer');
        return t || '--';
      }

      async function fetchStores() {
        const json = await apiGet('/admin.php/profit_center/storeList', {}, 'common.loadingFailed');

      function ensureBatchPresetAccount() {
        const opts = !batchPreset.store_id
          ? accounts.value.slice()
          : accounts.value.filter((a) => String(a.store_id) === String(batchPreset.store_id));
        if (!opts.find((a) => String(a.id) === String(batchPreset.account_id))) {
          batchPreset.account_id = opts.length > 0 ? String(opts[0].id) : '';
        }
      }

      function resetBatchPreset(seed) {
        const base = seed && typeof seed === 'object' ? seed : {};
        batchPreset.entry_date = String(base.entry_date || filters.date_from || today());
        batchPreset.store_id = String(base.store_id || '');
        batchPreset.channel_type = String(base.channel_type || 'video');
        batchPreset.account_id = String(base.account_id || '');

        if (!batchPreset.store_id && stores.value.length > 0) {
          batchPreset.store_id = String(stores.value[0].id || '');
        }
        ensureBatchPresetAccount();
      }

      function batchPresetPayload() {
        return {
          entry_date: String(batchPreset.entry_date || filters.date_from || today()),
          store_id: String(batchPreset.store_id || ''),
          account_id: String(batchPreset.account_id || ''),
          channel_type: String(batchPreset.channel_type || 'video')
        };
      }

      function syncBatchPresetToRows(forceCurrency) {
        if (batchRows.value.length === 0) return;
        const preset = batchPresetPayload();
        batchRows.value.forEach((row) => {
          row.entry_date = preset.entry_date;
          row.store_id = preset.store_id;
          row.account_id = preset.account_id;
          row.channel_type = preset.channel_type;
          if (forceCurrency) {
            applyBatchAccountPreset(row);
          }
        });
      }

      function onBatchPresetStoreChange() {
        ensureBatchPresetAccount();
        syncBatchPresetToRows(true);
      }

      function createBatchRow(seed) {
        const base = seed && typeof seed === 'object' ? seed : {};
        const requestedStoreId = base.store_id ? String(base.store_id) : '';
        const accountPool = requestedStoreId
          ? accounts.value.filter((a) => String(a.store_id) === requestedStoreId)
          : accounts.value.slice();
        let account = null;
        if (base.account_id) {
          account = accountPool.find((a) => String(a.id) === String(base.account_id)) || null;
        }
        if (!account && accountPool.length > 0) {
          account = accountPool[0];
        }
        let store = null;
        if (requestedStoreId) {
          store = stores.value.find((s) => String(s.id) === requestedStoreId) || null;
        }
        if (!store && account) {
          store = stores.value.find((s) => String(s.id) === String(account.store_id)) || null;
        }
        const storeId = store ? String(store.id) : (requestedStoreId || '');
        const accountId = account ? String(account.id) : (base.account_id ? String(base.account_id) : '');
        const channelType = String(base.channel_type || 'video');
        return {
          row_key: batchRowSeed.value++,
          entry_date: String(base.entry_date || filters.date_from || today()),
          store_id: storeId,
          account_id: accountId,
          channel_type: channelType,
          ad_spend_amount: Number(base.ad_spend_amount || 0),
          ad_spend_currency: String(base.ad_spend_currency || (account ? (account.account_currency || 'USD') : 'USD')),
          ad_compensation_amount: Number(base.ad_compensation_amount || 0),
          ad_compensation_currency: String(base.ad_compensation_currency || (account ? (account.account_currency || 'USD') : 'USD')),
          gmv_amount: Number(base.gmv_amount || 0),
          gmv_currency: String(base.gmv_currency || (account ? (account.default_gmv_currency || 'VND') : 'VND')),
          order_count: Number(base.order_count || 0),
          live_hours: Number(base.live_hours || 0),
          raw_metrics_json: String(base.raw_metrics_json || '')
        };
      }

          account_id: filters.account_id || '',
          channel_type: filters.channel_type || 'video'
        });
        batchRows.value = [createBatchRow(batchPresetPayload())];
        syncBatchPresetToRows(true);

      function batchAccountOptions(row) {
        if (!row || !row.store_id) return accounts.value;
        return accounts.value.filter((a) => String(a.store_id) === String(row.store_id));
      }

      function applyBatchAccountPreset(row) {
        const account = accounts.value.find((a) => String(a.id) === String(row.account_id));
        if (!account) return;
        row.ad_spend_currency = String(account.account_currency || row.ad_spend_currency || 'USD');
        row.ad_compensation_currency = String(account.account_currency || row.ad_compensation_currency || 'USD');
        row.gmv_currency = String(account.default_gmv_currency || row.gmv_currency || 'VND');
        if (String(row.store_id || '') !== String(account.store_id || '')) {
          row.store_id = String(account.store_id || '');
        }
      }

      function onBatchStoreChange(row) {
        const opts = batchAccountOptions(row);
        if (!opts.find((a) => String(a.id) === String(row.account_id))) {
          row.account_id = opts.length > 0 ? String(opts[0].id) : '';
        }
        if (row.account_id) {
          applyBatchAccountPreset(row);
        }
      }

      function batchAccountName(row) {
        if (!row) return '--';
        const account = accounts.value.find((a) => String(a.id) === String(row.account_id));
        return account ? String(account.account_name || '--') : '--';
      }

      function addBatchRow(seed) {
        const isClone = !!(seed && typeof seed === 'object');
        const base = isClone
          ? seed
          : (batchRows.value.length > 0 ? batchRows.value[batchRows.value.length - 1] : {});
        const preset = batchPresetPayload();
        const usePreset = batchMode.value === 'quick';
        const row = createBatchRow({
          entry_date: usePreset ? preset.entry_date : (base.entry_date || filters.date_from || today()),
          store_id: usePreset ? preset.store_id : (base.store_id || ''),
          account_id: usePreset ? preset.account_id : (base.account_id || ''),
          channel_type: usePreset ? preset.channel_type : (base.channel_type || 'video'),
          ad_spend_currency: base.ad_spend_currency || 'USD',
          ad_compensation_currency: base.ad_compensation_currency || 'USD',
          gmv_currency: base.gmv_currency || 'VND',
          ad_spend_amount: isClone ? Number(base.ad_spend_amount || 0) : 0,
          ad_compensation_amount: isClone ? Number(base.ad_compensation_amount || 0) : 0,
          gmv_amount: isClone ? Number(base.gmv_amount || 0) : 0,
          order_count: isClone ? Number(base.order_count || 0) : 0,
          live_hours: isClone ? Number(base.live_hours || 0) : 0,
          raw_metrics_json: isClone ? String(base.raw_metrics_json || '') : ''
        });
        batchRows.value.push(row);
        if (usePreset) {
          applyBatchAccountPreset(row);
        }
      }

      function removeBatchRow(index) {
        if (batchRows.value.length <= 1) {
          batchRows.value = [createBatchRow()];
          return;
        }
        batchRows.value.splice(index, 1);
      }

      async function submitBatchEntries() {
        if (!Array.isArray(batchRows.value) || batchRows.value.length === 0) {
          ElMessage.warning(tt('common.invalidParams'));
          return;
        }
        if (batchMode.value === 'quick') {
          const preset = batchPresetPayload();
          if (!preset.entry_date || !preset.store_id || !preset.account_id || !preset.channel_type) {
            ElMessage.warning(tt('page.profitCenter.batchPresetInvalid'));
            return;
          }
          syncBatchPresetToRows(true);
        }
        const items = [];
        for (let i = 0; i < batchRows.value.length; i += 1) {
          const row = batchRows.value[i];
          if (!row.entry_date || !row.store_id || !row.account_id || !row.channel_type) {
            ElMessage.warning(tt('page.profitCenter.batchInvalidRow', { index: i + 1 }));
            return;
          }
          items.push({
            entry_date: String(row.entry_date || ''),
            store_id: Number(row.store_id || 0),
            account_id: Number(row.account_id || 0),
            channel_type: String(row.channel_type || ''),
            ad_spend_amount: Number(row.ad_spend_amount || 0),
            ad_spend_currency: String(row.ad_spend_currency || ''),
            ad_compensation_amount: Number(row.ad_compensation_amount || 0),
            ad_compensation_currency: String(row.ad_compensation_currency || ''),
            gmv_amount: Number(row.gmv_amount || 0),
            gmv_currency: String(row.gmv_currency || ''),
            order_count: Number(row.order_count || 0),
            live_hours: Number(row.live_hours || 0),
            raw_metrics_json: String(row.raw_metrics_json || '')
          });
        }

        batchSaving.value = true;
        try {
          const res = await fetch('/admin.php/profit_center/entryBatchSave', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { ...headers, 'Content-Type': 'application/json; charset=UTF-8' },
            body: JSON.stringify({ items })
          });
          const json = parseJson(await res.text());
          if (!json || json.code !== 0) throw new Error(resolveApiMessage(json, 'common.saveFailed'));
          const data = json.data || {};
          batchResult.total = Number(data.total || 0);
          batchResult.saved_count = Number(data.saved_count || 0);
          batchResult.failed_count = Number(data.failed_count || 0);
          batchResult.failed_items = Array.isArray(data.failed_items)
            ? data.failed_items.map((item) => ({
                ...item,
                message: translateMaybeText(item && item.message ? item.message : '', 'common.operationFailed')
              }))
            : [];

          if (batchResult.failed_count > 0) {
            ElMessage.warning(tt('page.profitCenter.batchResultPartial', {
              total: batchResult.total,
              saved: batchResult.saved_count,
              failed: batchResult.failed_count
            }));
          } else {
            ElMessage.success(tt('page.profitCenter.batchResultSuccess', {
              total: batchResult.total,
              saved: batchResult.saved_count
            }));
            batchDialogVisible.value = false;
          }
          if (batchResult.saved_count > 0) {
            await reloadAll();
          }
        } catch (e) {
          ElMessage.error(e.message || tt('common.saveFailed'));
        } finally {
          batchSaving.value = false;
        }
      }

          fd.append('account_id', String(importForm.account_id));
          if (importForm.ad_spend_currency) fd.append('ad_spend_currency', String(importForm.ad_spend_currency));
          if (importForm.gmv_currency) fd.append('gmv_currency', String(importForm.gmv_currency));
          fd.append('file', importFile.value);
          const res = await fetch('/admin.php/profit_center/importXlsx', {
            method: 'POST',
            credentials: 'same-origin',
            headers,
            body: fd
          });
          const json = parseJson(await res.text());
          if (!json || json.code !== 0) throw new Error(resolveApiMessage(json, 'page.dataImport.importFailed'));
          const d = json.data || {};
          ElMessage.success(tt('page.profitCenter.importResult', { imported: Number(d.imported || 0), skipped: Number(d.skipped || 0), errors: Number(d.error_count || 0) }));
          importDialogVisible.value = false;

      async function copyLatestPluginToken() {
        const token = String(pluginTokenForm.latest_token || '');
        if (!token) {
          ElMessage.warning(tt('common.invalidParams'));
          return;
        }
        try {
          if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
            await navigator.clipboard.writeText(token);
          } else {
            const textarea = document.createElement('textarea');
            textarea.value = token;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
          }
          ElMessage.success(tt('common.done'));
        } catch (e) {
          ElMessage.error(tt('common.operationFailed'));
        }
      }
