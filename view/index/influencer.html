<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>达人取片</title>
    <meta name="theme-color" content="#1f2353">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f766e 0%, #115e59 100%);
            min-height: 100vh;
            padding: 10px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
            color: white;
            padding: 15px 20px;
            text-align: center;
        }
        .header h1 { font-size: 18px; margin-bottom: 6px; }
        .header .sub { font-size: 12px; opacity: 0.95; word-break: break-all; }
        .content { padding: 20px; }
        .cover-image {
            width: 100%; max-width: 300px; max-height: 200px; object-fit: contain;
            border-radius: 10px; margin: 0 auto 15px; display: block;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        .video-player {
            width: 100%; max-width: 300px; max-height: 200px; border-radius: 10px;
            margin: 0 auto 15px; display: block; background: #000;
        }
        .title-section {
            background: #f8f9fa; padding: 12px; border-radius: 8px; margin-bottom: 15px;
        }
        .title-label { font-size: 11px; color: #666; margin-bottom: 5px; }
        .title-text { font-size: 14px; line-height: 1.5; color: #333; word-break: break-word; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .btn {
            padding: 12px 20px; border: none; border-radius: 8px; font-size: 14px;
            font-weight: 600; cursor: pointer; min-height: 44px;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-full { width: 100%; }
        .btn-copy { background: #0d9488; color: white; }
        .btn-download { background: #10b981; color: white; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-loading { position: relative; color: transparent !important; }
        .btn-loading::after {
            content: ''; position: absolute; width: 16px; height: 16px; top: 50%; left: 50%;
            margin: -8px 0 0 -8px; border: 2px solid #fff; border-top-color: transparent;
            border-radius: 50%; animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading { text-align: center; padding: 40px; color: #666; }
        .loading::after {
            content: ''; display: inline-block; width: 20px; height: 20px;
            border: 3px solid #0d9488; border-top-color: transparent; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin-left: 10px;
        }
        .empty { text-align: center; padding: 30px 16px; color: #666; }
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
            background: rgba(0,0,0,0.82); color: #fff; padding: 10px 18px; border-radius: 8px;
            font-size: 14px; z-index: 1000; opacity: 0; transition: opacity 0.2s, transform 0.2s;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 达人取片</h1>
            <div class="sub" id="productLine">加载中…</div>
        </div>
        <div class="content" id="content"><div class="loading">加载中</div></div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
        (function () {
            const TOKEN = {$token_json|raw};
            let currentVideo = null;

            function getBaseUrl() {
                const path = window.location.pathname;
                const dMarker = '/d/';
                const pos = path.indexOf(dMarker);
                if (pos !== -1) {
                    let prefix = path.substring(0, pos);
                    if (prefix.endsWith('/index.php')) {
                        prefix = prefix.slice(0, -10);
                    }
                    return prefix || '';
                }
                if (path === '/' || path === '/index.php' || path.endsWith('/index.php')) return '';
                const lastSlash = path.lastIndexOf('/');
                return lastSlash > 0 ? path.substring(0, lastSlash) : '';
            }

            function toAbsoluteUrl(url) {
                if (!url) return '';
                if (url.startsWith('http://') || url.startsWith('https://')) return url;
                if (url.startsWith('/')) return window.location.origin + url;
                return window.location.origin + getBaseUrl() + '/' + url.replace(/^\.\//, '');
            }

            function showToast(msg) {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            async function loadVideo() {
                const contentEl = document.getElementById('content');
                contentEl.innerHTML = '<div class="loading">加载中</div>';
                try {
                    const baseUrl = getBaseUrl();
                    const apiUrl = baseUrl + '/api/video/influencerRandom?token=' + encodeURIComponent(TOKEN);
                    const response = await fetch(apiUrl);
                    const result = await response.json();
                    if (result.code === 0 && result.data) {
                        currentVideo = result.data;
                        const pn = result.data.product_name || '商品';
                        document.getElementById('productLine').textContent = '商品：' + pn;
                        if (result.data.goods_url) {
                            document.getElementById('productLine').innerHTML =
                                '商品：' + escapeHtml(pn) +
                                ' <a href="' + escapeHtml(result.data.goods_url) + '" target="_blank" rel="noopener" style="color:#fff;text-decoration:underline;">打开链接</a>';
                        }
                        renderVideo(result.data);
                    } else {
                        document.getElementById('productLine').textContent = '—';
                        contentEl.innerHTML = '<div class="empty">' + escapeHtml(result.msg || '暂无视频') + '</div>';
                    }
                } catch (e) {
                    document.getElementById('productLine').textContent = '—';
                    contentEl.innerHTML = '<div class="empty">加载失败：' + escapeHtml(e.message) + '</div>';
                }
            }

            function renderVideo(video) {
                let coverUrl = toAbsoluteUrl(video.cover_url);
                const videoUrl = toAbsoluteUrl(video.video_url);
                if (!coverUrl) coverUrl = videoUrl;
                document.getElementById('content').innerHTML =
                    '<div class="video-container">' +
                    '<img src="' + escapeHtml(coverUrl) + '" alt="" class="cover-image" onerror="this.onerror=null;this.src=\'' + escapeHtml(videoUrl) + '\'">' +
                    '<video src="' + escapeHtml(videoUrl) + '" controls class="video-player" preload="metadata"></video>' +
                    '<div class="title-section">' +
                    '<div class="title-label">标题</div>' +
                    '<div class="title-text" id="titleText">' + escapeHtml(video.title) + '</div></div>' +
                    '<div class="btn-group">' +
                    '<button type="button" class="btn btn-copy" onclick="copyTitle()">复制标题</button>' +
                    '<button type="button" class="btn btn-download" onclick="downloadFile(\'cover\')">下载封面</button></div>' +
                    '<button type="button" class="btn btn-download btn-full" onclick="downloadFile(\'video\')">下载视频</button></div>';
            }

            window.copyTitle = function () {
                const el = document.getElementById('titleText');
                if (!el) return;
                const text = el.textContent;
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(text).then(() => showToast('已复制'));
                } else {
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    showToast('已复制');
                }
            };

            window.downloadFile = async function (type) {
                if (!currentVideo) return;
                const buttons = document.querySelectorAll('.btn-download, .btn-copy');
                buttons.forEach(b => { b.disabled = true; b.classList.add('btn-loading'); });
                try {
                    const baseUrl = getBaseUrl();
                    let fileName = type === 'cover'
                        ? (currentVideo.cover_file_name || 'cover.jpg')
                        : (currentVideo.video_file_name || 'video.mp4');
                    const downloadUrl = baseUrl + '/api/video/download?video_id=' + currentVideo.id + '&type=' + type + '&force_download=1';
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = fileName;
                    a.style.display = 'none';
                    document.body.appendChild(a);
                    a.click();
                    setTimeout(() => { if (a.parentNode) a.parentNode.removeChild(a); }, 200);

                    if (type === 'video') {
                        setTimeout(async () => {
                            try {
                                await fetch(baseUrl + '/api/video/markDownloaded', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ video_id: currentVideo.id })
                                });
                            } catch (err) { console.warn(err); }
                            showToast('已开始下载，下一条随机视频');
                            setTimeout(() => loadVideo(), 1200);
                        }, 400);
                    } else {
                        showToast('已开始下载封面');
                    }
                } catch (err) {
                    showToast('失败：' + err.message);
                } finally {
                    setTimeout(() => {
                        document.querySelectorAll('.btn-download, .btn-copy').forEach(b => {
                            b.disabled = false;
                            b.classList.remove('btn-loading');
                        });
                    }, 600);
                }
            };

            loadVideo();
        })();
    </script>
</body>
</html>
