<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok视频管理</title>
    <meta name="theme-color" content="#1677ff">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/pwa/icon.svg">
    <style>
        :root {
            --btn-primary: #1677ff;
            --btn-primary-hover: #0f6fe8;
            --btn-primary-active: #0c5fca;
            --btn-primary-shadow: 0 5px 15px rgba(22, 119, 255, 0.3);
            --btn-default-bg: #f7faff;
            --btn-default-hover: #eef4ff;
            --btn-default-border: #cdddf7;
            --btn-default-text: #1d4f9f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }
        
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .header .ip {
            font-size: 12px;
            opacity: 0.9;
        }
        
        .content {
            padding: 20px;
        }
        
        .video-container {
            margin-bottom: 20px;
        }
        
        .cover-image {
            width: 100%;
            max-width: 300px;
            max-height: 200px;
            object-fit: contain;
            border-radius: 10px;
            margin: 0 auto 15px;
            display: block;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        
        .video-player {
            width: 100%;
            max-width: 300px;
            max-height: 200px;
            border-radius: 10px;
            margin: 0 auto 15px;
            display: block;
            background: #000;
        }
        
        .title-section {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .title-label {
            font-size: 11px;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .title-text {
            font-size: 14px;
            line-height: 1.5;
            color: #333;
            word-break: break-word;
        }
        
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .btn {
            padding: 12px 20px;
            border: 1px solid transparent;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 44px;
            box-sizing: border-box;
        }
        
        .btn-full {
            width: 100%;
        }
        
        .btn-copy {
            background: var(--btn-default-bg);
            border-color: var(--btn-default-border);
            color: var(--btn-default-text);
        }
        
        .btn-copy:hover {
            background: var(--btn-default-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(29, 79, 159, 0.18);
        }
        
        .btn-download {
            background: var(--btn-primary);
            color: white;
        }
        
        .btn-download:hover {
            background: var(--btn-primary-hover);
            transform: translateY(-2px);
            box-shadow: var(--btn-primary-shadow);
        }
        
        .btn:active {
            transform: translateY(0);
        }

        .btn-download:active {
            background: var(--btn-primary-active);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--btn-primary);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-loading {
            position: relative;
            color: transparent !important;
        }
        
        .btn-loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            top: 50%;
            left: 50%;
            margin-left: -8px;
            margin-top: -8px;
            border: 2px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        .error {
            text-align: center;
            padding: 40px;
            color: #ef4444;
        }
        
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        
        .toast.show {
            opacity: 1;
        }
        
        .pwa-install {
            position: fixed;
            right: 16px;
            bottom: 90px;
            padding: 12px 18px;
            border-radius: 999px;
            background: var(--btn-primary);
            color: #fff;
            box-shadow: 0 12px 30px rgba(22, 119, 255, 0.35);
            display: none;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            z-index: 1000;
            cursor: pointer;
        }

        .pwa-install:hover {
            background: var(--btn-primary-hover);
        }
        
        .pwa-install i {
            font-style: normal;
        }

        .retry-btn {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 视频管理</h1>
            <div class="ip">IP地址: {$ip}</div>
            <div class="ip" style="margin-top: 5px; font-size: 12px;" id="platformInfo">平台: 加载中...</div>
        </div>
        
        <div class="content" id="content">
            <div class="loading">加载中...</div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    <div class="pwa-install" id="pwaInstallBtn">
        <i>📲</i>
        <span>安装到桌面</span>
    </div>
    
    <script>
        (function() {
            'use strict';
            
            // 开发模式标志（生产环境设为 false）
            const DEBUG = false;
            
            // 调试日志函数
            function debugLog(...args) {
                if (DEBUG) {
                    console.log(...args);
                }
            }
            
            function debugError(...args) {
                if (DEBUG) {
                    console.error(...args);
                }
            }
            
            let currentVideo = null;
            const platform = new URLSearchParams(window.location.search).get('platform') || 'tiktok';
            
            // 更新平台信息显示
            document.getElementById('platformInfo').textContent = '平台: ' + platform;
            
            // 获取基础URL
            function getBaseUrl() {
                const path = window.location.pathname;
                // 如果路径是 /index.php 或 /，返回空字符串（根目录）
                if (path === '/' || path === '/index.php' || path.endsWith('/index.php')) {
                    return '';
                }
                // 否则返回路径（去掉文件名）
                const lastSlash = path.lastIndexOf('/');
                return lastSlash > 0 ? path.substring(0, lastSlash) : '';
            }
            
            // 加载视频
            async function loadVideo() {
                const contentEl = document.getElementById('content');
                contentEl.innerHTML = '<div class="loading">加载中</div>';
                
                try {
                    const baseUrl = getBaseUrl();
                    debugLog('当前平台:', platform);
                    debugLog('基础URL:', baseUrl);
                    
                    // 先尝试简化版API
                    let apiUrl = baseUrl + '/api_simple.php?platform=' + platform;
                    debugLog('尝试API 1:', apiUrl);
                    
                    let response = await fetch(apiUrl);
                    debugLog('API 1 响应状态:', response.status);
                    
                    // 如果简化版失败，尝试路由API
                    if (!response.ok) {
                        apiUrl = baseUrl + '/api/video/getVideo?platform=' + platform;
                        debugLog('尝试API 2:', apiUrl);
                        response = await fetch(apiUrl);
                        debugLog('API 2 响应状态:', response.status);
                    }
                    
                    // 检查响应类型
                    const contentType = response.headers.get('content-type');
                    debugLog('响应类型:', contentType);
                    
                    if (!contentType || !contentType.includes('application/json')) {
                        const text = await response.text();
                        debugError('API返回非JSON:', text.substring(0, 500));
                        throw new Error('API返回格式错误，请检查服务器配置');
                    }
                    
                    const result = await response.json();
                    debugLog('API返回结果:', result);
                    
                    if (result.code === 0 && result.data) {
                        currentVideo = result.data;
                        debugLog('视频数据:', result.data);
                        renderVideo(result.data);
                    } else {
                        contentEl.innerHTML = `
                            <div class="empty">
                                <div class="empty-icon">📭</div>
                                <div style="font-size: 16px; margin-bottom: 10px;">${escapeHtml(result.msg || '暂无可用视频')}</div>
                                <div style="font-size: 12px; color: #999;">
                                    请检查：1. 后台是否已上传视频 2. 平台代码是否正确（当前：${escapeHtml(platform)}）
                                </div>
                            </div>
                        `;
                    }
                } catch (error) {
                    debugError('加载视频错误:', error);
                    contentEl.innerHTML = `
                        <div class="error">
                            <div style="font-size: 18px; margin-bottom: 15px;">⚠️ 加载失败</div>
                            <div style="font-size: 14px; color: #dc3545; margin-bottom: 15px;">${escapeHtml(error.message)}</div>
                            <button onclick="location.reload()" class="btn btn-download btn-full retry-btn">
                                🔄 刷新重试
                            </button>
                        </div>
                    `;
                }
            }
            
            // 转换为绝对URL
            function toAbsoluteUrl(url) {
                if (!url) return '';
                // 如果已经是完整URL，直接返回
                if (url.startsWith('http://') || url.startsWith('https://')) {
                    return url;
                }
                // 如果是相对路径，转换为绝对路径
                if (url.startsWith('/')) {
                    return window.location.origin + url;
                }
                // 其他情况，使用当前路径
                const baseUrl = window.location.origin + getBaseUrl();
                return baseUrl + (url.startsWith('./') ? url.substring(1) : '/' + url);
            }
            
            // 渲染视频
            function renderVideo(video) {
                let coverUrl = toAbsoluteUrl(video.cover_url);
                const videoUrl = toAbsoluteUrl(video.video_url);
                
                // 如果没有封面URL，使用视频URL作为默认封面
                if (!coverUrl || coverUrl === '') {
                    coverUrl = videoUrl;
                }
                
                debugLog('封面URL:', coverUrl);
                debugLog('视频URL:', videoUrl);
                
                document.getElementById('content').innerHTML = `
                    <div class="video-container">
                        <img src="${escapeHtml(coverUrl)}" alt="封面" class="cover-image" 
                             onerror="this.onerror=null; this.src='${escapeHtml(videoUrl)}'; debugError('封面加载失败，使用视频作为封面');">
                        <video src="${escapeHtml(videoUrl)}" controls class="video-player" 
                               preload="metadata"
                               onerror="this.style.display='none'; debugError('视频加载失败:', this.src);">
                            您的浏览器不支持视频播放
                        </video>
                    
                    <div class="title-section">
                        <div class="title-label">视频标题</div>
                        <div class="title-text" id="titleText">${escapeHtml(video.title)}</div>
                    </div>
                    
                    <div class="btn-group">
                        <button class="btn btn-copy" onclick="copyTitle()">
                            📋 复制标题
                        </button>
                        <button class="btn btn-download" onclick="downloadFile('cover')">
                            🖼️ 下载封面
                        </button>
                    </div>
                    
                    <button class="btn btn-download btn-full" onclick="downloadFile('video')">
                        ⬇️ 下载视频
                    </button>
                </div>
                `;
            }
            
            // 复制标题
            function copyTitle() {
                const titleText = document.getElementById('titleText').textContent;
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(titleText).then(() => {
                        showToast('标题已复制到剪贴板');
                    }).catch(() => {
                        fallbackCopy(titleText);
                    });
                } else {
                    fallbackCopy(titleText);
                }
            }
            
            function fallbackCopy(text) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('标题已复制到剪贴板');
            }
            
            // 检测是否为APP环境
            function isAppEnvironment() {
                // 检测是否有Android接口
                if (typeof window.Android !== 'undefined' && window.Android.downloadFile) {
                    return true;
                }
                // 检测User-Agent
                const ua = navigator.userAgent || navigator.vendor || window.opera;
                return /android/i.test(ua);
            }
            
            // 检测是否存在原生下载桥
            function hasAndroidBridge() {
                return typeof window.Android !== 'undefined' && (
                    typeof window.Android.downloadFileWithFallback === 'function' ||
                    typeof window.Android.downloadFile === 'function'
                );
            }
            
            const ENABLE_NATIVE_DOWNLOAD = false; // 关闭APP原生下载，统一使用浏览器方式

            // 下载文件 - 智能下载策略：可配置是否启用APP原生下载
            async function downloadFile(type) {
                if (!currentVideo) return;
                
                const buttons = document.querySelectorAll('.btn-download');
                buttons.forEach(btn => {
                    btn.disabled = true;
                    btn.classList.add('btn-loading');
                });
                
                try {
                    showToast('正在准备下载...');
                    
                    const baseUrl = getBaseUrl();
                    const ext = type === 'cover' ? '.jpg' : '.mp4';
                    
                    // 优先使用后端返回的英文文件名（如果存在）
                    let fileName;
                    if (type === 'cover' && currentVideo.cover_file_name) {
                        fileName = currentVideo.cover_file_name;
                    } else if (type === 'video' && currentVideo.video_file_name) {
                        fileName = currentVideo.video_file_name;
                    } else {
                        // 如果没有后端文件名，生成纯英文文件名（只保留英文字母、数字、空格、连字符和下划线）
                        let name = (currentVideo.title || 'videotool')
                            .replace(/[^a-zA-Z0-9\s\-_]/g, '')  // 只保留英文、数字、空格、连字符、下划线
                            .trim();
                        // 将多个空格替换为单个空格，然后替换为下划线
                        name = name.replace(/\s+/g, ' ').replace(/\s/g, '_');
                        // 限制长度
                        if (name.length > 100) {
                            name = name.substring(0, 100);
                        }
                        if (!name || name === '') {
                            name = 'videotool_' + Date.now();
                        }
                        fileName = name + ext;
                    }
                    
                    const downloadBaseUrl = `${baseUrl}/api/video/download?video_id=${currentVideo.id}&type=${type}`;
                    const forcedDownloadUrl = `${downloadBaseUrl}&force_download=1&prefer_cdn=1`;
                    const baseCdnUrl = type === 'cover'
                        ? toAbsoluteUrl(currentVideo.cover_url) 
                        : toAbsoluteUrl(currentVideo.video_url);
                    const originalCdnUrl = baseCdnUrl
                        ? `${baseCdnUrl}${baseCdnUrl.includes('?') ? '&' : '?'}attname=${encodeURIComponent(fileName)}`
                        : '';
                    
                    const hasBridge = hasAndroidBridge();
                    const useNativeDownload = hasBridge && ENABLE_NATIVE_DOWNLOAD;
                    
                    // APP 环境：调用原生下载接口，并提供主备链接
                    if (useNativeDownload) {
                        try {
                            const metaUrl = `${downloadBaseUrl}&format=json`;
                            debugLog('获取APP下载信息:', metaUrl);
                            const resp = await fetch(metaUrl);
                            const result = await resp.json();
                            if (result.code === 0 && result.data) {
                                const data = result.data;
                                // 优先使用CDN链接（七牛云等），直接下载，速度快
                                const cdnUrl = data.cdn_url || data.file_url || '';
                                const proxyUrl = data.proxy_url || data.direct_url || forcedDownloadUrl;
                                // 备用链接确保带prefer_cdn参数，后端会自动302到CDN
                                const backupUrl = proxyUrl.includes('prefer_cdn=') ? proxyUrl : proxyUrl + (proxyUrl.includes('?') ? '&' : '?') + 'prefer_cdn=1';
                                const finalName = data.file_name || fileName;
                                
                                // CDN链接优先，不做任何修改，直接使用
                                // 如果没有CDN链接，使用代理链接（带prefer_cdn=1会302到CDN）
                                let primary = cdnUrl || backupUrl;
                                let backup = backupUrl;
                                
                                // 如果CDN链接存在，优先使用CDN（DownloadManager会直接下载）
                                if (cdnUrl) {
                                    debugLog('优先使用CDN直接下载（DownloadManager）:', cdnUrl);
                                } else {
                                    debugLog('CDN链接不存在，使用代理下载:', proxyUrl);
                                }
                                
                                debugLog('准备开始下载:', {
                                    primary,
                                    backup,
                                    fileName: finalName,
                                    isCdn: !!cdnUrl,
                                    proxyUrl
                                });

                                if (typeof window.Android.downloadFileWithFallback === 'function') {
                                    debugLog('调用 downloadFileWithFallback');
                                    try {
                                        window.Android.downloadFileWithFallback(primary, backup, finalName);
                                        showToast('APP 已开始下载');
                                    } catch (e) {
                                        debugError('调用 downloadFileWithFallback 失败:', e);
                                        showToast('下载启动失败: ' + e.message);
                                    }
                                } else if (typeof window.Android.downloadFile === 'function') {
                                    debugLog('调用 downloadFile');
                                    try {
                                        window.Android.downloadFile(primary, finalName);
                                        showToast('APP 已开始下载');
                                    } catch (e) {
                                        debugError('调用 downloadFile 失败:', e);
                                        showToast('下载启动失败: ' + e.message);
                                    }
                                } else {
                                    throw new Error('原生下载接口不可用');
                                }
                                setTimeout(() => {
                                    buttons.forEach(btn => {
                                        btn.disabled = false;
                                        btn.classList.remove('btn-loading');
                                    });
                                }, 800);
                                return;
                            } else {
                                throw new Error(result.msg || '获取下载地址失败');
                            }
                        } catch (err) {
                            debugError('APP下载信息获取失败，使用备用地址:', err);
                            try {
                                const cdnUrl = originalCdnUrl;
                                if (typeof window.Android.downloadFileWithFallback === 'function') {
                                    window.Android.downloadFileWithFallback(cdnUrl || forcedDownloadUrl, forcedDownloadUrl, fileName);
                                } else if (typeof window.Android.downloadFile === 'function') {
                                    window.Android.downloadFile(cdnUrl || forcedDownloadUrl, fileName);
                                } else {
                                    throw new Error('原生下载接口不可用');
                                }
                                showToast('APP 已开始下载');
                                setTimeout(() => {
                                    buttons.forEach(btn => {
                                        btn.disabled = false;
                                        btn.classList.remove('btn-loading');
                                    });
                                }, 800);
                                return;
                            } catch (nativeErr) {
                                debugError('APP备用下载失败，将使用浏览器下载:', nativeErr);
                            }
                        }
                        
                        // 如果原生下载失败，将继续走浏览器流程
                    }
                    
                    // 浏览器环境：统一走站内代理（具备缓存与防盗链兼容能力）
                    triggerBrowserDownload(forcedDownloadUrl, fileName);
                    
                        setTimeout(() => {
                        buttons.forEach(btn => {
                            btn.disabled = false;
                            btn.classList.remove('btn-loading');
                        });
                    }, 500);
                    
                    // 标记下载
                    if (type === 'video') {
                        setTimeout(async () => {
                            try {
                                await fetch(`${baseUrl}/api/video/markDownloaded`, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ video_id: currentVideo.id })
                                });
                            } catch (e) {
                                debugError('标记下载状态失败，但不影响下载:', e);
                            }
                            showToast('视频下载已开始');
                            setTimeout(() => loadVideo(), 1500);
                        }, 500);
                    } else {
                        showToast('封面下载已开始');
                    }
                } catch (error) {
                    debugError('下载失败:', error);
                    showToast('下载失败: ' + error.message);
                    buttons.forEach(btn => {
                        btn.disabled = false;
                        btn.classList.remove('btn-loading');
                    });
                }
            }
            
            // 显示提示
            function showToast(message) {
                const toast = document.getElementById('toast');
                toast.textContent = message;
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }
            
            // HTML转义
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            function triggerBrowserDownload(url, fileName) {
                const link = document.createElement('a');
                link.href = url;
                link.download = fileName;
                link.style.display = 'none';
                document.body.appendChild(link);
                link.click();
                setTimeout(() => {
                    if (link.parentNode) {
                        document.body.removeChild(link);
                    }
                }, 100);
            }
            
            // 将函数暴露到全局作用域
            window.loadVideo = loadVideo;
            window.downloadFile = downloadFile;
            window.copyTitle = copyTitle;
            window.debugLog = debugLog;
            window.debugError = debugError;
            
            // 页面加载时获取视频
            loadVideo();
        })();
        
        let deferredPrompt = null;
        const pwaBtn = document.getElementById('pwaInstallBtn');

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(err => {
                console.warn('ServiceWorker 注册失败:', err);
            });

            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                if (pwaBtn) {
                    pwaBtn.style.display = 'flex';
                }
            });

            if (pwaBtn) {
                pwaBtn.addEventListener('click', async () => {
                    if (!deferredPrompt) {
                        window.open(window.location.href, '_blank');
                        return;
                    }
                    pwaBtn.style.display = 'none';
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') {
                        showToast('感谢安装！');
                    }
                    deferredPrompt = null;
                });
            }
        }
    </script>
</body>
</html>
