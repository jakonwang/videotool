<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1677ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="视频管理">
    <title>选择平台 - 视频管理</title>
    <style>
        :root {
            --btn-primary: #1677ff;
            --btn-primary-hover: #0f6fe8;
            --btn-primary-active: #0c5fca;
            --btn-primary-shadow: 0 8px 20px rgba(22, 119, 255, 0.26);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            padding: 30px 20px;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .platform-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px 0;
        }
        
        .platform-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #333;
            display: block;
        }
        
        .platform-card:active {
            transform: scale(0.95);
        }
        
        .platform-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .platform-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }
        
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error {
            background: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            color: #dc3545;
            margin: 20px;
        }

        .retry-button {
            margin-top: 15px;
            padding: 10px 20px;
            background: var(--btn-primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            box-shadow: var(--btn-primary-shadow);
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .retry-button:hover {
            background: var(--btn-primary-hover);
            transform: translateY(-1px);
        }

        .retry-button:active {
            background: var(--btn-primary-active);
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 视频管理</h1>
            <p>选择平台开始浏览视频</p>
        </div>
        
        <div id="platformList" class="platform-grid">
            <div class="loading">加载平台列表...</div>
        </div>
    </div>
    
    <script>
        (function() {
            'use strict';
            
            function getBaseUrl() {
                const path = window.location.pathname;
                if (path === '/' || path.endsWith('/platforms.html')) {
                    return '';
                }
                const lastSlash = path.lastIndexOf('/');
                return lastSlash > 0 ? path.substring(0, lastSlash) : '';
            }
            
            async function loadPlatforms() {
                const platformListEl = document.getElementById('platformList');
                
                try {
                    const baseUrl = getBaseUrl();
                    const apiUrl = baseUrl + '/api/platforms';
                    
                    const response = await fetch(apiUrl);
                    const result = await response.json();
                    
                    if (result.code === 0 && result.data && result.data.length > 0) {
                        let html = '';
                        result.data.forEach(platform => {
                            const icon = platform.icon || '📱';
                            const videoUrl = baseUrl + '/?platform=' + platform.code;
                            html += `
                                <a href="${videoUrl}" class="platform-card">
                                    <div class="platform-icon">${icon}</div>
                                    <div class="platform-name">${escapeHtml(platform.name)}</div>
                                </a>
                            `;
                        });
                        platformListEl.innerHTML = html;
                    } else {
                        platformListEl.innerHTML = `
                            <div class="error">
                                <div style="font-size: 18px; margin-bottom: 10px;">⚠️ 暂无平台</div>
                                <div style="font-size: 14px; color: #666;">请先在后台添加平台</div>
                            </div>
                        `;
                    }
                } catch (error) {
                    platformListEl.innerHTML = `
                        <div class="error">
                            <div style="font-size: 18px; margin-bottom: 10px;">⚠️ 加载失败</div>
                            <div style="font-size: 14px; color: #666;">${escapeHtml(error.message)}</div>
                            <button onclick="location.reload()" class="retry-button">
                                重试
                            </button>
                        </div>
                    `;
                }
            }
            
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            loadPlatforms();
        })();
    </script>
</body>
</html>
