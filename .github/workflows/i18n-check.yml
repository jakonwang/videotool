name: i18n Key Check

on:
  push:
    branches:
      - main
    paths:
      - 'view/admin/**'
      - 'public/static/i18n/**'
      - 'scripts/check_i18n_keys.js'
      - 'scripts/check_admin_template_stability.js'
      - '.github/workflows/i18n-check.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'view/admin/**'
      - 'public/static/i18n/**'
      - 'scripts/check_i18n_keys.js'
      - 'scripts/check_admin_template_stability.js'
      - '.github/workflows/i18n-check.yml'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run i18n key check
        run: node scripts/check_i18n_keys.js --scope=all

      - name: Run admin template stability check
        run: node scripts/check_admin_template_stability.js
